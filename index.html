<!DOCTYPE html>
<html>

<head>
    <title>MXS-004 Cast Receiver v6.2</title>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #stream-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #stream-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            background: #111;
        }

        .overlay {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 12px;
            border: 2px solid #b38600;
            text-align: center;
            z-index: 100;
        }

        .status {
            font-size: 24px;
            font-weight: bold;
            color: #b38600;
            margin-bottom: 10px;
        }

        .sub-status {
            font-size: 16px;
            color: #aaa;
        }

        #error-overlay {
            display: none;
            border-color: #f44336;
        }

        #error-overlay .status {
            color: #f44336;
        }

        .version {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div id="video-container">
        <img id="stream-img" alt="Live Stream">

        <div id="stream-container">
            <img id="stream-img" src="" alt="Live Stream">
            <audio id="audio-player" preload="none"></audio>

            <div id="status-overlay">
                <h1 id="status-text">INITIALIZING...</h1>
                <p id="version-text">MXS-004 v6.2</p>
            </div>

            <div id="error-overlay" style="display:none">
                <h1>STREAM ERROR</h1>
                <p id="error-msg">Connection lost</p>
                <button onclick="location.reload()">RETRY</button>
            </div>
        </div>

        <script type="text/javascript"
            src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
        <script>
            const streamImg = document.getElementById('stream-img');
            const audioPlayer = document.getElementById('audio-player');
            const statusOverlay = document.getElementById('status-overlay');
            const statusText = document.getElementById('status-text');
            const errorOverlay = document.getElementById('error-overlay');
            const errorMsg = document.getElementById('error-msg');

            let isCasting = false;
            let activeStreamUrl = '';
            const VERSION = "v6.2";

            function updateStatus(text, showSpinner = false) {
                console.log("Status Update:", text, `(${VERSION})`);
                statusText.innerText = text;
            }

            function showError(msg) {
                console.error("Show Error:", msg);
                errorMsg.innerText = msg;
                errorOverlay.style.display = 'flex';
                statusOverlay.style.display = 'none';
            }

            function startLiveStream(baseUrl) {
                if (isCasting && activeStreamUrl === baseUrl) return;
                console.log("🎬 Starting Live Unity Stream:", baseUrl);
                activeStreamUrl = baseUrl;
                isCasting = true;

                updateStatus("CONNECTING TO STREAM...", true);

                // Start Video
                streamImg.src = baseUrl + "/stream.mjpeg?ts=" + Date.now();
                streamImg.style.display = 'block';

                // Start Audio
                audioPlayer.src = baseUrl + "/audio.wav?ts=" + Date.now();
                audioPlayer.play().then(() => {
                    console.log("🔊 Audio stream started");
                }).catch(e => {
                    console.warn("⚠️ Audio autoplay blocked or failed:", e);
                    // On some TVs, we might need a user interaction, but TVs usually allow autoplay
                });

                statusOverlay.style.display = 'none';
                errorOverlay.style.display = 'none';
            }

            async function probeForStream() {
                updateStatus("DETECTING STUDIO SERVER...");

                // Generate candidates
                const candidates = [];
                for (let i = 2; i < 20; i++) {
                    candidates.push(`http://192.168.1.${i}:8089`);
                    candidates.push(`http://192.168.1.${i}:8088`);
                }
                // Add common subnets
                for (let i = 2; i < 20; i++) {
                    candidates.push(`http://192.168.0.${i}:8089`);
                }

                console.log(`🔍 Probing ${candidates.length} candidates using Image object...`);

                const probePromises = candidates.map(url => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.onload = () => {
                            console.log("✅ STUDIO FOUND AT:", url);
                            startLiveStream(url);
                            resolve(true);
                        };
                        img.onerror = () => resolve(false);
                        // Use screen.jpg for probing
                        img.src = `${url}/screen.jpg?probe=${Date.now()}`;

                        // Timeout probe
                        setTimeout(() => {
                            img.src = "";
                            resolve(false);
                        }, 3000);
                    });
                });

                const results = await Promise.all(probePromises);
                if (!results.some(r => r === true) && !isCasting) {
                    updateStatus("SERVER NOT FOUND. RETRYING...");
                    setTimeout(probeForStream, 5000);
                }
            }

            window.onload = () => {
                console.log(`✅ Cast Receiver started (${VERSION})`);

                try {
                    const context = cast.framework.CastReceiverContext.getInstance();
                    const playerManager = context.getPlayerManager();

                    // Listen for custom messages from sender
                    context.addCustomMessageListener('urn:x-cast:com.nowmultimedia.mxs004', (event) => {
                        console.log("📩 Custom Message:", event.data);
                        if (event.data && event.data.stream_url) {
                            startLiveStream(event.data.stream_url);
                        }
                    });

                    // Intercept Media LOAD messages
                    playerManager.setMessageInterceptor(
                        cast.framework.messages.MessageType.LOAD,
                        loadRequestData => {
                            console.log("📥 LOAD message intercepted:", loadRequestData);
                            if (loadRequestData.media && loadRequestData.media.contentId) {
                                const url = loadRequestData.media.contentId;
                                if (url.includes('stream.mjpeg') || url.includes(':8089')) {
                                    startLiveStream(url);
                                }
                            }
                            return loadRequestData;
                        }
                    );

                    const options = new cast.framework.CastReceiverOptions();
                    options.maxInactivity = 3600;

                    context.start(options);
                    console.log("✅ Cast Receiver started (" + VERSION + ")");
                } catch (e) {
                    console.warn("Cast SDK init failed (standalone mode):", e);
                }

                // Start fallback probe
                probeForStream();
            };
        </script>
</body>

</html>
