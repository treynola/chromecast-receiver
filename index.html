<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.8.103 [MIRROR EXACT]</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* [V13.8.103] NUCLEAR CSS MIRROR */
        :root { --red: #FF0000; --gold: #FAD78E; --green: #008000; --off-black: #1a1a1a; --dark-gray: #2c2c2c; --mid-gray: #444; --text-color: #f0f0f0; }
        
        @font-face { font-family: 'Mexcellent'; src: url('../fonts/MexcellentRg.otf') format('opentype'); }
        @font-face { font-family: 'Mexcellent 3D'; src: url('../fonts/Mexcellent3d.otf') format('opentype'); }

        html, body { background: #000 !important; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Courier New', monospace; }
        
        .container {
            width: 1432px; height: 802px; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(var(--scale, 1)); transform-origin: center;
            background-color: var(--dark-gray); border-radius: 12px; padding: 6px; box-sizing: border-box;
            border: 1px solid var(--green); box-shadow: 0 0 0 2px var(--gold), 0 0 0 4px var(--red);
            display: flex; flex-direction: column; opacity: 1;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; background-color: var(--off-black); border-radius: 8px; margin-bottom: 6px; height: 36px; }
        .header h1 { font-family: 'Mexcellent 3D', sans-serif; font-size: 1.1em; margin: 0; color: var(--gold); }
        
        .main-content { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; flex: 1; overflow: hidden; }
        
        /* Unified Column Styles */
        .master-column, .track { display: flex; flex-direction: column; gap: 4px; border: 1px solid var(--green); border-radius: 8px; padding: 4px; background-color: var(--dark-gray); overflow: hidden; }
        .track-header { color: var(--gold); font-weight: bold; font-size: 0.75em; border-bottom: 1px solid var(--mid-gray); padding-bottom: 2px; text-transform: uppercase; margin-bottom: 4px; }
        .track-time-display { font-size: 1.8em; color: var(--green); text-align: center; font-family: 'Courier Prime', monospace; margin: 5px 0; }
        
        /* Waveform Styles */
        .waveform-box { height: 60px; border: 1px solid var(--mid-gray); display: flex; align-items: center; background: #000; margin-bottom: 5px; }
        .waveform-labels { display: flex; flex-direction: column; justify-content: space-around; height: 100%; width: 18px; text-align: center; border-right: 1px solid var(--gold); }
        .waveform-label-external { font-size: 0.6em; color: var(--red); font-weight: bold; }
        .waveform-canvas-container { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4px; height: 100%; }
        .waveform-canvas { width: 100%; height: 26px; border: 1px solid var(--gold); border-radius: 4px; box-sizing: border-box; }

        /* Control Styles */
        .control-group { margin-bottom: 4px; }
        .pa-mic-slider { width: 100%; height: 4px; background: #333; accent-color: var(--gold); }
        .pa-mic-value { color: var(--gold); font-size: 0.7em; }
        
        /* Meter Styles */
        .meter-container { height: 6px; background: #111; border-radius: 3px; overflow: hidden; margin-top: auto; border: 1px solid #333; }
        .meter-bar { height: 100%; width: 0%; background: linear-gradient(to right, #004d00, #00ff00); transition: width 0.1s; }

        /* Sample Grid */
        .sample-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 5px; flex: 1; }
        .sample-btn { background: #1a1a1a; color: var(--gold); border: 1px solid #444; font-size: 0.7em; height: 30px; border-radius: 4px; font-weight: bold; }
        .sample-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 10px var(--gold); }

        /* Button Rows */
        .track-buttons { display: flex; gap: 2px; margin-top: 5px; }
        .track-buttons button { flex: 1; height: 24px; font-size: 0.7em; background: var(--green); border: 1px solid var(--gold); color: var(--gold); border-radius: 4px; font-weight: bold; }

        /* Debug & Status Overlay */
        #audio-debug { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); border: 1px solid #555; padding: 10px; color: #0f0; font-size: 11px; z-index: 2000; border-radius: 4px; }
        .meter-mini { height: 10px; width: 100px; background: #222; border: 1px solid #444; position: relative; margin-top: 5px; }
        .meter-mini-fill { height: 100%; width: 0%; background: #0f0; transition: width 0.05s; }
        
        cast-media-player { display: none; }
    </style>
</head>
<body>
    <audio id="silent-loop" loop muted autoplay src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA="></audio>
    <cast-media-player></cast-media-player>
    
    <div id="audio-debug">
        <div>STATE: <span id="as-val">WAITING...</span></div>
        <div class="meter-mini"><div id="as-meter" class="meter-mini-fill"></div></div>
        <div id="as-msg" style="color:#aaa; font-size:9px; margin-top:5px;">v13.8.103 MIRROR EXACT</div>
    </div>

    <div class="container" id="studio-root">
        <!-- Exact Header Mirror -->
        <div class="header">
            <div class="header-left"><h1>NOWMULTIMEDIA MXS-004</h1></div>
            <div class="header-right"><h2 style="font-size:0.85em; margin:0; color:var(--gold);">Mix N Studio 004 :: MIRROR</h2></div>
        </div>

        <div class="main-content">
            <!-- Exact Master Column Mirror -->
            <div class="master-column" id="master-column">
                <div class="track-header">Master Recording:</div>
                <div id="m-time" class="track-time-display">00:00:00</div>
                
                <div class="control-group" style="display:flex; align-items:center; gap:4px;">
                    <label style="color:var(--green); font-size:0.7em;">Vol</label>
                    <input type="range" class="pa-mic-slider" id="m-vol" min="-60" max="6" value="0">
                    <span id="m-vol-val" class="pa-mic-value">0.0 dB</span>
                </div>

                <div class="waveform-box">
                    <div class="waveform-labels"><div class="waveform-label-external">L</div><div class="waveform-label-external">R</div></div>
                    <div class="waveform-canvas-container">
                        <canvas class="waveform-canvas" id="m-wf-l"></canvas>
                        <canvas class="waveform-canvas" id="m-wf-r"></canvas>
                    </div>
                </div>

                <div class="track-header" style="text-align:center;">Sample Station</div>
                <div id="sample-grid" class="sample-grid"></div>

                <div class="meter-container"><div id="m-meter-bar" class="meter-bar"></div></div>
            </div>

            <!-- Track Columns (Injected) -->
            <div id="tracks-container" style="display:contents;"></div>
        </div>
    </div>

    <script>
        (function() {
            var audioCtx = null; var scriptNode = null; var ws = null;
            var BUFFER_SIZE = 192000; var ringBuffer = new Float32Array(BUFFER_SIZE);
            var writePtr = 0; var readPtr = 0; var lastLevel = 0;
            
            function buildGUI() {
                var grid = document.getElementById('sample-grid');
                for (var p = 1; p <= 20; p++) {
                    var btn = document.createElement('button'); btn.className = 'sample-btn';
                    btn.id = 'sample-' + p; btn.textContent = p; grid.appendChild(btn);
                }
                var tc = document.getElementById('tracks-container');
                for (var i = 0; i < 4; i++) {
                    var t = document.createElement('div'); t.className = 'track'; t.id = 'track-' + i;
                    t.innerHTML = '<div class="track-header">TRACK '+(i+1)+'</div>' +
                        '<div class="track-time-display" id="t-time-'+i+'">00:00:00</div>' +
                        '<div class="waveform-box"><div class="waveform-labels"><div class="waveform-label-external">L</div><div class="waveform-label-external">R</div></div>' +
                        '<div class="waveform-canvas-container"><canvas class="waveform-canvas"></canvas><canvas class="waveform-canvas"></canvas></div></div>' +
                        '<div class="control-group"><label style="color:var(--gold); font-size:0.7em;">Gain</label><input type="range" class="pa-mic-slider"><span class="pa-mic-value">0.0 dB</span></div>' +
                        '<div class="track-buttons"><button>REC</button><button>STOP</button><button>PLAY</button><button>REV</button></div>' +
                        '<div class="meter-container"><div id="t-meter-'+i+'" class="meter-bar"></div></div>';
                    tc.appendChild(t);
                }
                updateScale();
            }

            function updateScale() {
                const winW = window.innerWidth; const winH = window.innerHeight;
                document.documentElement.style.setProperty('--scale', Math.min(winW/1440, winH/810) * 0.98);
            }

            function startAudio() {
                if (scriptNode) return;
                scriptNode = audioCtx.createScriptProcessor(2048, 0, 2);
                scriptNode.onaudioprocess = (e) => {
                    const outL = e.outputBuffer.getChannelData(0); const outR = e.outputBuffer.getChannelData(1);
                    const available = (writePtr - readPtr + BUFFER_SIZE) % BUFFER_SIZE;
                    if (available < 4096) { outL.fill(0); outR.fill(0); return; }
                    let maxVal = 0;
                    for (let i = 0; i < 2048; i++) {
                        const vL = ringBuffer[readPtr]; const vR = ringBuffer[(readPtr + 1) % BUFFER_SIZE];
                        outL[i] = vL; outR[i] = vR;
                        maxVal = Math.max(maxVal, Math.abs(vL), Math.abs(vR));
                        readPtr = (readPtr + 2) % BUFFER_SIZE;
                    }
                    lastLevel = maxVal;
                };
                scriptNode.connect(audioCtx.destination);
            }

            function tryUnlock() {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                if (audioCtx.state === 'suspended') audioCtx.resume().then(() => { if (audioCtx.state === 'running') startAudio(); });
                else if (audioCtx.state === 'running') startAudio();
            }

            function renderState(state) {
                if (!state) return;
                if (state.transport) document.getElementById('m-time').textContent = state.transport.position;
                if (state.samples) state.samples.forEach((s,i) => {
                    var b = document.getElementById('sample-'+(i+1)); if (b) b.className = s.isPlaying ? 'sample-btn active' : 'sample-btn';
                });
                if (state.tracks) state.tracks.forEach((t,i) => {
                    var m = document.getElementById('t-meter-'+i); if (m) m.style.width = (t.meterL * 100) + '%';
                    var tm = document.getElementById('t-time-'+i); if (tm) tm.textContent = state.transport.position;
                });
                var mm = document.getElementById('m-meter-bar'); if (mm) mm.style.width = (lastLevel * 100) + '%';
                tryUnlock();
            }

            function connect(url) {
                ws = new WebSocket(url); ws.binaryType = 'arraybuffer';
                ws.onmessage = (e) => {
                    if (e.data instanceof ArrayBuffer) {
                        const pcm = new Float32Array(e.data);
                        for (let i = 0; i < pcm.length; i++) { ringBuffer[writePtr] = pcm[i]; writePtr = (writePtr + 1) % BUFFER_SIZE; }
                    } else {
                        try { var m = JSON.parse(e.data); if (m.type === 'STATE_UPDATE') renderState(m.state); } catch(x){}
                    }
                };
            }

            window.onload = function() {
                buildGUI();
                const context = cast.framework.CastReceiverContext.getInstance();
                context.getPlayerManager().setMessageInterceptor(cast.framework.messages.MessageType.LOAD, (req) => {
                    if (req.media && req.media.contentId) {
                        const u = new URL(req.media.contentId);
                        const wsUrl = u.searchParams.get('ws');
                        if (wsUrl) connect("ws://" + wsUrl);
                    }
                    return req;
                });
                context.start({ disableIdleTimeout: true });
                window.addEventListener('resize', updateScale);
                setInterval(() => {
                    document.getElementById('as-meter').style.width = (lastLevel * 100) + '%';
                    if (audioCtx) document.getElementById('as-val').textContent = audioCtx.state.toUpperCase();
                }, 100);
                setInterval(tryUnlock, 1000);
            };
        })();
    </script>
</body>
</html>
