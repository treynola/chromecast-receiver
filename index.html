<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.8.113 [MASTER COLUMN POLISH]</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles_main.css?v=13.8.113">
    <style>
        /* [V13.8.113] Master UI Polish Overrides */
        html, body { background: #000 !important; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        .app-loading { opacity: 1 !important; visibility: visible !important; }
        .container {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(var(--scale, 1)); transform-origin: center;
            opacity: 1 !important; visibility: visible !important; display: flex !important;
            background-color: #000 !important;
            box-shadow: 0 0 0 2px #FAD78E, 0 0 0 4px #FF0000;
        }
        #cursor-mirror {
            position: absolute; width: 14px; height: 14px; background: rgba(255, 0, 0, 0.9); 
            border-radius: 50%; pointer-events: none; z-index: 10000; border: 2px solid white; 
            display: none; box-shadow: 0 0 8px rgba(0,0,0,0.5);
            transition: transform 0.1s cubic-bezier(0.1, 0, 0.2, 1);
            will-change: transform;
        }
        cast-media-player { display: none; }
        .master-column, .track { height: 100%; box-sizing: border-box; overflow: hidden; }
        .main-content {
            display: grid !important;
            grid-template-columns: repeat(5, 1fr) !important;
            gap: 6px !important;
            width: 100% !important;
            height: calc(100% - 60px) !important;
        }
        /* Fix for bottom buttons styling */
        .master-bottom-buttons button {
            flex: 1; height: 24px; font-size: 0.6em; background: #333; color: var(--gold); border: 1px solid var(--mid-gray); border-radius: 3px;
        }
        .sample-btn { font-size: 0.7em !important; height: 24px !important; }
    </style>
</head>
<body class="app-loading">
    <audio id="silent-loop" loop muted autoplay src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA="></audio>
    <cast-media-player></cast-media-player>
    <div id="cursor-mirror"></div>

    <div class="container" id="studio-root">
        <div class="header">
            <div class="header-left"><h1 style="font-size:1.5em; margin:0; font-family: 'Mexcellent', sans-serif; color: #FAD78E;">NOWMULTIMEDIA MXS-004</h1></div>
            <div class="header-right"><h2 style="font-size:0.85em; margin:0; padding:0; font-family: 'Mexcellent', sans-serif; color: #FAD78E;">Mix N Studio 004 :: MIRROR</h2></div>
        </div>

        <div class="main-content" id="main-grid">
            <!-- Column 1: Master (Guide-based Layout) -->
            <div class="master-column" id="master-column">
                <div class="track-header">Master Recording:</div>
                <div id="recording-time-display" class="track-time-display">00:00:00</div>

                <div class="master-item master-volume-aligned" style="display: flex; align-items: center; gap: 4px; margin-top: 4px;">
                    <label class="master-label" style="font-size: 0.72em; margin: 0; color:var(--green);">Vol</label>
                    <input type="range" id="master-volume" class="pa-mic-slider" min="-60" max="6" step="0.1" value="0" style="flex:1;">
                    <span id="master-volume-value" class="pa-mic-value" style="font-size: 0.72em; min-width:45px;">0.0 dB</span>
                </div>

                <div class="master-item master-waveform-item" style="margin-top: 4px;">
                    <div class="waveform-box master-waveform-box">
                        <div class="waveform-labels">
                            <div class="waveform-label-external" style="margin-top: 2px;">L</div>
                            <div class="waveform-label-external">R</div>
                        </div>
                        <div id="master-waveform-container" class="waveform-canvas-container" style="flex:1;">
                            <canvas id="master-waveform-L" class="waveform-canvas" width="242" height="24"></canvas>
                            <canvas id="master-waveform-R" class="waveform-canvas" width="242" height="24"></canvas>
                        </div>
                    </div>
                </div>

                <div class="master-item master-row-layout" style="display: flex; align-items: center; gap: 4px; margin-top: 4px;">
                    <label class="master-label" style="font-size: 0.72em; margin: 0; color:var(--gold);">Loop Length</label>
                    <input type="range" id="loop-length" class="pa-mic-slider" min="0.5" max="180" step="0.1" value="4" style="flex:1;">
                    <span id="loop-length-value" class="pa-mic-value" style="font-size: 0.72em; min-width:35px; color:var(--gold);">4.0s</span>
                </div>

                <div class="master-item master-bottom-item">
                    <div class="master-rec-row" style="display:flex; flex-direction:row; gap:5px; margin-top:6px;">
                        <button id="master-record-button" class="rec-btn" style="height:24px; font-size:0.7em; padding:2px 8px;">REC</button>
                        <select id="record-as-select" style="height:24px; font-size:0.7em; background:#333; color:var(--gold); border:1px solid var(--gold); border-radius:4px; flex:1;">
                            <option value="master">Stereo (WAV)</option>
                            <option value="mp4">Stereo (MP4)</option>
                            <option value="stems">Stems (WAV)</option>
                        </select>
                    </div>
                </div>

                <div class="lfo-side-by-side-container" style="display:flex; justify-content:space-between; margin-top:12px; gap:8px;">
                    <div class="lfo-column" style="flex:1; display:flex; flex-direction:column; gap:4px;">
                        <button id="lfo-toggle" style="width:100%; height:20px; font-size:0.65em;">LFO 1</button>
                        <div class="meter-container lfo-meter" style="height:4px;"><div id="lfo-meter-bar" class="meter-bar"></div></div>
                        <div class="master-item lfo-sweep-control">
                            <label style="font-size:0.65em; margin:0; color:var(--green);">Sweep 1</label>
                            <div style="display:flex; align-items:center; gap:3px;"><input type="range" id="lfo-time" min="0.1" max="20" class="pa-mic-slider" style="flex:1; height:8px;"><span id="lfo-time-value" class="master-value" style="font-size:0.65em; color:var(--gold);">1.8s</span></div>
                        </div>
                    </div>
                    <div class="lfo-separator" style="width:1px; background:var(--gold);"></div>
                    <div class="lfo-column" style="flex:1; display:flex; flex-direction:column; gap:4px;">
                        <button id="lfo2-toggle" style="width:100%; height:20px; font-size:0.65em;">LFO 2</button>
                        <div class="meter-container lfo-meter" style="height:4px;"><div id="lfo2-meter-bar" class="meter-bar"></div></div>
                        <div class="master-item lfo-sweep-control">
                            <label style="font-size:0.65em; margin:0; color:var(--green);">Sweep 2</label>
                            <div style="display:flex; align-items:center; gap:3px;"><input type="range" id="lfo2-time" min="0.1" max="20" class="pa-mic-slider" style="flex:1; height:8px;"><span id="lfo2-time-value" class="master-value" style="font-size:0.65em; color:var(--gold);">1.8s</span></div>
                        </div>
                    </div>
                </div>

                <div class="master-item sample-center-container" style="margin-top:8px;">
                    <div class="track-header" style="text-align:center;">Sample Station</div>
                    <div class="sample-grid" id="sample-grid" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:5px; margin-top:5px;">
                        <!-- Pads injected by script or static -->
                    </div>
                </div>

                <div class="master-bottom-buttons" style="margin-top:auto; display:flex; flex-direction:row; gap:4px; padding-bottom:5px;">
                    <button id="import-files-button">IMPORT</button>
                    <button id="show-docs-button">DOCS</button>
                    <button id="sample-station-button">MEDIA</button>
                    <button id="settings-button">SETTINGS</button>
                </div>
                <div class="meter-container"><div id="master-meter-bar" class="meter-bar"></div></div>
            </div>
            <!-- Dynamic Tracks Column 2-5 will be injected here -->
        </div>
    </div>

    <script>
        (function() {
            var audioCtx = null; var scriptNode = null; var ws = null; var lastUrl = null;
            var BUFFER_SIZE = 192000; var ringBuffer = new Float32Array(BUFFER_SIZE);
            var wPtr = 0; var rPtr = 0; var pk = 0;
            
            function buildGUI() {
                var g = document.getElementById('sample-grid');
                for (var p = 1; p <= 20; p++) {
                    var b = document.createElement('button'); b.className = 'sample-btn'; b.id = 'sample-' + p; b.textContent = p; g.appendChild(b);
                }
                var grid = document.getElementById('main-grid');
                for (var i = 0; i < 4; i++) {
                    var t = document.createElement('div'); t.className = 'track'; t.id = 'track-' + i;
                    t.innerHTML = `
                        <div class="track-header">TRACK ${i+1}</div>
                        <div class="track-time-display" id="t-time-${i}">00:00:00</div>
                        <div class="status-indicator status-ready" id="t-st-${i}">Ready</div>
                        <div class="waveform-box">
                            <div class="waveform-labels"><div class="waveform-label-external">L</div><div class="waveform-label-external">R</div></div>
                            <div class="waveform-canvas-container">
                                <canvas class="waveform-canvas" id="t-wf-l-${i}"></canvas>
                                <canvas class="waveform-canvas" id="t-wf-r-${i}"></canvas>
                                <div class="loop-marker loop-start-marker" id="t-ls-m-${i}"></div>
                                <div class="loop-marker loop-end-marker" id="t-le-m-${i}"></div>
                            </div>
                        </div>
                        <div class="control-group">
                            <div class="track-input-layout"><label style="font-size:0.72em;">Input</label>
                            <span id="t-file-${i}" style="font-size:0.62em; color:var(--gold); white-space:nowrap; overflow:hidden;">(Empty)</span></div>
                        </div>
                        <div class="control-group pa-mic-adjustment" style="display:flex; margin-top:2px;">
                            <label style="font-size:0.65em;">Gain</label>
                            <input type="range" class="pa-mic-slider" id="t-ig-sl-${i}" min="-48" max="48" step="0.1" value="0">
                        </div>
                        <div class="track-buttons">
                            <button id="t-btn-rec-${i}">REC</button><button id="t-btn-stop-${i}">STOP</button>
                            <button id="t-btn-play-${i}">PLAY</button><button id="t-btn-rev-${i}">REV</button>
                        </div>
                        <div class="fx-chain-container" style="margin-top:2px;">
                            <div class="fx-chain-controls" id="t-fx-chain-${i}" style="gap:2px;">
                                ${[0,1,2,3,4,5,6].map(slot => `<div class="fx-chain-slot" style="margin:0;"><input type="checkbox" id="t-fx-${i}-${slot}" style="margin:0;"><label style="font-size:0.6em;">${slot+1}</label></div>`).join('')}
                            </div>
                        </div>
                        <div class="main-controls" style="margin-top:2px; gap:2px; grid-template-columns:repeat(2,1fr);">
                            ${['Pitch','Vol','Pan','Treble','Mid','Bass'].map(p => `
                                <div class="knob-container">
                                    <div class="knob-label-group"><label style="font-size:0.55em;">${p}</label><span class="param-value" id="t-${p.toLowerCase()}-val-${i}" style="font-size:0.55em;">0</span></div>
                                    <input type="range" id="t-${p.toLowerCase()}-sl-${i}" class="pa-mic-slider" style="height:6px;">
                                </div>
                            `).join('')}
                        </div>
                        <div class="meter-container" style="margin-top:auto;"><div id="t-mtr-${i}" class="meter-bar"></div></div>
                    `;
                    grid.appendChild(t);
                }
                updateScale();
            }

            function updateScale() {
                const winW = window.innerWidth; const winH = window.innerHeight;
                document.documentElement.style.setProperty('--scale', Math.min(winW/1440, winH/810) * 0.98);
            }

            function tryUnlock() {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                if (audioCtx.state === 'suspended') audioCtx.resume().then(() => { if (audioCtx.state === 'running') startAudio(); });
                else if (audioCtx.state === 'running') startAudio();
            }

            function startAudio() {
                if (scriptNode) return;
                scriptNode = audioCtx.createScriptProcessor(2048, 0, 2);
                scriptNode.onaudioprocess = (e) => {
                    const oL = e.outputBuffer.getChannelData(0); const oR = e.outputBuffer.getChannelData(1);
                    const av = (wPtr - rPtr + BUFFER_SIZE) % BUFFER_SIZE;
                    if (av < 8192) { oL.fill(0); oR.fill(0); return; }
                    let mx = 0;
                    for (let i = 0; i < 2048; i++) {
                        const vL = ringBuffer[rPtr]; const vR = ringBuffer[(rPtr+1)%BUFFER_SIZE];
                        oL[i] = vL; oR[i] = vR;
                        mx = Math.max(mx, Math.abs(vL), Math.abs(vR));
                        rPtr = (rPtr+2)%BUFFER_SIZE;
                    }
                    pk = mx;
                };
                scriptNode.connect(audioCtx.destination);
            }

            function renderState(s) {
                if (!s) return;
                if (s.transport) {
                    document.getElementById('recording-time-display').textContent = s.transport.position;
                    for(var i=0; i<4; i++) { var tt = document.getElementById('t-time-'+i); if(tt) tt.textContent = s.transport.position; }
                }
                if (s.cursor) {
                    var cur = document.getElementById('cursor-mirror');
                    if (cur) { cur.style.display = 'block'; cur.style.transform = 'translate3d('+(s.cursor.x * window.innerWidth)+'px, '+(s.cursor.y * window.innerHeight)+'px, 0)'; }
                }
                if (s.master) {
                    var mVol = document.getElementById('master-volume'); if (mVol) mVol.value = s.master.volume || 0;
                    var mVal = document.getElementById('master-volume-value'); if (mVal) mVal.textContent = (s.master.volume || 0).toFixed(1) + ' dB';
                    var loopSl = document.getElementById('loop-length'); if (loopSl) loopSl.value = s.master.loopLength || 4.0;
                    var loopVal = document.getElementById('loop-length-value'); if (loopVal) loopVal.textContent = (s.master.loopLength || 4.0).toFixed(1) + 's';
                    var mRec = document.getElementById('master-record-button'); if (mRec) mRec.className = s.master.isRecording ? 'rec-btn recording' : 'rec-btn';
                    
                    var l1Btn = document.getElementById('lfo-toggle'); if (l1Btn) l1Btn.className = s.master.lfo1Active ? 'sweeping' : '';
                    var l2Btn = document.getElementById('lfo2-toggle'); if (l2Btn) l2Btn.className = s.master.lfo2Active ? 'sweeping' : '';
                    var l1Sl = document.getElementById('lfo-time'); if (l1Sl) l1Sl.value = 1.0 / (s.master.lfo1Freq || 0.5);
                    var l1Val = document.getElementById('lfo-time-value'); if (l1Val) l1Val.textContent = (1.0 / (s.master.lfo1Freq || 0.5)).toFixed(1) + 's';
                }
                if (s.sampler) s.sampler.forEach((p,i) => {
                    var b = document.getElementById('sample-'+(i+1)); if (b) b.className = p.active ? 'sample-btn active' : (p.loaded ? 'sample-btn loaded' : 'sample-btn');
                });
                if (s.tracks) s.tracks.forEach((t,i) => {
                    var fn = document.getElementById('t-file-'+i); if (fn) fn.textContent = t.fileName || '(Empty)';
                    var m = document.getElementById('t-mtr-'+i); if (m) m.style.width = (t.meters?.l * 100 || 0) + '%';
                    var bRec = document.getElementById('t-btn-rec-'+i); if (bRec) bRec.className = t.isRecording ? 'recording' : '';
                    var bPlay = document.getElementById('t-btn-play-'+i); if (bPlay) bPlay.className = t.isPlaying ? 'playing' : '';
                    var st = document.getElementById('t-st-'+i);
                    if (st) {
                        st.textContent = t.isRecording ? 'Recording' : (t.isPlaying ? 'Playing' : 'Ready');
                        st.className = 'status-indicator ' + (t.isRecording ? 'status-recording' : (t.isPlaying ? 'status-playing' : 'status-ready'));
                    }
                    ['pitch','vol','pan','treble','mid','bass'].forEach(p => {
                        var sl = document.getElementById('t-'+p+'-sl-'+i); if (sl) sl.value = t[p] || 0;
                        var val = document.getElementById('t-'+p+'-val-'+i); if (val) val.textContent = (t[p] || 0).toFixed(1);
                    });
                    var ls = document.getElementById('t-ls-m-'+i); if (ls) ls.style.left = (t.loopStart * 100) + '%';
                    var le = document.getElementById('t-le-m-'+i); if (le) le.style.left = (t.loopEnd * 100) + '%';
                    if (t.effects) t.effects.forEach(fx => {
                        var fxc = document.getElementById('t-fx-'+i+'-'+fx.slot);
                        if (fxc) fxc.checked = fx.enabled;
                    });
                });
                var mm = document.getElementById('master-meter-bar'); if (mm) mm.style.width = (pk * 100) + '%';
                tryUnlock();
            }

            function connect(url) {
                if (ws && ws.readyState === WebSocket.OPEN) return;
                lastUrl = url;
                ws = new WebSocket(url); ws.binaryType = 'arraybuffer';
                ws.onmessage = (e) => {
                    if (e.data instanceof ArrayBuffer) {
                        const i16 = new Int16Array(e.data);
                        for (let i = 0; i < i16.length; i++) { ringBuffer[wPtr] = i16[i] / 32768.0; wPtr = (wPtr + 1) % BUFFER_SIZE; }
                    } else {
                        try { var d = JSON.parse(e.data); if (d.type === 'STATE_UPDATE') renderState(d.state); } catch(x){}
                    }
                };
                ws.onclose = () => { setTimeout(() => { if(lastUrl) connect(lastUrl); }, 2000); };
            }

            window.onload = function() {
                buildGUI();
                const ctx = cast.framework.CastReceiverContext.getInstance();
                ctx.getPlayerManager().setMessageInterceptor(cast.framework.messages.MessageType.LOAD, (r) => {
                    if (r.media && r.media.contentId) {
                        const u = new URL(r.media.contentId); const w = u.searchParams.get('ws');
                        if (w) connect("ws://" + w);
                    }
                    return r;
                });
                ctx.start({ disableIdleTimeout: true });
                window.addEventListener('resize', updateScale);
                setInterval(tryUnlock, 1000);
            };
        })();
    </script>
</body>
</html>
