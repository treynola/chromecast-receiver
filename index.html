<!DOCTYPE html>
<html>

<head>
    <title>MXS-004 Cast Receiver v6.6</title>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #main-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #stream-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            background: #000;
            image-rendering: -webkit-optimize-contrast;
        }

        .overlay {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #b38600;
            text-align: center;
            z-index: 1000;
        }

        .status-title {
            font-size: 28px;
            font-weight: bold;
            color: #b38600;
            margin-bottom: 10px;
        }

        .status-msg {
            font-size: 18px;
            color: #ccc;
        }

        #unmute-overlay {
            position: absolute;
            top: 30px;
            right: 30px;
            background: #b38600;
            color: #000;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            display: none;
            font-weight: 800;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(179, 134, 0, 0.6);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(-5px);
            }
        }

        #log-overlay {
            position: absolute;
            bottom: 40px;
            left: 10px;
            font-size: 10px;
            color: #888;
            width: 400px;
            max-height: 150px;
            overflow: hidden;
            text-align: left;
            pointer-events: none;
        }

        .version-tag {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            opacity: 0.3;
        }
    </style>
</head>

<body>
    <div id="main-container">
        <img id="stream-img" alt="Studio Feed">
        <div id="unmute-overlay" onclick="resumeAudio()">CLICK TO ENABLE AUDIO 🔊</div>
        <div id="status-overlay" class="overlay">
            <div class="status-title">MXS-004 STUDIO</div>
            <div id="status-msg" class="status-msg">v6.6 READY</div>
        </div>
        <div id="log-overlay"></div>
        <div class="version-tag">Receiver v6.6 (High-Performance Sync)</div>
    </div>
    <script>
        const streamImg = document.getElementById('stream-img');
        const statusOverlay = document.getElementById('status-overlay');
        const statusMsg = document.getElementById('status-msg');
        const unmuteOverlay = document.getElementById('unmute-overlay');
        const logOverlay = document.getElementById('log-overlay');
        
        const VERSION = "v6.6";
        let isCasting = false;
        let audioCtx = null;
        let nextStartTime = 0;

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logOverlay.prepend(div);
            if (logOverlay.children.length > 8) logOverlay.removeChild(logOverlay.lastChild);
            console.log(msg);
        }

        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 44100,
                    latencyHint: 'interactive'
                });
                addLog("🔊 Web Audio Context Initialized");
                if (audioCtx.state === 'suspended') {
                    unmuteOverlay.style.display = 'block';
                }
            } catch (e) {
                addLog("❌ Audio Initialization Failed: " + e);
            }
        }

        function resumeAudio() {
            if (audioCtx) {
                audioCtx.resume().then(() => {
                    addLog("✅ Audio Resumed");
                    unmuteOverlay.style.display = 'none';
                });
            }
        }

        function playAudioChunk(base64Data) {
            if (!audioCtx || audioCtx.state !== 'running') return;

            const binaryString = window.atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            
            // PCM16 to Float32
            const i16 = new Int16Array(bytes.buffer);
            const f32 = new Float32Array(i16.length);
            for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768.0;

            const buffer = audioCtx.createBuffer(1, f32.length, 44100);
            buffer.getChannelData(0).set(f32);

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);

            const currentTime = audioCtx.currentTime;
            if (nextStartTime < currentTime) nextStartTime = currentTime + 0.05;
            
            source.start(nextStartTime);
            nextStartTime += buffer.duration;
        }

        function startStream(baseUrl) {
            if (isCasting) return;
            addLog("🚀 Starting Live Stream: " + baseUrl);
            isCasting = true;
            statusOverlay.style.display = 'none';
            initAudio();

            streamImg.src = baseUrl + "/stream.mjpeg?t=" + Date.now();
            streamImg.style.display = 'block';
            
            streamImg.onerror = () => {
                addLog("❌ Video feed failed - Retrying in 3s");
                isCasting = false;
                setTimeout(() => startStream(baseUrl), 3000);
            };
        }

        window.onload = () => {
            addLog(`v${VERSION} Initialized`);
            try {
                const context = cast.framework.CastReceiverContext.getInstance();
                const playerManager = context.getPlayerManager();
                
                context.addCustomMessageListener('urn:x-cast:com.nowmultimedia.mxs004', (event) => {
                    if (!event.data) return;
                    
                    if (event.data.type === 'audio_chunk') {
                        playAudioChunk(event.data.data);
                    } else if (event.data.stream_url) {
                        const baseUrl = event.data.stream_url.split('/stream.mjpeg')[0];
                        startStream(baseUrl);
                    }
                });

                playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, data => {
                    addLog("📥 LOAD intercept");
                    if (data.media && data.media.contentId) {
                        const baseUrl = data.media.contentId.split('/stream.mjpeg')[0];
                        startStream(baseUrl);
                    }
                    return data;
                });

                context.start();
                addLog("✅ Cast SDK Started");
            } catch (e) { addLog("⚠️ SDK Standalone"); }
        };
    </script>
</body>

</html>
