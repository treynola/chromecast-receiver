<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.8.76</title>
    <!-- Cast SDK -->
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <!-- Studio Styles (Inlined for reliability on TV) -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Overlay and Cursor tweaks */
        #init-overlay {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #debug-log {
            position: fixed; bottom: 10px; left: 10px; right: 10px;
            max-height: 120px; overflow-y: auto; background: rgba(0,0,0,0.8);
            border: 1px solid #333; color: #0f0; font-family: monospace; font-size: 11px;
            z-index: 100000; padding: 10px; border-radius: 8px; pointer-events: none;
        }
        #ghost-cursor {
            position: absolute; width: 24px; height: 24px; background: rgba(250, 215, 142, 0.4);
            border: 2px solid var(--gold); border-radius: 50%; pointer-events: none;
            z-index: 90000; transform: translate(-50%, -50%); display: none;
        }
        #ghost-cursor.clicking { background: var(--red); transform: translate(-50%, -50%) scale(0.8); }
        .track-time-display { font-family: monospace !important; }
        .container { opacity: 0; transition: opacity 1s ease-in; }
    </style>
</head>
<body class="app-loading" style="background-color: #000;">
    <div id="init-overlay">
        <div style="font-family: 'Mexcellent', sans-serif; color: var(--gold); font-size: 3em; margin-bottom: 20px;">MXS-004</div>
        <div style="color: #666; font-family: monospace;" id="init-status">INITIALIZING HIGH-FIDELITY MIRROR...</div>
    </div>

    <div id="debug-log">🚀 Receiver v13.8.76 Booting...</div>
    <div id="ghost-cursor"></div>

    <!-- The actual Studio HTML structure -->
    <div class="container" id="studio-root">
        <div class="header">
            <div class="header-left">
                <h1 style="font-family: 'Mexcellent', sans-serif; color: var(--gold);">NOWMULTIMEDIA MXS-004</h1>
            </div>
            <div class="header-right">
                <h2 style="font-family: 'Mexcellent', sans-serif; color: var(--gold);">Studio Mirror :: v13.8.76</h2>
            </div>
        </div>
        <div class="main-content">
            <div class="master-column">
                <div class="track-header">Master Recording</div>
                <div id="master-time" class="track-time-display">00:00:00</div>
                <div class="master-item"><input type="range" id="master-volume" min="-60" max="6" value="0"></div>
                <div class="waveform-box">
                    <div class="waveform-canvas-container">
                        <canvas id="master-wf-L" class="waveform-canvas" width="242" height="26"></canvas>
                        <canvas id="master-wf-R" class="waveform-canvas" width="242" height="26"></canvas>
                    </div>
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <div style="flex:1;"><div class="meter-container"><div id="lfo-meter-bar" class="meter-bar"></div></div></div>
                    <div style="flex:1;"><div class="meter-container"><div id="lfo2-meter-bar" class="meter-bar"></div></div></div>
                </div>
                <button id="master-record-button" class="rec-btn" style="width:100%; margin-top:10px;">REC</button>
            </div>
            <div class="tracks-container" id="tracks-container">
                <!-- Tracks 0-3 will be injected/mirrored here -->
            </div>
        </div>
    </div>

    <script src="receiver.js"></script>
</body>
</html>
