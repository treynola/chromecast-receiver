<!DOCTYPE html>
<html>

<head>
    <title>MXS-004 Receiver v10 (Audio URL Sync)</title>
    <meta name="viewport" content="width=1920, initial-scale=1">
    <meta charset="UTF-8">
    <!-- Cast Receiver SDK for Chromecast bootstrap -->
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <!-- Tone.js for high-quality audio playback -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.3.5/Tone.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #FAD78E;
            --dark-gold: #b38600;
            --green: #008000;
            --red: #FF0000;
        }

        body {
            background: #000;
            color: #f0f0f0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #app-container {
            width: 1920px;
            height: 1080px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center center;
        }

        #video-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #status-bar {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
            color: var(--gold);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .overlay-title {
            font-size: 48px;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .overlay-msg {
            font-size: 24px;
            color: #aaa;
            margin-bottom: 40px;
        }

        .start-btn {
            padding: 20px 40px;
            font-size: 32px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #remote-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            background: var(--gold);
            border-radius: 50%;
            margin-left: -10px;
            margin-top: -10px;
            display: none;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
    </style>
</head>

<body>
    <div id="app-container">
        <canvas id="video-canvas" width="1920" height="1080"></canvas>
    </div>

    <div id="remote-cursor"></div>

    <div id="status-bar">
        FPS: <span id="fps">0</span> |
        Latency: <span id="lat">0</span>ms |
        Audio: <span id="audio-status">OFF</span> |
        Tracks: <span id="track-status">0/0</span>
    </div>

    <div id="start-overlay" class="overlay">
        <div class="overlay-title">MXS-004 RECEIVER v10</div>
        <div class="overlay-msg">Audio URL Sync Mode (Low Bandwidth)</div>
        <button class="start-btn" onclick="startReceiver()">START MONITORING</button>
    </div>

    <script>
        // === CONFIG ===
        const MSG_VIDEO = 0x01;
        const MSG_AUDIO = 0x02;  // Legacy PCM (won't use)
        const MSG_META = 0x03;   // JSON state

        // === STATE ===
        let ws = null;
        let canvas, ctx;
        let frameCount = 0;
        let lastFrameTime = performance.now();
        let serverBaseUrl = '';

        // === AUDIO STATE (Tone.js) ===
        const trackPlayers = [];
        const trackStates = [];
        let masterVolume;
        let audioInitialized = false;

        // === INIT ===
        function initUI() {
            canvas = document.getElementById('video-canvas');
            ctx = canvas.getContext('2d');
            window.addEventListener('resize', scaleApp);
            scaleApp();
        }

        function scaleApp() {
            const container = document.getElementById('app-container');
            const scaleX = window.innerWidth / 1920;
            const scaleY = window.innerHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            container.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }

        async function initAudio() {
            if (audioInitialized) return;

            await Tone.start();
            console.log('🔊 Tone.js AudioContext started');

            // Create master volume
            masterVolume = new Tone.Volume(0).toDestination();

            // Create 8 track players
            for (let i = 0; i < 8; i++) {
                const player = new Tone.Player({
                    fadeIn: 0.01,
                    fadeOut: 0.01,
                    loop: true
                });
                const volume = new Tone.Volume(0);
                const panner = new Tone.Panner(0);

                player.connect(volume).connect(panner).connect(masterVolume);

                trackPlayers.push({
                    player,
                    volume,
                    panner,
                    loadedUrl: null,
                    isPlaying: false
                });

                trackStates.push({
                    volume: 0.7,
                    pan: 0,
                    mute: false,
                    solo: false,
                    playing: false,
                    position: 0,
                    audioUrl: null
                });
            }

            audioInitialized = true;
            document.getElementById('audio-status').textContent = 'READY';
            console.log('✅ Audio system initialized (8 tracks)');
        }

        async function startReceiver(wsUrlOverride) {
            document.getElementById('start-overlay').style.display = 'none';

            // Init audio
            await initAudio();

            // Get WebSocket URL
            const params = new URLSearchParams(window.location.search);
            const wsUrl = wsUrlOverride || params.get('ws') || `ws://${window.location.hostname}:8090`;

            // Extract server base URL for audio files
            const wsHost = new URL(wsUrl).hostname;
            serverBaseUrl = `http://${wsHost}:8089`;
            console.log('📡 Server base URL:', serverBaseUrl);

            connect(wsUrl);
        }

        // === HYBRID BOOTSTRAP ===
        let pendingWsUrl = null;
        window.addEventListener('load', () => {
            initUI();

            const params = new URLSearchParams(window.location.search);
            if (params.has('ws')) {
                console.log('🚀 Auto-starting (ws param found)');
                startReceiver();
                return;
            }

            if (typeof cast !== 'undefined' && cast.framework) {
                console.log('📺 Chromecast Mode: Initializing Cast SDK');
                const NAMESPACE = 'urn:x-cast:com.nowmultimedia.mxs004';
                const context = cast.framework.CastReceiverContext.getInstance();

                context.addCustomMessageListener(NAMESPACE, (event) => {
                    console.log('📩 Cast message:', event.data);
                    if (event.data?.type === 'connect' && event.data.wsUrl) {
                        startReceiver(event.data.wsUrl);
                    }
                });

                const options = new cast.framework.CastReceiverOptions();
                options.disableIdleTimeout = true;
                context.start(options);
            }
        });

        // === WEBSOCKET ===
        function connect(url) {
            console.log('🔌 Connecting to:', url);
            ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                document.getElementById('audio-status').textContent = 'CONNECTED';
                console.log('✅ WebSocket connected');
            };

            let msgCounts = { video: 0, meta: 0 };

            ws.onmessage = async (e) => {
                const data = e.data;
                if (!(data instanceof ArrayBuffer)) return;

                const view = new Uint8Array(data);
                const type = view[0];
                const content = data.slice(1);

                switch (type) {
                    case MSG_VIDEO:
                        msgCounts.video++;
                        handleVideo(content);
                        break;
                    case MSG_META:
                        msgCounts.meta++;
                        handleMeta(content);
                        break;
                    // MSG_AUDIO (0x02) is ignored - we use URL-based playback
                }

                if ((msgCounts.video + msgCounts.meta) % 100 === 0) {
                    console.log(`📊 WS: ${msgCounts.video} video, ${msgCounts.meta} meta`);
                }
            };

            ws.onclose = () => {
                console.log('🔌 Connection lost, reconnecting...');
                setTimeout(() => connect(url), 2000);
            };
        }

        // === VIDEO HANDLER ===
        function handleVideo(buffer) {
            const blob = new Blob([buffer], { type: 'image/jpeg' });
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, 1920, 1080);
                URL.revokeObjectURL(url);

                frameCount++;
                const now = performance.now();
                if (now - lastFrameTime > 1000) {
                    document.getElementById('fps').textContent = frameCount;
                    frameCount = 0;
                    lastFrameTime = now;
                }
            };
            img.src = url;
        }

        // === META HANDLER (JSON State) ===
        function handleMeta(buffer) {
            const str = new TextDecoder().decode(buffer);
            try {
                const state = JSON.parse(str);
                updateState(state);
            } catch (e) {
                console.error('Meta parse error:', e);
            }
        }

        // === STATE UPDATE ===
        async function updateState(state) {
            if (state.timestamp) {
                document.getElementById('lat').textContent = Date.now() - state.timestamp;
            }

            // Update cursor
            if (state.cursor) {
                const cursor = document.getElementById('remote-cursor');
                cursor.style.display = state.cursor.visible ? 'block' : 'none';
                cursor.style.left = (state.cursor.x * window.innerWidth) + 'px';
                cursor.style.top = (state.cursor.y * window.innerHeight) + 'px';
            }

            // Update tracks
            if (state.tracks && audioInitialized) {
                let playingCount = 0;
                let loadedCount = 0;

                for (let i = 0; i < Math.min(state.tracks.length, 8); i++) {
                    const t = state.tracks[i];
                    const tp = trackPlayers[i];

                    if (!tp) continue;

                    // Update volume (convert gain 0-1 to dB)
                    const dbVol = t.mute ? -Infinity : (20 * Math.log10(Math.max(t.volume, 0.0001)));
                    tp.volume.volume.value = dbVol;

                    // Update pan
                    tp.panner.pan.value = t.pan || 0;

                    // Load audio URL if changed
                    if (t.audioUrl && t.audioUrl !== tp.loadedUrl) {
                        try {
                            console.log(`🎵 Track ${i}: Loading ${t.audioUrl}`);
                            await tp.player.load(t.audioUrl);
                            tp.loadedUrl = t.audioUrl;
                            loadedCount++;
                        } catch (e) {
                            console.error(`Failed to load track ${i}:`, e);
                        }
                    }

                    // Sync playback
                    if (t.playing && tp.player.loaded) {
                        if (!tp.isPlaying) {
                            tp.player.start(undefined, t.position || 0);
                            tp.isPlaying = true;
                            console.log(`▶️ Track ${i}: Started at ${t.position}s`);
                        }
                        playingCount++;
                    } else if (!t.playing && tp.isPlaying) {
                        tp.player.stop();
                        tp.isPlaying = false;
                        console.log(`⏹️ Track ${i}: Stopped`);
                    }
                }

                document.getElementById('track-status').textContent = `${playingCount}/8`;
                if (playingCount > 0) {
                    document.getElementById('audio-status').textContent = `PLAYING (${playingCount})`;
                }
            }

            // Update master
            if (state.master && masterVolume) {
                const dbVol = 20 * Math.log10(Math.max(state.master.volume, 0.0001));
                masterVolume.volume.value = dbVol;
            }
        }

        // Init
        console.log('🎬 MXS-004 Receiver v10 loaded');
    </script>
</body>

</html>
