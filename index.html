<!DOCTYPE html>
<html lang="en">

<head>
    <title>MXS-004 PRO MONITOR V9.4</title>
    <meta name="viewport" content="width=1920, initial-scale=1">
    <meta charset="UTF-8">
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #000000 !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            overflow: hidden !important;
        }

        .container {
            width: 98vw !important;
            height: 96vh !important;
            max-width: none !important;
            display: flex !important;
            flex-direction: column !important;
            padding: 15px !important;
            margin: 0 !important;
            box-sizing: border-box !important;
            box-shadow: 0 0 0 5px var(--green), 0 0 0 10px var(--gold), 0 0 0 15px var(--red), 0 10px 40px rgba(0, 0, 0, 0.8) !important;
            border-radius: 15px !important;
            background-color: var(--dark-gray) !important;
        }

        /* Essential Layout Mirroring */
        .header {
            margin-bottom: 10px !important;
            flex-shrink: 0;
        }

        /* NEW: 5-Column Layout mirrored from app */
        .main-content {
            flex: 1 !important;
            display: grid !important;
            grid-template-columns: repeat(5, 280px) !important;
            gap: 10px !important;
            padding: 8px !important;
            overflow: hidden !important;
        }

        .master-column {
            grid-row: span 2 !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 4px !important;
            overflow-y: auto !important;
            padding: 6px !important;
            background-color: var(--dark-gray) !important;
            border-radius: 10px !important;
            border: 1px solid var(--green) !important;
        }

        .master-item {
            flex-shrink: 0 !important;
            padding: 3px !important;
        }

        .master-label,
        .track-header {
            font-family: 'Mexcellent', sans-serif !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8em !important;
            color: var(--gold) !important;
        }

        .param-value,
        .master-value,
        label,
        .status-indicator,
        .button,
        button,
        select {
            font-family: 'Courier New', Courier, monospace !important;
            font-weight: bold;
        }

        .master-spacer {
            height: 1px !important;
            background: linear-gradient(to right, transparent, var(--gold), transparent) !important;
            margin: 5px 0 !important;
        }

        .master-spacer-invisible {
            height: 5px !important;
        }

        .tracks-container {
            display: contents !important;
        }

        .track {
            height: 100% !important;
            border: 1px solid var(--green) !important;
        }

        /* Disable Interactivity on Receiver */
        input[type="range"] {
            pointer-events: none !important;
        }

        button,
        select {
            pointer-events: none !important;
            cursor: default !important;
        }

        #cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            z-index: 20000;
            display: none;
            pointer-events: none;
            background: rgba(255, 255, 0, 0.5);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px yellow;
        }

        @font-face {
            font-family: 'Mexcellent';
            src: url('fonts/MexcellentRg.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Mexcellent 3D';
            src: url('fonts/Mexcellent3d.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-family: 'Mexcellent', sans-serif;
        }

        #ws-active-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 0.7em;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Courier New', monospace;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--green);
        }

        #audio-unmute-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 30px;
            background: var(--red);
            color: #fff;
            border: 3px solid var(--gold);
            font-family: 'Mexcellent', sans-serif;
            font-size: 1.5em;
            cursor: pointer;
            z-index: 10001;
            display: none;
            border-radius: 8px;
            box-shadow: 0 0 25px var(--red);
            animation: pulse 2s infinite;
        }

        #audio-unmute-btn.visible {
            display: block;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .loader {
            border: 8px solid #333;
            border-top: 8px solid var(--gold);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div class="loader"></div>
        <h1 style="font-size: 3em;">NOWMULTIMEDIA MXS-004</h1>
        <div id="boot-status" style="font-family: monospace; color: #888;">Synchronizing UI...</div>
        <div id="ws-status"
            style="font-family: monospace; font-size: 1.2em; color: #555; margin-top: 10px; background: rgba(20,20,20,0.8); padding: 5px;">
            Waiting for signal...</div>
        <div id="debug-info"
            style="font-family: monospace; font-size: 0.8em; color: #444; margin-top: 20px; max-width: 80%; word-break: break-all;">
        </div>
    </div>

    <div class="container" id="mirror-ui" style="display:none;">
        <div class="header">
            <h1>NOWMULTIMEDIA MXS-004</h1><br>
            <h2> Mix N Studio 004</h2>
        </div>
        <!-- NEW: 5-Column Main Content (Master + 4 Tracks) -->
        <div class="main-content">
            <!-- Column 1: Master Controls -->
            <div class="master-column">
                <!-- 1. Master Recording -->
                <div class="master-item">
                    <div class="track-header">Master Recording:</div>
                    <div id="recording-time-display" class="track-time-display">00:00:00</div>
                </div>

                <!-- 2. Loop Length -->
                <div class="master-item">
                    <div class="track-header">Loop Length</div>
                    <input type="range" id="loop-length" min="0.5" max="180" step="0.1" value="4">
                    <span id="loop-length-value" class="master-value">4.0s</span>
                </div>

                <!-- 3. Master Waveform -->
                <div class="master-item">
                    <div class="waveform-box master-waveform-box">
                        <div class="waveform-labels">
                            <div class="waveform-label-external">L</div>
                            <div class="waveform-label-external">R</div>
                        </div>
                        <div id="master-waveform-container" class="flex-grow">
                            <canvas id="master-waveform-L" class="waveform-canvas"></canvas>
                            <canvas id="master-waveform-R" class="waveform-canvas"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Spacer -->
                <div class="master-spacer"></div>

                <!-- 4. Master Volume -->
                <div class="master-item">
                    <div class="track-header">Master Volume</div>
                    <input type="range" id="master-volume" min="-40" max="6" step="0.1" value="0">
                    <span id="master-volume-value" class="master-value">0.0 dB</span>
                </div>

                <!-- Spacer -->
                <div class="master-spacer-invisible"></div>

                <!-- 5. REC Button -->
                <div class="master-item master-bottom-item">
                    <button id="master-record-button" class="button">REC</button>
                </div>

                <!-- 6. Recording Format -->
                <div class="master-item">
                    <div id="record-format-display"
                        style="font-size: 0.8em; color: var(--gold); border: 1px solid var(--gold); padding: 2px 5px; border-radius: 4px; text-align: center;">
                        Stereo (WAV)</div>
                </div>

                <!-- Spacer -->
                <div class="master-spacer"></div>

                <!-- 7. LFO 1 -->
                <div class="master-item">
                    <button id="lfo-toggle">LFO 1</button>
                </div>

                <!-- 8. LFO 1 Meter -->
                <div class="master-item">
                    <div class="meter-container lfo-meter">
                        <div id="lfo-meter-bar" class="meter-bar"></div>
                    </div>
                </div>

                <!-- 9. Sweep 1 -->
                <div class="master-item">
                    <label for="lfo-time" class="master-label">Sweep 1 (s)</label>
                    <input type="range" id="lfo-time" min="0.1" max="20" step="0.1" value="1.8">
                    <span id="lfo-time-value" class="master-value">1.8s</span>
                </div>

                <!-- Spacer -->
                <div class="master-spacer"></div>

                <!-- 10. LFO 2 -->
                <div class="master-item">
                    <button id="lfo2-toggle">LFO 2</button>
                </div>

                <!-- 11. LFO 2 Meter -->
                <div class="master-item">
                    <div class="meter-container lfo-meter">
                        <div id="lfo2-meter-bar" class="meter-bar"></div>
                    </div>
                </div>

                <!-- 12. Sweep 2 -->
                <div class="master-item">
                    <label for="lfo2-time" class="master-label">Sweep 2 (s)</label>
                    <input type="range" id="lfo2-time" min="0.1" max="20" step="0.1" value="1.8">
                    <span id="lfo2-time-value" class="master-value">1.8s</span>
                </div>

                <!-- Spacer -->
                <div class="master-spacer"></div>

                <!-- 13. Import Button -->
                <div class="master-item">
                    <button id="import-files-button" class="button"><i class="fa-solid fa-file-import"></i>
                        IMPORT</button>
                </div>

                <!-- 14. Docs Button -->
                <div class="master-item">
                    <button id="show-docs-button"><i class="fa-solid fa-book"></i> DOCS</button>
                </div>
            </div>

            <!-- Columns 2-5: Tracks -->
            <div class="tracks-container" id="tracks-container"></div>
        </div>
    </div>

    <div id="cursor"></div>
    <div id="ws-active-status">Waiting for data...</div>
    <button id="audio-unmute-btn" onclick="startAudioManually()">TAP TO START AUDIO</button>

    <script>
        function handleScriptError(src) {
            const status = document.getElementById('ws-active-status');
            if (status) {
                status.innerHTML = `<span style="color:#f44336">❌ Failed to load ${src}. Attempting fallback...</span>`;
            }
            if (src === 'TrackView.js') {
                const s = document.createElement('script');
                s.src = 'src/ui/TrackView.js';
                document.head.appendChild(s);
            }
        }
    </script>
    <script src="TrackView.js" onerror="handleScriptError('TrackView.js')"></script>
    <script>
        let trackViews = [];
        let tracksInited = false;

        function applyState(state) {
            // FIX: Only initialize tracks if they are present in the state AND not already inited
            if (!tracksInited && state.tracks && state.tracks.length > 0) {
                if (typeof TrackView === 'undefined') {
                    console.warn("⏳ TrackView.js not loaded yet (or failed)...");
                    const activeEl = document.getElementById('ws-active-status');
                    if (activeEl) activeEl.textContent = "⏳ Waiting for TrackView.js...";
                    return;
                }
                const container = document.getElementById('tracks-container');
                container.innerHTML = '';
                trackViews = [];

                console.log(`📡 Building Receiver UI for ${state.tracks.length} tracks...`);

                state.tracks.forEach((t) => {
                    const tv = new TrackView(t.id);
                    container.appendChild(tv.buildElement());
                    trackViews.push(tv);
                });

                tracksInited = true;
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('mirror-ui').style.display = 'flex';
                console.log(`✅ Receiver UI Initialized with ${trackViews.length} tracks.`);
            }

            // Master Update
            if (state.master) {
                const volS = document.getElementById('master-volume');
                const volV = document.getElementById('master-volume-value');
                const lenS = document.getElementById('loop-length');
                const lenV = document.getElementById('loop-length-value');
                const recB = document.getElementById('master-record-button');

                if (volS) volS.value = state.master.volume;
                if (volV) volV.textContent = (state.master.volume || 0).toFixed(1) + " dB";
                if (lenS) lenS.value = state.master.loopLength;
                if (lenV) lenV.textContent = (state.master.loopLength || 0).toFixed(1) + "s";
                if (recB) recB.classList.toggle('recording', state.master.isRecording);

                document.getElementById('lfo-meter-bar').style.width = (state.master.lfo1Meter * 100) + "%";
                document.getElementById('lfo2-meter-bar').style.width = (state.master.lfo2Meter * 100) + "%";
                document.getElementById('lfo-toggle').classList.toggle('sweeping', state.master.lfo1Active);
                document.getElementById('lfo2-toggle').classList.toggle('sweeping', state.master.lfo2Active);
            }

            if (state.transport) {
                document.getElementById('recording-time-display').textContent = state.transport.position || "00:00:00";
            }

            // Tracks Update
            if (state.tracks && trackViews.length > 0) {
                state.tracks.forEach(t => {
                    const tv = trackViews[t.id];
                    if (!tv) return;

                    // Sync sliders
                    const params = ['vol', 'pan', 'pitch', 'treble', 'mid_gain', 'bass'];
                    params.forEach(p => {
                        const val = t[p === 'mid_gain' ? 'midGain' : p];
                        if (tv.elements.knobs[p]) tv.elements.knobs[p].value = val;
                        if (tv.elements.valueDisplays[p]) tv.elements.valueDisplays[p].textContent = parseFloat(val).toFixed(1);
                    });

                    // Sync status & buttons
                    if (t.armed) tv.setStatus('Recording', 'recording');
                    else if (t.isPlaying) tv.setStatus('Playing', 'playing');
                    else tv.setStatus('Ready', 'ready');

                    if (tv.elements.recBtn) tv.elements.recBtn.classList.toggle('recording', t.armed);
                    if (tv.elements.playBtn) tv.elements.playBtn.classList.toggle('playing', t.isPlaying);

                    // Meter Update (Hack for receiver display)
                    if (tv.elements.waveformCanvasL) {
                        // Use the canvas area as a meter bar for the receiver since we don't have real-time waveform data
                        const ctx = tv.elements.waveformCanvasL.getContext('2d');
                        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 300, 100);
                        ctx.fillStyle = '#0f0'; ctx.fillRect(0, 0, 300 * (t.meters.l || 0), 100);
                    }
                });
            }
        }

        // ============= AUDIO STREAMING PLAYBACK =============
        let audioCtx = null;
        let audioQueue = [];
        let isAudioPlaying = false;
        const SAMPLE_RATE = 48000;
        const CHANNELS = 2;
        const BUFFER_SIZE = 8192; // Increased for better stability over wifi

        function initAudioPlayback() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
            console.log('🔊 Receiver AudioContext created:', audioCtx.sampleRate, 'Hz');

            const unmuteBtn = document.getElementById('audio-unmute-btn');
            if (audioCtx.state === 'suspended') {
                if (unmuteBtn) unmuteBtn.classList.add('visible');
            }

            // Create ScriptProcessor for real-time playback
            const processor = audioCtx.createScriptProcessor(BUFFER_SIZE, 0, CHANNELS);
            processor.onaudioprocess = (e) => {
                const left = e.outputBuffer.getChannelData(0);
                const right = e.outputBuffer.getChannelData(1);

                // Fill from queue
                let samplesNeeded = BUFFER_SIZE;
                let offset = 0;

                // NEW: Jitter / Lag Management
                // Only skip if EXTREMELY lagged (> 500ms)
                const maxSamplesInQueue = SAMPLE_RATE * 0.5;
                let totalBuffered = audioQueue.reduce((acc, chunk) => acc + (chunk.data.length / 2 - chunk.offset), 0);

                if (totalBuffered > maxSamplesInQueue) {
                    console.warn("⚠️ Audio lag detected, skipping 100ms to catch up...");
                    let skipSamples = SAMPLE_RATE * 0.1; // Skip 100ms
                    while (skipSamples > 0 && audioQueue.length > 0) {
                        const chunk = audioQueue[0];
                        const available = chunk.data.length / 2 - chunk.offset;
                        const toSkip = Math.min(skipSamples, available);
                        chunk.offset += toSkip;
                        skipSamples -= toSkip;
                        if (chunk.offset * 2 >= chunk.data.length) audioQueue.shift();
                    }
                }

                let maxPeak = 0;
                while (samplesNeeded > 0 && audioQueue.length > 0) {
                    const chunk = audioQueue[0];
                    const available = chunk.data.length / 2 - chunk.offset;
                    const toRead = Math.min(samplesNeeded, available);

                    for (let i = 0; i < toRead; i++) {
                        const idx = (chunk.offset + i) * 2;
                        left[offset + i] = chunk.data[idx] || 0;
                        right[offset + i] = chunk.data[idx + 1] || 0;
                    }

                    // Throttled Peak Check (per chunk rather than per sample if possible, or just once)
                    if (toRead > 0) {
                        maxPeak = Math.max(maxPeak, Math.abs(chunk.data[chunk.offset * 2]));
                    }

                    chunk.offset += toRead;
                    offset += toRead;
                    samplesNeeded -= toRead;

                    if (chunk.offset * 2 >= chunk.data.length) {
                        audioQueue.shift();
                    }
                }

                if (offset > 0) window._lastAudioPeak = maxPeak;

                // Fill remaining with silence
                for (let i = offset; i < BUFFER_SIZE; i++) {
                    left[i] = 0;
                    right[i] = 0;
                }
            };

            processor.connect(audioCtx.destination);
            isAudioPlaying = true;
        }

        function handleAudioChunk(pcmData) {
            if (!audioCtx) initAudioPlayback();

            // NEW: 4-byte padding header in backend ensures alignment.
            // We use the buffer starting at offset 4.
            try {
                // pcmData is a Uint8Array(e.data, 4) if we use the new alignment.
                // Wait, in onmessage we do: const pcmData = new Uint8Array(e.data, 4);
                // Then floatView = new Float32Array(pcmData.buffer, pcmData.byteOffset, pcmData.byteLength / 4);
                // This is perfectly aligned.
                const floatView = new Float32Array(pcmData.buffer, pcmData.byteOffset, pcmData.byteLength / 4);

                // Add to queue with read offset
                audioQueue.push({ data: floatView, offset: 0 });

                // Limit queue to ~500ms of audio
                const maxChunks = Math.ceil((SAMPLE_RATE * 0.5) / (BUFFER_SIZE / 2));
                while (audioQueue.length > maxChunks) {
                    audioQueue.shift();
                }
            } catch (e) {
                console.error("Audio Alignment Error:", e);
            }
        }

        function startAudioManually() {
            if (audioCtx) {
                audioCtx.resume().then(() => {
                    console.log("🔊 Audio Context Resumed Manually");
                    const btn = document.getElementById('audio-unmute-btn');
                    if (btn) btn.classList.remove('visible');
                });
            }
        }

        function connectWS(url) {
            console.log("Connecting to WS:", url);
            const statusEl = document.getElementById('ws-status');
            const debugEl = document.getElementById('debug-info');

            if (statusEl) statusEl.textContent = "Connecting to " + url + "...";
            if (debugEl) debugEl.textContent = "Target: " + url;

            const ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';
            ws.onopen = () => {
                console.log("WS Connected");
                if (statusEl) {
                    statusEl.textContent = "✅ WS Connected - Waiting for state...";
                    statusEl.style.color = "#4CAF50";
                }
            };
            ws.onerror = (err) => {
                console.error("WS Error:", err);
                if (statusEl) {
                    statusEl.textContent = "❌ WS Connection Failed";
                    statusEl.style.color = "#f44336";
                }
                if (debugEl) debugEl.textContent += " [ERR]";
            };
            let msgCount = 0;
            let audioCount = 0;
            ws.onmessage = (e) => {
                msgCount++;
                const debugEl = document.getElementById('debug-info');
                const activeEl = document.getElementById('ws-active-status');

                if (activeEl && msgCount % 20 === 0) {
                    const peak = (window._lastAudioPeak || 0).toFixed(3);
                    activeEl.textContent = `Rx: ${msgCount} | Audio: ${audioCount} | Peak: ${peak} | Bytes: ${e.data.byteLength}`;
                }

                if (typeof e.data === 'string') {
                    return;
                }
                try {
                    const view = new Uint8Array(e.data);

                    if (view[0] === 3) {
                        const json = JSON.parse(new TextDecoder().decode(e.data.slice(1)));
                        if (json.type === 'state') {
                            if (audioCtx && audioCtx.state === 'suspended') {
                                // Background resume attempt
                                audioCtx.resume();
                            }
                            applyState(json);
                            if (debugEl && debugEl.textContent.includes('Waiting')) debugEl.textContent = "✅ Valid State Received";
                        }
                        else if (json.type === 'cursor') {
                            const cur = document.getElementById('cursor');
                            if (cur) {
                                cur.style.display = 'block';
                                cur.style.left = (json.x * 100) + "vw";
                                cur.style.top = (json.y * 100) + "vh";
                            }
                        }
                    } else if (view[0] === 2) {
                        // Audio chunk - f32le stereo PCM
                        // Use 4-byte offset for alignment
                        audioCount++;
                        const pcmData = new Uint8Array(e.data, 4);
                        handleAudioChunk(pcmData);
                    }
                } catch (err) {
                    console.error("Parse Error:", err);
                    if (debugEl) debugEl.textContent = `Rx Error: ${err.message}`;
                }
            };
            ws.onclose = () => {
                console.log("WS Closed, retrying...");
                setTimeout(() => connectWS(url), 2000);
            };
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('ws')) connectWS(params.get('ws'));
            if (typeof cast !== 'undefined') {
                const ctx = cast.framework.CastReceiverContext.getInstance();
                ctx.addCustomMessageListener('urn:x-cast:com.nowmultimedia.mxs004', e => {
                    const url = e.data.wsUrl || e.data;
                    if (url) connectWS(url);
                });
                ctx.start();
            }
        };
    </script>
</body>

</html>
