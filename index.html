<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MXS-004 Studio Receiver v13.8.70</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        :root {
            --gold: #ffcc00;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background: #111 !important;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        #diagnostic-label {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            z-index: 9999;
            font-size: 24px;
            font-weight: bold;
        }
        #status-overlay {
            position: fixed;
            top: 20px; right: 20px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 204, 0, 0.3);
            border-radius: 20px;
            font-size: 14px;
            backdrop-filter: blur(10px);
            z-index: 9999;
        }
        #init-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0; left: 0;
            background: #111;
            z-index: 500;
        }
        #studio-mirror {
            width: 90vw;
            height: 80vh;
            background: #111;
            border: 2px solid #222;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.5s ease;
        }
        #studio-mirror.active {
            display: flex;
            transform: scale(1);
        }
        .vumeter-container {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            height: 100px;
            display: flex;
            gap: 2px;
            padding: 0 10px;
            box-sizing: border-box;
            opacity: 0.3;
        }
        .vubar {
            flex: 1;
            background: var(--gold);
            align-self: flex-end;
            min-height: 2px;
            transition: height 0.05s ease;
        }
        #message {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #666;
            text-align: center;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,204,0,0.1);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        #ghost-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: rgba(255, 204, 0, 0.4);
            border: 2px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transition: left 0.05s linear, top 0.05s linear;
            display: none;
        }
        #ghost-cursor.clicking {
            transform: scale(1.5);
            background: rgba(255, 204, 0, 0.8);
        }
        .checklist-item {
            font-size: 14px;
            opacity: 0.6;
            line-height: 2;
        }
        .checklist-item .done { color: #00ff00; }
        .checklist-item .pending { color: #666; }
        #debug-log {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.9);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            color: #0f0;
            z-index: 99999;
            line-height: 1.4;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="diagnostic-label">📡 MXS-004 RECEIVER</div>
    <div id="status-overlay">WAITING FOR HANDSHAKE...</div>
    <div id="ghost-cursor"></div>
    <div id="debug-log">🚀 Receiver v13.8.71 boot...</div>
    
    <div id="init-view">
        <div class="spinner"></div>
        <div id="message">MXS-004 STUDIO<br>
            <span style="font-size: 0.5em; opacity: 0.5;">READY TO RECEIVE</span><br>
            <span style="font-size: 0.3em; opacity: 0.3; letter-spacing: 1px;">v13.8.72</span>
        </div>
        <div style="margin-top: 30px; text-align: left; width: 280px;">
            <div class="checklist-item">1. WebSocket Signal... <span id="check-signal" class="pending">⏳</span></div>
            <div class="checklist-item">2. UI State Data... <span id="check-ui" class="pending">⏳</span></div>
            <div class="checklist-item">3. Audio Stream... <span id="check-data" class="pending">⏳</span></div>
        </div>
    </div>

    <div id="studio-mirror">
        <div style="padding: 40px; text-align: center;">
            <h1 style="color: var(--gold); margin: 0; font-size: 3em;">MXS-004</h1>
            <p style="opacity: 0.5; letter-spacing: 4px;">STUDIO PRODUCTION MIRROR</p>
        </div>
        <div id="mirror-content" style="flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px;">
            <!-- Tracks mirrored here -->
        </div>
        
        <div id="lfo-visualizer" style="display: flex; gap: 20px; padding: 20px; background: rgba(0,0,0,0.3); border-top: 1px solid #222;">
            <div style="flex: 1;">
                <div style="font-size: 10px; opacity: 0.5; margin-bottom: 5px;">LFO 1</div>
                <div style="height: 4px; background: #222; border-radius: 2px; overflow: hidden;">
                    <div id="lfo1-bar" style="height: 100%; width: 0%; background: var(--gold); transition: width 0.05s linear;"></div>
                </div>
            </div>
            <div style="flex: 1;">
                <div style="font-size: 10px; opacity: 0.5; margin-bottom: 5px;">LFO 2</div>
                <div style="height: 4px; background: #222; border-radius: 2px; overflow: hidden;">
                    <div id="lfo2-bar" style="height: 100%; width: 0%; background: #00ffcc; transition: width 0.05s linear;"></div>
                </div>
            </div>
        </div>

        <div class="vumeter-container" id="vumeter">
            <!-- VU Bars generated by JS -->
        </div>
    </div>

    <audio id="receiver-audio" autoplay crossorigin="anonymous"></audio>
    
    <script>
    /**
     * MXS-004 Studio Cast Receiver v13.8.70
     * 
     * This file runs on the Chromecast device.
     * It is loaded from GitHub Pages when Cast App D18A9B3A launches.
     * It connects BACK to the Studio Mac via WebSocket for state updates
     * and via HTTP for the live audio stream.
     * 
     * Signal flow:
     *   1. Google Cast SDK loads this page on the TV
     *   2. SDK sends a LOAD command with contentId containing ws= and audioUrl= params
     *   3. This receiver extracts those URLs and connects back to the Mac
     *   4. State updates (cursor, tracks, LFOs) arrive via WebSocket
     *   5. Audio streams via HTTP WAV from the Mac's Warp server on port 8080
     */

    // ============================================================
    // GLOBAL ERROR TRAP — reports errors back to the Studio Mac
    // ============================================================
    window.onerror = function(msg, url, line, col, error) {
        var errStr = "[RECEIVER ERROR] " + msg + " at " + line + ":" + col;
        console.error(errStr);
        // Try to report back to studio
        if (window._studioBaseUrl) {
            fetch(window._studioBaseUrl + "/log?m=" + encodeURIComponent(errStr), { mode: 'no-cors' }).catch(function(){});
        }
        return false;
    };

    (function() {
        'use strict';

        // ============================================================
        // DOM REFERENCES
        // ============================================================
        var statusEl     = document.getElementById('status-overlay');
        var initView     = document.getElementById('init-view');
        var mirrorEl     = document.getElementById('studio-mirror');
        var audioEl      = document.getElementById('receiver-audio');
        var mirrorContent= document.getElementById('mirror-content');
        var vumeter      = document.getElementById('vumeter');
        var lfo1Bar      = document.getElementById('lfo1-bar');
        var lfo2Bar      = document.getElementById('lfo2-bar');
        var cursorEl     = document.getElementById('ghost-cursor');
        var diagLabel    = document.getElementById('diagnostic-label');

        // ============================================================
        // STATE
        // ============================================================
        var ws = null;
        var wsConnected = false;
        var lastState = null;
        var lfoPhase1 = 0;
        var lfoPhase2 = 0;
        var lastFrameTime = performance.now();
        var audioStarted = false;
        var connectAttempts = 0;

        // These will be populated from the LOAD command's contentId
        var wsUrl = null;
        var audioUrl = null;
        window._studioBaseUrl = null; // For error reporting

        // ============================================================
        // REMOTE LOGGING — sends logs back to the Studio Mac console
        // ============================================================
        var _debugEl = document.getElementById('debug-log');
        var _logCount = 0;
        function remoteLog(msg) {
            console.log(msg);
            // ON-SCREEN DEBUG (visible on TV)
            _logCount++;
            if (_debugEl && _logCount <= 50) {
                _debugEl.innerHTML += '<br>' + msg;
                _debugEl.scrollTop = _debugEl.scrollHeight;
            }
            // Priority: WebSocket (if open)
            if (ws && ws.readyState === WebSocket.OPEN) {
                try {
                    ws.send(JSON.stringify({ type: 'LOG', message: msg, timestamp: Date.now() }));
                } catch(e) {}
                return;
            }
            // Fallback: HTTP beacon
            if (window._studioBaseUrl) {
                fetch(window._studioBaseUrl + "/log?m=" + encodeURIComponent(msg) + "&t=" + Date.now(), { mode: 'no-cors' }).catch(function(){});
            }
        }

        remoteLog("🚀 Receiver v13.8.72 booting...");
        remoteLog("🔗 Page URL: " + window.location.href);

        // ============================================================
        // GOOGLE CAST RECEIVER SDK INITIALIZATION
        // SDK loaded via <script> in <head> (official Google approach)
        // ============================================================
        function initCastSDK() {
            if (typeof cast === 'undefined' || !cast.framework) {
                remoteLog("❌ Cast SDK not available (typeof cast=" + typeof cast + ")");
                return;
            }
            remoteLog("[OK] Cast SDK detected.");
            try {
                var context = cast.framework.CastReceiverContext.getInstance();
                var playerManager = context.getPlayerManager();

                // -------------------------------------------------------
                // LOAD INTERCEPTOR — This is where we get the Studio URL
                // -------------------------------------------------------
                playerManager.setMessageInterceptor(
                    cast.framework.messages.MessageType.LOAD,
                    function(request) {
                        remoteLog("📥 LOAD intercepted!");
                        if (request.media && request.media.contentId) {
                            var contentId = request.media.contentId;
                            remoteLog("📥 contentId: " + contentId.substring(0, 80) + "...");
                            
                            try {
                                var url = new URL(contentId);
                                var extractedWs = url.searchParams.get('ws');
                                var extractedAudio = url.searchParams.get('audioUrl');

                                if (extractedWs) {
                                    wsUrl = decodeURIComponent(extractedWs);
                                    remoteLog("✅ WS URL: " + wsUrl);
                                }
                                if (extractedAudio) {
                                    audioUrl = decodeURIComponent(extractedAudio);
                                    remoteLog("✅ Audio URL: " + audioUrl);
                                }

                                if (wsUrl) {
                                    window._studioBaseUrl = wsUrl.replace('ws://', 'http://').replace('wss://', 'https://');
                                    connectWebSocket();
                                }
                                if (audioUrl) {
                                    startAudio(audioUrl);
                                }
                            } catch(e) {
                                remoteLog("❌ LOAD parse error: " + e.message);
                                // Fallback: raw string parsing
                                if (contentId.indexOf('ws=') !== -1) {
                                    var wsRaw = contentId.split('ws=')[1].split('&')[0];
                                    wsUrl = decodeURIComponent(wsRaw);
                                    window._studioBaseUrl = wsUrl.replace('ws://', 'http://');
                                    remoteLog("⚠️ Fallback WS: " + wsUrl);
                                    connectWebSocket();
                                }
                            }
                        }
                        return null;
                    }
                );

                // -------------------------------------------------------
                // NATIVE CAST CHANNEL — for state + signaling (bypass WS mixed content)
                // -------------------------------------------------------
                context.addCustomMessageListener('urn:x-cast:com.nowmultimedia.webrtc', function(event) {
                    remoteLog("📥 Native signal received!");
                    var data = event.data;
                    if (data && typeof data.payload === 'string') {
                        try { data = JSON.parse(data.payload); } catch(e) {
                            remoteLog("❌ Native parse error: " + e.message);
                        }
                    }
                    handleSignal(data);
                });

                context.start({ disableIdleTimeout: true });
                remoteLog("✅ Cast SDK Started! Waiting for LOAD...");
                diagLabel.textContent = "📡 CAST SDK READY";
                document.getElementById('check-signal').textContent = '✅';
                document.getElementById('check-signal').className = 'done';

            } catch(e) {
                remoteLog("❌ Cast SDK init error: " + e.message);
            }
        }

        // Initialize immediately (SDK loaded in <head>)
        initCastSDK();

        // ============================================================
        // WEBSOCKET CONNECTION
        // ============================================================
        function connectWebSocket() {
            if (!wsUrl) {
                remoteLog("⚠️ No WS URL, cannot connect.");
                return;
            }
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                remoteLog("⚠️ WebSocket already connected/connecting, skipping.");
                return;
            }

            connectAttempts++;
            remoteLog("🔗 Connecting to WebSocket: " + wsUrl + " (attempt " + connectAttempts + ")");

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = function() {
                    wsConnected = true;
                    statusEl.textContent = "CONNECTED • WAITING FOR STATE";
                    diagLabel.textContent = "📡 STUDIO CONNECTED";
                    document.getElementById('check-signal').textContent = '✅';
                    document.getElementById('check-signal').className = 'done';
                    remoteLog("[OK] WebSocket Connected!");
                    connectAttempts = 0;
                };

                ws.onmessage = function(event) {
                    try {
                        var data = JSON.parse(event.data);
                        handleSignal(data);
                    } catch(e) {
                        remoteLog("[ERR] WS Parse Error: " + e.message);
                    }
                };

                ws.onclose = function() {
                    wsConnected = false;
                    remoteLog("🛑 WebSocket Closed. Reconnecting in 3s...");
                    statusEl.textContent = "DISCONNECTED • RECONNECTING...";
                    setTimeout(connectWebSocket, 3000);
                };

                ws.onerror = function() {
                    remoteLog("❌ WebSocket Error on attempt " + connectAttempts);
                };

            } catch(e) {
                remoteLog("❌ WebSocket Init Failed: " + e.message);
                setTimeout(connectWebSocket, 5000);
            }
        }

        // ============================================================
        // SIGNAL HANDLER — processes all incoming messages
        // ============================================================
        function handleSignal(payload) {
            // Unwrap if wrapped in {payload: ...}
            var data = payload;
            if (payload && payload.payload && typeof payload.payload === 'object') {
                data = payload.payload;
            }

            if (!data || !data.type) return;

            if (data.type === 'init' || data.type === 'LOAD') {
                // Init signal from CastStateBroadcaster — provides audio URL
                var initAudio = data.audioUrl || (data.wsUrl ? data.wsUrl.replace('ws://', 'http://') + '/stream.wav' : null);
                if (initAudio && !audioStarted) {
                    remoteLog("🎵 Init signal received. Starting audio: " + initAudio);
                    startAudio(initAudio);
                }
            } else if (data.type === 'STATE_UPDATE') {
                // First state update → reveal the mirror UI
                if (initView && initView.style.display !== 'none') {
                    remoteLog("🎬 First STATE_UPDATE received. Revealing mirror UI.");
                    document.getElementById('check-ui').textContent = '✅';
                    document.getElementById('check-ui').className = 'done';
                    setTimeout(function() {
                        initView.style.display = 'none';
                        mirrorEl.classList.add('active');
                        statusEl.textContent = "LIVE • DATA SYNC ACTIVE";
                    }, 400);
                }
                renderState(data.state);
            } else if (data.type === 'offer') {
                remoteLog("📩 WebRTC Offer received (legacy)");
                handleOffer(data.sdp);
            } else if (data.type === 'ice-candidate') {
                if (window._pc) {
                    window._pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            }
        }

        // ============================================================
        // AUDIO PLAYBACK — streams live WAV from the Studio Mac
        // ============================================================
        function startAudio(url) {
            if (!audioEl || audioStarted) return;
            audioStarted = true;
            remoteLog("🔊 Starting audio stream: " + url);

            audioEl.src = url;
            audioEl.play().then(function() {
                remoteLog("[OK] Audio Playback Started!");
                document.getElementById('check-data').textContent = '✅';
                document.getElementById('check-data').className = 'done';
                statusEl.textContent = "LIVE • AUDIO + DATA ACTIVE";
            }).catch(function(e) {
                remoteLog("[ERR] Audio blocked: " + e.message + " — waiting for user tap");
                audioStarted = false; // Allow retry
                statusEl.textContent = "TAP SCREEN TO ENABLE AUDIO";
                document.addEventListener('click', function() {
                    startAudio(url);
                }, { once: true });
            });
        }

        // ============================================================
        // WEBRTC (Legacy fallback for peer-to-peer audio)
        // ============================================================
        function handleOffer(sdp) {
            var pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            window._pc = pc;

            pc.onicecandidate = function(e) {
                if (e.candidate) sendSignal({ type: 'ice-candidate', candidate: e.candidate });
            };
            pc.ontrack = function(e) {
                remoteLog("🎤 WebRTC Audio track received!");
                audioEl.srcObject = e.streams[0];
                statusEl.textContent = "LIVE • WEBRTC AUDIO";
            };

            pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: sdp }))
                .then(function() { return pc.createAnswer(); })
                .then(function(answer) {
                    pc.setLocalDescription(answer);
                    sendSignal({ type: 'answer', sdp: answer.sdp });
                })
                .catch(function(e) { remoteLog("❌ WebRTC error: " + e.message); });
        }

        function sendSignal(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ payload: data }));
            } else {
                // Fallback to native Cast channel
                try {
                    var ctx = cast.framework.CastReceiverContext.getInstance();
                    ctx.sendCustomMessage('urn:x-cast:com.nowmultimedia.webrtc', undefined, {
                        payload: JSON.stringify(data)
                    });
                } catch(e) {
                    remoteLog("⚠️ Could not send signal: " + e.message);
                }
            }
        }

        // ============================================================
        // STATE RENDERING — mirrors the Studio UI on the TV
        // ============================================================
        function renderState(state) {
            if (!state) return;
            lastState = state;

            // Cursor mirroring
            if (state.cursor && cursorEl) {
                cursorEl.style.display = 'block';
                cursorEl.style.left = (state.cursor.x * 100) + '%';
                cursorEl.style.top = (state.cursor.y * 100) + '%';
                if (state.cursor.isClicking) {
                    cursorEl.classList.add('clicking');
                } else {
                    cursorEl.classList.remove('clicking');
                }
            }

            // Track cards
            if (state.tracks) {
                mirrorContent.innerHTML = '';
                state.tracks.forEach(function(t, i) {
                    var div = document.createElement('div');
                    div.style.cssText = 'background:#222; padding:15px; border-radius:8px; border-left:4px solid ' + (t.hasContent ? 'var(--gold)' : '#444');
                    div.innerHTML =
                        '<div style="font-size:10px; opacity:0.5;">TRACK ' + (i + 1) + '</div>' +
                        '<div style="font-weight:bold; margin:5px 0;">' + (t.label || 'EMPTY') + '</div>' +
                        '<div style="font-size:10px; color:' + (t.isPlaying ? 'var(--gold)' : '#666') + '">' + (t.isPlaying ? '▶ PLAYING' : 'IDLE') + '</div>';
                    mirrorContent.appendChild(div);
                });
            }
        }

        // ============================================================
        // ANIMATION LOOP — smooth LFO visualizers and VU meters
        // ============================================================
        function animate() {
            var now = performance.now();
            var dt = (now - lastFrameTime) / 1000;
            lastFrameTime = now;

            if (lastState && lastState.master) {
                var m = lastState.master;
                if (m.lfo1Active) {
                    lfoPhase1 += 2 * Math.PI * (m.lfo1Freq || 0.5) * dt;
                    if (lfoPhase1 > 2 * Math.PI) lfoPhase1 -= 2 * Math.PI;
                    if (lfo1Bar) lfo1Bar.style.width = (Math.abs(Math.sin(lfoPhase1)) * 100) + '%';
                } else if (lfo1Bar) {
                    lfo1Bar.style.width = '0%';
                }

                if (m.lfo2Active) {
                    lfoPhase2 += 2 * Math.PI * (m.lfo2Freq || 0.5) * dt;
                    if (lfoPhase2 > 2 * Math.PI) lfoPhase2 -= 2 * Math.PI;
                    if (lfo2Bar) lfo2Bar.style.width = (Math.abs(Math.sin(lfoPhase2)) * 100) + '%';
                } else if (lfo2Bar) {
                    lfo2Bar.style.width = '0%';
                }
            }

            updateVU(lastState);
            requestAnimationFrame(animate);
        }

        function updateVU(state) {
            if (!state) return;
            if (vumeter.children.length === 0) {
                for (var i = 0; i < 64; i++) {
                    var bar = document.createElement('div');
                    bar.className = 'vubar';
                    vumeter.appendChild(bar);
                }
            }
            var bars = vumeter.children;
            var hasAudio = state && state.tracks && state.tracks.some(function(t) { return t.isPlaying; });
            for (var i = 0; i < bars.length; i++) {
                var targetH = 2;
                if (hasAudio) {
                    var trackIdx = Math.floor(i / 16);
                    var trackMeter = (state.tracks[trackIdx] && state.tracks[trackIdx].meters) ? state.tracks[trackIdx].meters.l : 0;
                    targetH = (trackMeter * 80) + (Math.random() * 20);
                } else {
                    targetH = 2 + (Math.random() * 3);
                }
                bars[i].style.height = Math.min(100, targetH) + 'px';
                bars[i].style.opacity = hasAudio ? 0.8 : 0.2;
            }
        }

        // ============================================================
        // HEARTBEAT — periodic status report back to Studio
        // ============================================================
        setInterval(function() {
            remoteLog("💓 Heartbeat [WS:" + (ws ? ws.readyState : 'OFF') + "] [Audio:" + (audioStarted ? 'ON' : 'OFF') + "]");
        }, 5000);

        // Start the animation loop
        animate();

    })();
    </script>
</body>
</html>
