<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.9.19 [AESTHETIC RESTORED]</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles_main.css?v=13.8.132">
    <style>
        /* [v13.9.19] RECOVERED ORIGINAL CSS BASELINE */
        html, body { background: #000 !important; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        .app-loading { opacity: 1 !important; visibility: visible !important; }
        .container {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(var(--scale, 1)); transform-origin: center;
            opacity: 1 !important; visibility: visible !important; display: flex !important;
            background-color: #000 !important; width: 1440px !important; height: 810px !important;
            flex-direction: column;
        }
        .header { display: flex; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid #333; }
        .main-content {
            display: grid !important;
            grid-template-columns: repeat(5, 1fr) !important;
            gap: 6px !important;
            width: 100% !important;
            height: calc(100% - 60px) !important;
            padding: 10px;
            box-sizing: border-box;
        }
        .track, .master-column { 
            background: rgba(20, 20, 20, 0.9) !important; 
            border: 1px solid var(--green) !important; 
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .track-header { font-family: 'Mexcellent', sans-serif; font-size: 1.1em; color: var(--gold); }
        .track-time-display { font-family: 'JetBrains Mono', monospace; font-size: 1.8em; color: var(--green); text-align: center; margin: 5px 0; }
        .waveform-box { height: 50px; background: #000; border-radius: 4px; position: relative; border: 1px solid #333; }
        .waveform-canvas { width: 100%; height: 100%; }
        .status-indicator { font-size: 0.7em; padding: 4px; text-align: center; border-radius: 4px; font-weight: bold; }
        .status-ready { background: rgba(0, 255, 136, 0.1); color: var(--green); }
        .status-recording { background: rgba(255, 51, 51, 0.1); color: var(--red); }
        
        .track-buttons { display: flex; gap: 4px; margin-top: auto; }
        .track-buttons button { flex: 1; height: 30px; font-family: 'JetBrains Mono', monospace; font-size: 0.8em; border-radius: 4px; cursor: pointer; }
        button#t-play { background: var(--green); color: #000; }
        button#t-rec { background: var(--red); color: #fff; }
        
        #bridge-diag-panel {
            position: fixed; bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.9); border: 1px solid #0f0;
            padding: 5px 10px; border-radius: 4px; font-family: monospace; font-size: 10px; color: #0f0;
            display: flex; align-items: center; gap: 8px;
        }
        #bridge-status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
        
        .sample-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 5px; }
        .sample-btn { aspect-ratio: 1; background: #222; border: 1px solid #444; color: #888; font-size: 0.8em; }
    </style>
</head>
<body class="app-loading">
    <div class="container" id="studio-root">
        <div class="header">
            <h1 style="font-family: 'Mexcellent', sans-serif; color: var(--gold); margin:0;">NOWMULTIMEDIA MXS-004</h1>
            <h2 style="font-size:0.9em; font-family: 'Mexcellent', sans-serif; color: var(--gold); margin:0;">Studio Mirror :: v13.9.19</h2>
        </div>
        
        <div class="main-content" id="main-grid">
            <!-- Column 1: MASTER -->
            <div class="master-column">
                <div class="track-header">MASTER REC</div>
                <div id="master-time" class="track-time-display">00:00:00</div>
                <div class="status-indicator status-ready">MONITORING</div>
                <div class="waveform-box"></div>
                <div class="sample-grid" id="sample-grid">
                    <!-- 20 pads -->
                </div>
            </div>
            <!-- Column 2-5: Tracks -->
        </div>

        <div id="bridge-diag-panel">
            <div id="bridge-status-dot"></div>
            <div id="bridge-diag-text">BUF: 0 | WS: DISCONNECTED [DIRECT BRIDGE]</div>
        </div>
    </div>

    <script>
        (function() {
            const CUSTOM_NAMESPACE = 'urn:x-cast:com.nowmultimedia.mxs004';
            var audioCtx = null;
            var workletNode = null;
            var binaryWS = null;
            var lastUpdate = Date.now();

            function buildGUI() {
                const grid = document.getElementById('main-grid');
                // Clear dynamic tracks (Columns 2-5)
                const existingTracks = document.querySelectorAll('.track');
                existingTracks.forEach(t => t.remove());

                for (let i = 0; i < 4; i++) {
                    const t = document.createElement('div');
                    t.className = 'track';
                    t.id = `track-${i}`;
                    t.innerHTML = `
                        <div class="track-header">TRACK ${i+1}</div>
                        <div id="t-time-${i}" class="track-time-display">00:00:00</div>
                        <div id="t-st-${i}" class="status-indicator status-ready">Ready</div>
                        <div class="waveform-box"><canvas id="t-wf-l-${i}" class="waveform-canvas"></canvas></div>
                        <div class="waveform-box"><canvas id="t-wf-r-${i}" class="waveform-canvas"></canvas></div>
                        <div class="track-buttons">
                            <button id="t-rec-${i}">REC</button>
                            <button id="t-play-${i}">PLAY</button>
                            <button id="t-rev-${i}">REV</button>
                        </div>
                    `;
                    grid.appendChild(t);
                }

                const sGrid = document.getElementById('sample-grid');
                if (sGrid) {
                    sGrid.innerHTML = '';
                    for (let p = 1; p <= 20; p++) {
                        const b = document.createElement('button');
                        b.className = 'sample-btn';
                        b.textContent = p;
                        sGrid.appendChild(b);
                    }
                }
                updateScale();
            }

            function updateScale() {
                const winW = window.innerWidth;
                const winH = window.innerHeight;
                document.documentElement.style.setProperty('--scale', Math.min(winW/1440, winH/810) * 0.98);
            }

            function relayLog(msg) {
                const context = cast.framework.CastReceiverContext.getInstance();
                const senders = context.getSenders();
                if (senders.length > 0) {
                    context.sendCustomMessage(CUSTOM_NAMESPACE, senders[0].id, { type: 'LOG', msg: `[TV] ${msg}` });
                }
                if (binaryWS && binaryWS.readyState === WebSocket.OPEN) {
                    binaryWS.send(JSON.stringify({ type: 'TV_LOG', message: msg }));
                }
            }

            async function initAudio(rate) {
                const targetRate = rate || 48000;
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: targetRate });
                    await audioCtx.audioWorklet.addModule('pcm-player-worklet.js');
                    workletNode = new AudioWorkletNode(audioCtx, 'pcm-player-worklet', { outputChannelCount: [2] });
                    workletNode.connect(audioCtx.destination);
                    relayLog(`✅ Audio Sink Active @ ${audioCtx.sampleRate}Hz`);
                }
            }

            function connectBridge(ip) {
                if (binaryWS) binaryWS.close();
                binaryWS = new WebSocket(`ws://${ip}:8080`);
                binaryWS.onopen = () => {
                    document.getElementById('bridge-status-dot').style.backgroundColor = '#0f0';
                };
                binaryWS.onmessage = async (e) => {
                    if (typeof e.data === 'string') {
                        const m = JSON.parse(e.data);
                        if (m.type === 'BRIDGE_CONFIG') initAudio(m.config.sampleRate);
                    } else if (workletNode) {
                        const buf = (e.data instanceof Blob) ? await e.data.arrayBuffer() : e.data;
                        workletNode.port.postMessage(buf, [buf]);
                    }
                };
            }

            function render(state) {
                lastUpdate = Date.now();
                if (!state || !state.tracks) return;
                state.tracks.forEach((track, i) => {
                    const timeEl = document.getElementById(`t-time-${i}`);
                    if (timeEl) timeEl.textContent = track.displayTime || '00:00:00';
                    const stEl = document.getElementById(`t-st-${i}`);
                    if (stEl) {
                        stEl.textContent = track.status || 'Ready';
                        stEl.className = `status-indicator status-${track.status?.toLowerCase() || 'ready'}`;
                    }
                });
                if (state.masterTime) document.getElementById('master-time').textContent = state.masterTime;
            }

            window.onload = () => {
                buildGUI();
                const context = cast.framework.CastReceiverContext.getInstance();
                context.addCustomMessageListener(CUSTOM_NAMESPACE, (e) => {
                    if (e.data.type === 'STATE_UPDATE') render(e.data.state);
                    if (e.data.type === 'BRIDGE_IP') connectBridge(e.data.ip);
                });
                context.start();
                relayLog("🚀 TV Receiver Ready v13.9.19");
            };

            setInterval(() => {
                if (Date.now() - lastUpdate > 15000) window.location.reload();
            }, 5000);

            window.onresize = updateScale;
        })();
    </script>
</body>
</html>
