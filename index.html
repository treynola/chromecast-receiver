<!DOCTYPE html>
<html>

<head>
    <title>MXS-004 Studio Cast v8.5</title>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        cast-media-player {
            width: 100%;
            height: 100%;
            --splash-image: url('');
            --playback-logo-image: url('');
        }

        #log-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 80%;
            max-height: 300px;
            overflow-y: hidden;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
            z-index: 1000;
            font-family: monospace;
        }

        #waiting {
            position: absolute;
            color: #b38600;
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>
    <div id="waiting">
        <h1>MXS-004 STUDIO</h1>
        <p>Waiting for Stream...</p>
        <p style="font-size:14px; opacity:0.6;">v8.5 H.264/AAC HLS Engine</p>
    </div>
    <div id="log-overlay"></div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        const waitingEl = document.getElementById('waiting');
        const logEl = document.getElementById('log-overlay');

        function log(msg) {
            console.log('[MXS-004]', msg);
            const timestamp = new Date().toLocaleTimeString();
            logEl.innerHTML = `<div>${timestamp} ${msg}</div>` + logEl.innerHTML;
            // Keep only last 10 messages
            if (logEl.children.length > 10) {
                logEl.removeChild(logEl.lastChild);
            }
        }

        // --- Media Loading Events ---
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOADING,
            (event) => {
                log('📥 Loading: ' + (event.media?.contentId || 'unknown'));
            }
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
            () => {
                log('✅ Player Load Complete!');
                waitingEl.style.display = 'none';
            }
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.BUFFERING,
            (event) => {
                log('⏳ Buffering: ' + (event.isBuffering ? 'started' : 'ended'));
            }
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYING,
            () => {
                log('▶️ Playing!');
                waitingEl.style.display = 'none';
            }
        );

        // --- Error Handling ---
        playerManager.addEventListener(
            cast.framework.events.EventType.ERROR,
            (event) => {
                log('❌ Error: ' + JSON.stringify({
                    detailedErrorCode: event.detailedErrorCode,
                    error: event.error
                }));
            }
        );

        // --- Request Interceptor for debugging ---
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            (loadRequestData) => {
                log('🎬 LOAD Request: ' + loadRequestData.media.contentId);
                log('   Type: ' + loadRequestData.media.contentType);
                log('   Stream: ' + loadRequestData.media.streamType);
                return loadRequestData;
            }
        );

        // --- Receiver Options ---
        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;

        // Allow playback to start without user gesture (for live streams)
        options.playbackConfig = new cast.framework.PlaybackConfig();
        options.playbackConfig.autoResumeDuration = 0;

        // Support HTTP (not just HTTPS) for local network streaming
        options.playbackConfig.manifestRequestHandler = (requestInfo) => {
            log('📡 Manifest Request: ' + requestInfo.url);
        };

        options.playbackConfig.segmentRequestHandler = (requestInfo) => {
            // Only log first few segments to avoid spam
            if (!window.segmentCount) window.segmentCount = 0;
            if (window.segmentCount < 3) {
                log('📦 Segment Request: ' + requestInfo.url.split('/').pop());
                window.segmentCount++;
            }
        };

        // --- Start Receiver ---
        context.start(options);
        log('🚀 Receiver v8.5 Ready (CAF Standard Media)');
    </script>
</body>

</html>
