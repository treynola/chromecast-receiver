<!DOCTYPE html>
<html lang="en">

<head>
    <title>MXS-004 PRO MONITOR V9.4</title>
    <meta name="viewport" content="width=1920, initial-scale=1">
    <meta charset="UTF-8">
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #000000 !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            overflow: hidden !important;
        }

        .container {
            width: 98vw !important;
            height: 96vh !important;
            max-width: none !important;
            display: flex !important;
            flex-direction: column !important;
            padding: 15px !important;
            margin: 0 !important;
            box-sizing: border-box !important;
            box-shadow: 0 0 0 5px var(--green), 0 0 0 10px var(--gold), 0 0 0 15px var(--red), 0 10px 40px rgba(0, 0, 0, 0.8) !important;
            border-radius: 15px !important;
            background-color: var(--dark-gray) !important;
        }

        /* Essential Layout Mirroring */
        .header {
            margin-bottom: 10px !important;
            flex-shrink: 0;
        }

        .master-controls {
            flex-shrink: 0 !important;
            margin-bottom: 15px !important;
            height: 180px;
        }

        .tracks-container {
            flex: 1 !important;
            display: grid !important;
            grid-template-columns: repeat(4, 1fr) !important;
            grid-template-rows: repeat(2, 1fr) !important;
            gap: 10px !important;
            overflow: hidden !important;
        }

        .track {
            height: 100% !important;
            transform: scale(0.97);
            transform-origin: center;
            border: 1px solid var(--green) !important;
        }

        /* Disable Interactivity on Receiver */
        input[type="range"] {
            pointer-events: none !important;
        }

        button,
        select {
            pointer-events: none !important;
            cursor: default !important;
        }

        #cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            z-index: 20000;
            display: none;
            pointer-events: none;
            background: rgba(255, 255, 0, 0.5);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px yellow;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-family: 'Mexcellent', sans-serif;
        }

        .loader {
            border: 8px solid #333;
            border-top: 8px solid var(--gold);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div class="loader"></div>
        <h1 style="font-size: 3em;">NOWMULTIMEDIA MXS-004</h1>
        <div id="boot-status" style="font-family: monospace; color: #888;">Synchronizing UI...</div>
        <div id="ws-status"
            style="font-family: monospace; font-size: 1.2em; color: #555; margin-top: 10px; background: rgba(20,20,20,0.8); padding: 5px;">
            Waiting for signal...</div>
        <div id="debug-info"
            style="font-family: monospace; font-size: 0.8em; color: #444; margin-top: 20px; max-width: 80%; word-break: break-all;">
        </div>
    </div>

    <div class="container" id="mirror-ui" style="display:none;">
        <div class="header">
            <h1>NOWMULTIMEDIA MXS-004</h1><br>
            <h2> Mix N Studio 004</h2>
        </div>

        <div class="master-controls">
            <!-- Col 1: Master Vol & Waveform Placeholder -->
            <div class="control-column">
                <div class="control-group">
                    <div class="label-value-container full-width-flex">
                        <label for="master-volume">Master Volume</label>
                        <span id="master-volume-value">0.0 dB</span>
                    </div>
                    <input type="range" id="master-volume" min="-40" max="6" step="0.1" value="0">
                </div>
                <div class="control-group"
                    style="height: 60px; border: 1px solid #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7em; color: #666;">
                    MASTER WAVEFORM MONITOR
                </div>
            </div>

            <!-- Col 2: Clock & Rec -->
            <div class="control-column">
                <div class="control-group tight-bottom">
                    <div id="recording-time-display" class="track-time-display">00:00:00</div>
                </div>
                <div class="control-group master-rec-group" style="display: flex; gap: 5px; justify-content: center;">
                    <button id="master-record-button" class="app-button"
                        style="width: 50%; height: 24px !important;">REC</button>
                    <div
                        style="font-size: 0.7em; color: var(--gold); border: 1px solid var(--gold); padding: 2px 5px; border-radius: 4px;">
                        STEREO (WAV)</div>
                </div>
                <div class="control-group">
                    <div class="label-value-container full-width-flex">
                        <label for="loop-length">Loop Length (s)</label>
                        <span id="loop-length-value">4.0s</span>
                    </div>
                    <input type="range" id="loop-length" min="0.5" max="180" step="0.1" value="4">
                </div>
            </div>

            <!-- Col 3: LFO 1 -->
            <div class="control-column">
                <div class="control-group">
                    <button id="lfo-toggle" class="app-button" style="width: 80%; margin: 0 auto;">LFO 1</button>
                    <div class="meter-container lfo-meter" style="margin-top: 10px;">
                        <div id="lfo-meter-bar" class="meter-bar" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="control-group">
                    <div class="label-value-container full-width-flex" style="font-size: 0.7em;">
                        <label>Sweep 1</label>
                        <span id="lfo-time-value">1.8s</span>
                    </div>
                    <input type="range" id="lfo-time" min="0.1" max="20" value="1.8">
                </div>
            </div>

            <!-- Col 4: LFO 2 -->
            <div class="control-column">
                <div class="control-group">
                    <button id="lfo2-toggle" class="app-button" style="width: 80%; margin: 0 auto;">LFO 2</button>
                    <div class="meter-container lfo-meter" style="margin-top: 10px;">
                        <div id="lfo2-meter-bar" class="meter-bar" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="control-group">
                    <div class="label-value-container full-width-flex" style="font-size: 0.7em;">
                        <label>Sweep 2</label>
                        <span id="lfo2-time-value">1.8s</span>
                    </div>
                    <input type="range" id="lfo2-time" min="0.1" max="20" value="1.8">
                </div>
            </div>
        </div>

        <div class="tracks-container" id="tracks-container"></div>
    </div>

    <div id="cursor"></div>

    <script src="TrackView.js"></script>
    <script>
        let trackViews = [];
        let tracksInited = false;

        function applyState(state) {
            if (!tracksInited) {
                const container = document.getElementById('tracks-container');
                container.innerHTML = '';
                for (let i = 0; i < 8; i++) {
                    const tv = new window.TrackView(i);
                    container.appendChild(tv.buildElement());
                    trackViews.push(tv);
                }
                tracksInited = true;
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('mirror-ui').style.display = 'flex';
            }

            // Master Update
            if (state.master) {
                const volS = document.getElementById('master-volume');
                const volV = document.getElementById('master-volume-value');
                const lenS = document.getElementById('loop-length');
                const lenV = document.getElementById('loop-length-value');
                const recB = document.getElementById('master-record-button');

                if (volS) volS.value = state.master.volume;
                if (volV) volV.textContent = (state.master.volume || 0).toFixed(1) + " dB";
                if (lenS) lenS.value = state.master.loopLength;
                if (lenV) lenV.textContent = (state.master.loopLength || 0).toFixed(1) + "s";
                if (recB) recB.classList.toggle('recording', state.master.isRecording);

                document.getElementById('lfo-meter-bar').style.width = (state.master.lfo1Meter * 100) + "%";
                document.getElementById('lfo2-meter-bar').style.width = (state.master.lfo2Meter * 100) + "%";
                document.getElementById('lfo-toggle').classList.toggle('sweeping', state.master.lfo1Active);
                document.getElementById('lfo2-toggle').classList.toggle('sweeping', state.master.lfo2Active);
            }

            if (state.transport) {
                document.getElementById('recording-time-display').textContent = state.transport.position || "00:00:00";
            }

            // Tracks Update
            if (state.tracks && trackViews.length > 0) {
                state.tracks.forEach(t => {
                    const tv = trackViews[t.id];
                    if (!tv) return;

                    // Sync sliders
                    const params = ['vol', 'pan', 'pitch', 'treble', 'mid_gain', 'bass'];
                    params.forEach(p => {
                        const val = t[p === 'mid_gain' ? 'midGain' : p];
                        if (tv.elements.knobs[p]) tv.elements.knobs[p].value = val;
                        if (tv.elements.valueDisplays[p]) tv.elements.valueDisplays[p].textContent = parseFloat(val).toFixed(1);
                    });

                    // Sync status & buttons
                    if (t.armed) tv.setStatus('Recording', 'recording');
                    else if (t.isPlaying) tv.setStatus('Playing', 'playing');
                    else tv.setStatus('Ready', 'ready');

                    if (tv.elements.recBtn) tv.elements.recBtn.classList.toggle('recording', t.armed);
                    if (tv.elements.playBtn) tv.elements.playBtn.classList.toggle('playing', t.isPlaying);

                    // Meter Update (Hack for receiver display)
                    if (tv.elements.waveformCanvasL) {
                        // Use the canvas area as a meter bar for the receiver since we don't have real-time waveform data
                        const ctx = tv.elements.waveformCanvasL.getContext('2d');
                        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 300, 100);
                        ctx.fillStyle = '#0f0'; ctx.fillRect(0, 0, 300 * (t.meters.l || 0), 100);
                    }
                });
            }
        }

        function connectWS(url) {
            console.log("Connecting to WS:", url);
            const statusEl = document.getElementById('ws-status');
            const debugEl = document.getElementById('debug-info');

            if (statusEl) statusEl.textContent = "Connecting to " + url + "...";
            if (debugEl) debugEl.textContent = "Target: " + url;

            const ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';
            ws.onopen = () => {
                console.log("WS Connected");
                if (statusEl) {
                    statusEl.textContent = "✅ WS Connected - Waiting for state...";
                    statusEl.style.color = "#4CAF50";
                }
            };
            ws.onerror = (err) => {
                console.error("WS Error:", err);
                if (statusEl) {
                    statusEl.textContent = "❌ WS Connection Failed";
                    statusEl.style.color = "#f44336";
                }
                if (debugEl) debugEl.textContent += " [ERR]";
            };
            ws.onmessage = (e) => {
                const debugEl = document.getElementById('debug-info');

                if (typeof e.data === 'string') {
                    // console.log("Rx String:", e.data);
                    return;
                }
                try {
                    const view = new Uint8Array(e.data);
                    // if (debugEl) debugEl.textContent = `Rx: ${e.data.byteLength}b [${view[0]}]`;

                    if (view[0] === 3) {
                        // if (debugEl) debugEl.textContent += " JSON";
                        const json = JSON.parse(new TextDecoder().decode(e.data.slice(1)));
                        if (json.type === 'state') {
                            applyState(json);
                            // Clear debug text on success to keep clean
                            if (debugEl && debugEl.textContent.includes('Waiting')) debugEl.textContent = "✅ Valid State Received";
                        }
                        else if (json.type === 'cursor') {
                            const cur = document.getElementById('cursor');
                            cur.style.display = 'block';
                            cur.style.left = (json.x * 100) + "vw";
                            cur.style.top = (json.y * 100) + "vh";
                        }
                    } else if (view[0] === 1) {
                        // Video frame - ignore for log
                    } else {
                        if (debugEl) debugEl.textContent = `Rx Unknown [${view[0]}] len=${e.data.byteLength}`;
                    }
                } catch (err) {
                    console.error("Parse Error:", err);
                    if (debugEl) debugEl.textContent = `Rx Error: ${err.message}`;
                }
            };
            ws.onclose = () => {
                console.log("WS Closed, retrying...");
                setTimeout(() => connectWS(url), 2000);
            };
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('ws')) connectWS(params.get('ws'));
            if (typeof cast !== 'undefined') {
                const ctx = cast.framework.CastReceiverContext.getInstance();
                ctx.addCustomMessageListener('urn:x-cast:com.nowmultimedia.mxs004', e => {
                    const url = e.data.wsUrl || e.data;
                    if (url) connectWS(url);
                });
                ctx.start();
            }
        };
    </script>
</body>

</html>
