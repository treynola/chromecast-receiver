<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror [High-Fidelity]</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="receiver.css">
    <style>
        /* Receiver Overrides */
        #init-overlay {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .container { opacity: 0; transition: opacity 1s ease-in; }
        #debug-log {
            position: fixed; bottom: 10px; left: 10px; right: 10px;
            max-height: 80px; overflow-y: auto; background: rgba(0,0,0,0.8);
            border: 1px solid #333; color: #0f0; font-family: monospace; font-size: 10px;
            z-index: 100000; padding: 8px; border-radius: 4px; pointer-events: none;
        }
        #ghost-cursor {
            position: absolute; width: 24px; height: 24px; background: rgba(250, 215, 142, 0.4);
            border: 2px solid var(--gold); border-radius: 50%; pointer-events: none;
            z-index: 90000; transform: translate(-50%, -50%); display: none;
        }
        .track-time-display { font-family: 'Courier New', Courier, monospace !important; }
    </style>
</head>
<body class="app-loading" style="background-color: #000;">
    <div id="init-overlay">
        <div style="font-family: 'Mexcellent', sans-serif; color: var(--gold); font-size: 3.5em; margin-bottom: 20px;">MXS-004</div>
        <div id="init-status" style="color: #666; font-family: monospace; letter-spacing: 2px;">WAITING FOR STUDIO SIGNAL...</div>
        <div style="color: #444; font-size: 0.8em; margin-top: 30px;">TAP SCREEN TO ENABLE AUDIO</div>
    </div>

    <div id="debug-log">🚀 Receiver Booting (v13.8.83)...</div>
    <div id="ghost-cursor"></div>

    <div class="container" id="studio-root">
        <div class="header" style="height:32px; min-height:32px; padding:2px 8px; margin-bottom:4px;">
            <div class="header-left">
                <h1 style="font-size:1.5em; margin:0; font-family: 'Mexcellent', sans-serif; color: var(--gold);">NOWMULTIMEDIA MXS-004</h1>
            </div>
            <div class="header-right">
                <h2 style="font-size:0.85em; margin:0; padding:0; font-family: 'Mexcellent', sans-serif; color: var(--gold); letter-spacing: 0.5px;">Studio Mirror :: High-Fidelity</h2>
            </div>
        </div>

        <div class="main-content">
            <!-- Column 1: MASTER -->
            <div class="master-column" id="master-column">
                <div class="track-header">Master Recording:</div>
                <div id="recording-time-display" class="track-time-display">00:00:00</div>
                <div class="master-item master-volume-aligned" style="display: flex; align-items: center; gap: 4px;">
                    <label class="master-label" style="font-size: 0.72em; margin: 0;">Vol</label>
                    <input type="range" id="master-volume" class="pa-mic-slider" min="-60" max="6" step="0.1" value="0">
                    <span id="master-volume-value" class="pa-mic-value" style="font-size: 0.72em;">0.0 dB</span>
                </div>
                <div class="master-item master-waveform-item">
                    <div class="waveform-box master-waveform-box">
                        <div class="waveform-labels"><div class="waveform-label-external">L</div><div class="waveform-label-external">R</div></div>
                        <div class="waveform-canvas-container"><canvas id="master-waveform-L" class="waveform-canvas"></canvas><canvas id="master-waveform-R" class="waveform-canvas"></canvas></div>
                    </div>
                </div>
                <div class="lfo-side-by-side-container" style="display:flex; justify-content:space-between; margin-top:10px;">
                    <div class="lfo-column" style="flex:1;">
                        <div class="master-item"><button id="lfo-toggle">LFO 1</button></div>
                        <div class="master-item"><div class="meter-container lfo-meter"><div id="lfo-meter-bar" class="meter-bar"></div></div></div>
                    </div>
                    <div class="lfo-separator" style="width:1px; background:var(--gold); margin:0 4px;"></div>
                    <div class="lfo-column" style="flex:1;">
                        <div class="master-item"><button id="lfo2-toggle">LFO 2</button></div>
                        <div class="master-item"><div class="meter-container lfo-meter"><div id="lfo2-meter-bar" class="meter-bar"></div></div></div>
                    </div>
                </div>
                <div class="master-item sample-center-container">
                    <div class="track-header" style="text-align:center;">Sample Station</div>
                    <div class="sample-grid" id="sample-grid" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:5px; margin-top:5px;">
                        <!-- Pads 1-20 injected by receiver.js -->
                    </div>
                </div>
            </div>

            <!-- Columns 2-5: TRACKS -->
            <div class="tracks-container" id="tracks-container">
                <!-- Tracks injected by receiver.js to match app exactly -->
            </div>
        </div>
    </div>

    <script src="receiver.js"></script>
</body>
</html>
