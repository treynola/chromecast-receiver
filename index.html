<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.8.80</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #FF0000; --gold: #FAD78E; --green: #008000; --bg: #000; }
        html, body { background: #000; margin:0; padding:0; width:100%; height:100%; overflow:hidden; color:#fff; font-family:sans-serif; }
        #init-overlay { position:fixed; inset:0; background:#000; z-index:99999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        #studio-root { width:100vw; height:100vh; display:flex; flex-direction:column; padding:20px; box-sizing:border-box; background:#050505; border: 2px solid #222; display: none; }
        .header { display:flex; justify-content:space-between; border-bottom:1px solid var(--gold); padding-bottom:10px; margin-bottom:10px; }
        .main-content { display:grid; grid-template-columns:300px 1fr; gap:20px; flex:1; }
        .tracks-container { display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; }
        .master-column, .track { background:#111; border:1px solid #333; border-radius:8px; padding:15px; display:flex; flex-direction:column; gap:10px; }
        .track-header { color:var(--gold); font-size:1.2em; font-weight:bold; }
        .time-display { font-family:monospace; font-size:2em; color:var(--green); text-align:center; background:#000; padding:10px; border-radius:4px; }
        .status { font-size:0.8em; text-align:center; color:#888; }
        .meter-box { height:6px; background:#222; border-radius:3px; overflow:hidden; }
        .meter-fill { height:100%; width:0%; background:var(--gold); }
        .btn { border:1px solid #444; background:none; color:#aaa; padding:8px; font-size:0.7em; }
        .btn.active { background:var(--red) !important; color:#fff !important; border-color:var(--red) !important; }
        #debug-log { position:fixed; bottom:20px; left:20px; right:20px; max-height:80px; overflow-y:auto; background:rgba(0,0,0,0.9); color:#0f0; font-family:monospace; font-size:10px; padding:10px; z-index:100000; border:1px solid rgba(0,255,0,0.2); }
    </style>
</head>
<body>
    <div id="init-overlay">
        <div style="font-size:3em; color:var(--gold); font-weight:bold; margin-bottom:20px;">MXS-004</div>
        <div id="init-status" style="color:#888; font-family:monospace;">TAP TV SCREEN TO ENABLE AUDIO</div>
        <button onclick="reveal()" style="margin-top:20px; padding:15px 30px; background:var(--gold); border:none; cursor:pointer; font-weight:bold;">REVEAL GUI</button>
    </div>
    <div id="debug-log">🚀 Studio Mirror v13.8.80 (Audio Buffer Fix)</div>
    <div id="studio-root">
        <div class="header">
            <div style="font-size:2em; color:var(--gold);">STUDIO MIRROR</div>
            <div id="sync-status" style="color:var(--green);">SYNC ACTIVE</div>
        </div>
        <div class="main-content">
            <div class="master-column">
                <div class="track-header">MASTER</div>
                <div id="m-time" class="time-display">00:00:00</div>
                <div class="meter-box"><div id="lfo1" class="meter-fill"></div></div>
                <div class="meter-box"><div id="lfo2" class="meter-fill"></div></div>
                <button id="m-rec" class="btn" style="width:100%; font-weight:bold; height:40px;">RECORD</button>
            </div>
            <div class="tracks-container">
                <div class="track" id="t0"><div class="track-header">TRACK 1</div><div class="time-display">00:00:00</div><div class="status">Ready</div><button class="btn">REC</button></div>
                <div class="track" id="t1"><div class="track-header">TRACK 2</div><div class="time-display">00:00:00</div><div class="status">Ready</div><button class="btn">REC</button></div>
                <div class="track" id="t2"><div class="track-header">TRACK 3</div><div class="time-display">00:00:00</div><div class="status">Ready</div><button class="btn">REC</button></div>
                <div class="track" id="t3"><div class="track-header">TRACK 4</div><div class="time-display">00:00:00</div><div class="status">Ready</div><button class="btn">REC</button></div>
            </div>
        </div>
    </div>
    <script>
        (function() {
            var ws = null; var lastState = null; var audioCtx = null;
            var debug = document.getElementById('debug-log');
            var overlay = document.getElementById('init-overlay');
            var root = document.getElementById('studio-root');
            function log(m) { console.log(m); debug.innerHTML += '<br>' + m; debug.scrollTop = debug.scrollHeight; }

            window.reveal = function() { overlay.style.display = 'none'; root.style.display = 'flex'; if (audioCtx) audioCtx.resume(); };
            setTimeout(reveal, 3000);

            // --- ROBUST PCM RING BUFFER ---
            var MAX_BUFFER = 48000 * 2; // 1 second of stereo
            var pcmBuffer = new Float32Array(MAX_BUFFER);
            var writePtr = 0; var readPtr = 0;
            function feedPCM(data) {
                var int16 = new Int16Array(data);
                for (var i = 0; i < int16.length; i++) {
                    pcmBuffer[writePtr] = int16[i] / 32768;
                    writePtr = (writePtr + 1) % MAX_BUFFER;
                }
            }

            function initAudio() {
                if (audioCtx) return;
                log("🔊 Starting PCM Ingester (Ring Buffer Mode)...");
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                var node = audioCtx.createScriptProcessor(4096, 0, 2);
                node.onaudioprocess = function(e) {
                    var oL = e.outputBuffer.getChannelData(0);
                    var oR = e.outputBuffer.getChannelData(1);
                    var avail = (writePtr - readPtr + MAX_BUFFER) % MAX_BUFFER;
                    if (avail < 8192) { oL.fill(0); oR.fill(0); return; } // Buffer underrun protection
                    for (var i = 0; i < 4096; i++) {
                        oL[i] = pcmBuffer[readPtr]; readPtr = (readPtr + 1) % MAX_BUFFER;
                        oR[i] = pcmBuffer[readPtr]; readPtr = (readPtr + 1) % MAX_BUFFER;
                    }
                };
                node.connect(audioCtx.destination);
                window._feed = feedPCM;
            }

            function update(s) {
                if (!s) return;
                lastState = s;
                if (overlay.style.display !== 'none') reveal();
                if (s.master) {
                    document.getElementById('m-rec').className = s.master.isRecording ? 'btn active' : 'btn';
                    if (s.transport) document.getElementById('m-time').textContent = s.transport.position;
                }
                if (s.tracks) {
                    s.tracks.forEach(function(t, i) {
                        var el = document.getElementById('t' + i);
                        if (el) {
                            el.querySelector('.status').textContent = t.statusText || 'Ready';
                            el.querySelector('.btn').className = t.isRecording ? 'btn active' : 'btn';
                        }
                    });
                }
            }

            function connect(url) {
                log("🔌 Connecting: " + url);
                ws = new WebSocket(url); ws.binaryType = 'arraybuffer';
                ws.onopen = function() { log("✅ Handshake Success!"); initAudio(); };
                ws.onmessage = function(e) {
                    if (e.data instanceof ArrayBuffer) { if (window._feed) window._feed(e.data); }
                    else { try { var m = JSON.parse(e.data); if (m.type==='STATE_UPDATE') update(m.state); } catch(err){} }
                };
                ws.onclose = function() { log("🛑 Lost. Retrying..."); setTimeout(function(){ connect(url); }, 2000); };
            }

            window.onload = function() {
                var ctx = cast.framework.CastReceiverContext.getInstance();
                ctx.getPlayerManager().setMessageInterceptor(cast.framework.messages.MessageType.LOAD, function(req) {
                    if (req.media && req.media.contentId) {
                        try { var u = new URL(req.media.contentId); connect("ws://" + u.hostname + ":8080"); } catch(e) {}
                    }
                    return null;
                });
                ctx.addCustomMessageListener('urn:x-cast:com.nowmultimedia.webrtc', function(e) {
                    var d = e.data; if (typeof d.payload === 'string') try { d = JSON.parse(d.payload); } catch(err){}
                    if (d.type === 'STATE_UPDATE') update(d.state);
                });
                ctx.start({ disableIdleTimeout: true });
                log("📡 Cast SDK Ready.");
            };
            document.addEventListener('click', function() { if (audioCtx) audioCtx.resume(); }, { once: false });
        })();
    </script>
</body>
</html>
