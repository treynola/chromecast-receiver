<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.9.18 [LOGIC RESTORED]</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles_main.css?v=13.8.132">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --accent: #ff0055;
            --text: #ffffff;
            --text-dim: #888888;
            --green: #00ff88;
            --red: #ff3333;
            --scale: 1;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            transform: scale(var(--scale));
            transform-origin: top center;
        }
        #master-column {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .track {
            background: var(--surface);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .track-header { font-weight: 800; font-size: 0.9em; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .track-time-display { font-family: 'JetBrains Mono', monospace; font-size: 1.4em; color: var(--green); margin: 5px 0; }
        .waveform-box { height: 60px; background: #000; border-radius: 6px; position: relative; overflow: hidden; border: 1px solid #222; }
        .waveform-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .status-indicator { font-size: 0.7em; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; font-weight: bold; width: fit-content; }
        .status-ready { background: rgba(0, 255, 136, 0.15); color: var(--green); }
        .status-recording { background: rgba(255, 51, 51, 0.15); color: var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        #bridge-diag-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #0f0;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 10px;
            color: #0f0;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }
        #bridge-status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
        
        .pa-mic-slider { width: 100%; accent-color: var(--accent); }
        .knob-container { display: flex; flex-direction: column; gap: 4px; }
        .knob-label-group { display: flex; justify-content: space-between; font-size: 0.7em; color: var(--text-dim); }
        .param-value { color: var(--accent); font-weight: bold; }
        select { background: #333; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 4px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div id="main-container">
        <div id="main-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
            <!-- Dynamic Tracks -->
        </div>
        
        <div id="bridge-diag-panel">
            <div id="bridge-status-dot"></div>
            <div id="bridge-diag-text">BUF: 0 | RATE: 1.0000x | SYNCING | WS: DISCONNECTED [DIRECT BRIDGE]</div>
        </div>
    </div>

    <script>
        (function() {
            const CUSTOM_NAMESPACE = 'urn:x-cast:com.nowmultimedia.mxs004';
            const KNOB_CONFIGS = [{ l: 'Pitch', p: 'pitch' }, { l: 'Volume', p: 'vol' }, { l: 'Pan', p: 'pan' }, { l: 'Treble', p: 'treble' }, { l: 'Mid Freq', p: 'mid_freq' }, { l: 'Mid Gain', p: 'mid_gain' }, { l: 'Bass', p: 'bass' }];
            
            var audioCtx = null;
            var workletNode = null;
            var binaryWS = null;
            var lastStateUpdate = Date.now();

            function buildGUI() {
                const grid = document.getElementById('main-grid');
                if (!grid) return;
                grid.innerHTML = '';

                for (let i = 0; i < 4; i++) {
                    const t = document.createElement('div');
                    t.className = 'track';
                    t.id = `track-${i}`;
                    
                    let html = `
                        <div class="track-header">TRACK ${i+1}</div>
                        <div class="track-time-display" id="t-time-${i}">00:00:00</div>
                        <div class="status-indicator status-ready" id="t-st-${i}">Ready</div>
                        <div class="waveform-box">
                            <canvas class="waveform-canvas" id="t-wf-${i}"></canvas>
                        </div>
                        <div class="control-group">
                            <label style="font-size: 0.7em; color: #888;">Input Gain</label>
                            <input type="range" class="pa-mic-slider" id="t-gain-${i}" min="-48" max="48" step="0.1">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px;">
                    `;
                    
                    KNOB_CONFIGS.slice(0, 4).forEach(cfg => {
                        html += `
                            <div class="knob-container">
                                <div class="knob-label-group">
                                    <label>${cfg.l}</label>
                                    <span class="param-value" id="t-${cfg.p}-val-${i}">0</span>
                                </div>
                                <input type="range" class="pa-mic-slider" id="t-${cfg.p}-sl-${i}">
                            </div>
                        `;
                    });
                    
                    html += `</div>`;
                    t.innerHTML = html;
                    grid.appendChild(t);
                }
                updateScale();
            }

            function updateScale() {
                const winW = window.innerWidth;
                const winH = window.innerHeight;
                document.documentElement.style.setProperty('--scale', Math.min(winW/1440, winH/810) * 0.95);
            }

            function relayLogToStudio(msg) {
                console.log(`[TV] ${msg}`);
                const context = cast.framework.CastReceiverContext.getInstance();
                const senders = context.getSenders();
                if (senders.length > 0) {
                    try {
                        context.sendCustomMessage(CUSTOM_NAMESPACE, senders[0].id, { type: 'LOG', msg: `[TV LOG] ${msg}` });
                    } catch(e) {}
                }
                if (binaryWS && binaryWS.readyState === WebSocket.OPEN) {
                    try { binaryWS.send(JSON.stringify({ type: 'TV_LOG', message: msg })); } catch(e) {}
                }
            }

            async function initAudio(rate) {
                const targetRate = rate || 48000;
                if (!audioCtx || audioCtx.sampleRate !== targetRate) {
                    if (audioCtx) await audioCtx.close();
                    
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: targetRate });
                    await audioCtx.audioWorklet.addModule('pcm-player-worklet.js');
                    
                    workletNode = new AudioWorkletNode(audioCtx, 'pcm-player-worklet', { outputChannelCount: [2] });
                    workletNode.connect(audioCtx.destination);

                    workletNode.port.onmessage = (e) => {
                        if (e.data.type === 'DIAG') {
                            const diagEl = document.getElementById('bridge-diag-text');
                            if (diagEl) {
                                const wsStatus = (binaryWS && binaryWS.readyState === WebSocket.OPEN) ? 'CONNECTED' : 'DISCONNECTED';
                                diagEl.textContent = `BUF: ${e.data.available} | RATE: ${e.data.rate.toFixed(4)}x | ${e.data.locked ? 'LOCKED' : 'SYNCING'} | WS: ${wsStatus}`;
                            }
                        }
                    };
                    relayLogToStudio(`✅ TV: Audio Sink Active @ ${audioCtx.sampleRate}Hz`);
                }
            }

            function connectBinaryBridge(ip) {
                if (binaryWS) binaryWS.close();
                const url = `ws://${ip}:8080`;
                binaryWS = new WebSocket(url);
                binaryWS.binaryType = 'arraybuffer';

                binaryWS.onopen = () => {
                    relayLogToStudio(`✅ TV: WebSocket Connected to ${url}`);
                    const dot = document.getElementById('bridge-status-dot');
                    if (dot) dot.style.backgroundColor = '#0f0';
                };

                binaryWS.onmessage = async (event) => {
                    if (typeof event.data === 'string') {
                        try {
                            const msg = JSON.parse(event.data);
                            if (msg.type === 'BRIDGE_CONFIG') initAudio(msg.config.sampleRate);
                        } catch(e) {}
                        return;
                    }
                    if (workletNode) {
                        const buffer = (event.data instanceof Blob) ? await event.data.arrayBuffer() : event.data;
                        workletNode.port.postMessage(buffer, [buffer]);
                    }
                };

                binaryWS.onclose = () => {
                    const dot = document.getElementById('bridge-status-dot');
                    if (dot) dot.style.backgroundColor = '#f33';
                    setTimeout(() => connectBinaryBridge(ip), 5000);
                };
            }

            function renderState(state) {
                lastStateUpdate = Date.now();
                if (!state || !state.tracks) return;
                state.tracks.forEach((track, i) => {
                    const el = document.getElementById(`track-${i}`);
                    if (!el) return;
                    
                    const timeEl = document.getElementById(`t-time-${i}`);
                    if (timeEl) timeEl.textContent = track.displayTime || '00:00:00';
                    
                    const stEl = document.getElementById(`t-st-${i}`);
                    if (stEl) {
                        stEl.textContent = track.status || 'Ready';
                        stEl.className = `status-indicator status-${track.status?.toLowerCase() || 'ready'}`;
                    }

                    const gainEl = document.getElementById(`t-gain-${i}`);
                    if (gainEl) gainEl.value = track.gain || 0;
                });
            }

            // Start Cast Context
            window.onload = () => {
                buildGUI();
                const context = cast.framework.CastReceiverContext.getInstance();
                
                context.addCustomMessageListener(CUSTOM_NAMESPACE, (event) => {
                    const d = event.data;
                    if (d.type === 'STATE_UPDATE') renderState(d.state);
                    if (d.type === 'BRIDGE_IP') connectBinaryBridge(d.ip);
                });

                const options = new cast.framework.CastReceiverOptions();
                options.maxInactivity = 3600;
                context.start(options);
                relayLogToStudio("🚀 TV: Cast Receiver Framework Started");
            };

            // Self-Heal Guard
            setInterval(() => {
                if (Date.now() - lastStateUpdate > 15000) {
                    relayLogToStudio("⚠️ TV: GUI Signal Timeout. Self-Healing...");
                    window.location.reload();
                }
            }, 5000);

            window.onresize = updateScale;
        })();
    </script>
</body>
</html>
