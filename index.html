<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MXS-004 Premium Cast Receiver</title>
    <style>
        :root {
            --gold: #b38600;
            --dark-gold: #8a6800;
            --off-black: #1a1a1a;
            --text-color: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        body {
            background: var(--off-black);
            color: var(--text-color);
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(179, 134, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(179, 134, 0, 0.05) 0%, transparent 40%);
        }

        #splash {
            position: absolute;
            z-index: 10;
            text-align: center;
            transition: opacity 1s ease-out;
        }

        .branding-h1 {
            font-size: 4rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-shadow: 0 0 20px rgba(179, 134, 0, 0.4);
            margin-bottom: 0.5rem;
        }

        .branding-h2 {
            font-size: 1.5rem;
            color: var(--text-color);
            opacity: 0.7;
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        #stream-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        #stream {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        #status-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(179, 134, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            letter-spacing: 1px;
            z-index: 20;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 10px;
            height: 10px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
                opacity: 1;
            }

            to {
                transform: scale(1.5);
                opacity: 0.3;
            }
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="splash">
        <h1 class="branding-h1">MXS-004</h1>
        <h2 class="branding-h2">Mix N Studio 004</h2>
    </div>

    <div id="stream-container">
        <img id="stream" alt="Studio View">
    </div>

    <div id="status-bar">
        <div class="spinner"></div>
        <span id="status-text">INITIALIZING STUDIO SYNC...</span>
    </div>

    <cast-media-player style="display:none"></cast-media-player>

    <div id="debug-overlay"
        style="position: absolute; top: 10px; left: 10px; color: yellow; background: rgba(0,0,0,0.8); z-index: 9999; font-family: monospace; padding: 10px; max-width: 50%; pointer-events: none; opacity: 0.8;">
        DEBUG LOG:<br>
    </div>

    <script src="//www.gstatic.com/cast/sdk/libs/caf/receiver/v3/cast_receiver_framework.js"></script>
    <script>
        // VISIBLE CONSOLE LOGGING
        const debugDiv = document.getElementById('debug-overlay');
        function logToScreen(msg) {
            const line = document.createElement('div');
            line.textContent = msg;
            debugDiv.appendChild(line);
            if (debugDiv.childElementCount > 10) debugDiv.firstChild.remove();
        }
        const originalLog = console.log;
        const originalError = console.error;
        console.log = (...args) => { originalLog(...args); logToScreen("INFO: " + args.join(' ')); };
        console.error = (...args) => { originalError(...args); logToScreen("ERR: " + args.join(' ')); };

        console.log("Receiver Version: Debug 2.0");

        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        const splash = document.getElementById('splash');
        const container = document.getElementById('stream-container');
        const stream = document.getElementById('stream');
        const statusText = document.getElementById('status-text');
        const statusBar = document.getElementById('status-bar');

        function startStreaming(url) {
            console.log("Starting Stream: " + url);

            // FORCE http instead of https
            let targetUrl = url;
            if (targetUrl.startsWith('https://')) {
                targetUrl = targetUrl.replace('https://', 'http://');
            }

            statusText.textContent = 'STUDIO CONNECTED';
            stream.src = targetUrl;

            stream.onload = () => {
                console.log("Stream Loaded Successfully");
                splash.classList.add('hidden');
                container.style.opacity = '1';
                setTimeout(() => { statusBar.classList.add('hidden'); }, 4000);
            };

            stream.onerror = (e) => {
                console.error("Stream Load Error");
                statusBar.classList.remove('hidden');
                statusText.textContent = 'WAITING FOR STUDIO...';
                statusText.style.color = '#ff4444';
            };
        }

        // CAF Load Interceptor
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            loadData => {
                console.log('Intercepted LOAD request');
                if (loadData.media && loadData.media.contentId) {
                    console.log('ContentID found: ' + loadData.media.contentId);
                    startStreaming(loadData.media.contentId);
                } else {
                    console.error('No Content ID in LOAD data');
                }
                return loadData;
            }
        );

        context.start();
        console.log('Receiver Context Started');

        // Initial check for deep link parameters
        const params = new URLSearchParams(window.location.search);
        const host = params.get('host');
        const port = params.get('port');
        if (host && port) {
            console.log("Found Host/Port params, auto-starting...");
            startStreaming(`http://${host}:${port}/stream.mjpeg`);
        }
    </script>
</body>

</html>
