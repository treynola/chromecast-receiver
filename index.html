<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.8.88 [DIAGNOSTIC]</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        /* INLINED ESSENTIAL CSS v13.8.88 */
        :root {
            --red: #FF0000; --gold: #FAD78E; --green: #008000;
            --off-black: #1a1a1a; --dark-gray: #2c2c2c; --mid-gray: #444; --text-color: #f0f0f0;
        }
        body { 
            background: #000044 !important; color: var(--text-color); 
            font-family: 'Courier New', monospace; margin:0; padding:0; overflow:hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        #failsafe-reveal {
            position: fixed; inset: 0; background: #008; color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000000; font-family: sans-serif; text-align: center;
        }
        .container {
            width: 1432px; height: 802px; background: var(--dark-gray);
            border: 1px solid var(--green); border-radius: 12px;
            box-shadow: 0 0 0 2px var(--gold), 0 0 0 4px var(--red);
            display: flex; flex-direction: column; padding: 6px; box-sizing: border-box;
            opacity: 0; transition: opacity 0.5s;
        }
        .header { height: 36px; background: var(--off-black); display: flex; align-items: center; padding: 0 10px; border-radius: 8px; margin-bottom: 6px; }
        .main-content { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; flex: 1; min-height: 0; }
        .track, .master-column { border: 1px solid var(--green); border-radius: 8px; padding: 4px; background: var(--dark-gray); display: flex; flex-direction: column; gap: 4px; }
        .track-header { color: var(--gold); font-weight: bold; font-size: 0.8em; border-bottom: 1px solid var(--mid-gray); padding-bottom: 2px; }
        .track-time-display { font-size: 1.2em; color: var(--green); text-align: center; margin: 5px 0; }
        .waveform-box { height: 60px; border: 1px solid var(--mid-gray); display: flex; align-items: center; }
        .waveform-canvas { flex: 1; height: 100%; background: #000; border-left: 1px solid var(--gold); }
        .sample-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .sample-btn { background: #333; color: var(--gold); border: 1px solid #555; font-size: 0.7em; height: 30px; border-radius: 4px; }
        .sample-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 10px var(--gold); }
        .rec-btn { background: #400; color: #f00; border: 1px solid #f00; border-radius: 4px; font-weight: bold; padding: 2px 5px; }
        .rec-btn.recording { background: #f00; color: #fff; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #debug-log { position: fixed; bottom: 5px; left: 5px; font-size: 10px; color: #0f0; background: rgba(0,0,0,0.8); padding: 5px; z-index: 1000001; max-width: 300px; }
        #ghost-cursor { position: absolute; width: 24px; height: 24px; border: 2px solid gold; border-radius: 50%; display: none; z-index: 99999; }
    </style>
</head>
<body class="app-loading">
    <div id="failsafe-reveal">
        <h1 style="font-size: 3em; margin: 0;">MXS-004 MIRROR</h1>
        <p style="font-size: 1.2em; color: #ccc;">v13.8.88 DIAGNOSTIC BOOT</p>
        <p id="failsafe-status" style="font-size: 1.1em; color: #f90;">IF YOU SEE BLUE, THE URL LOADED!</p>
        <p style="color: #66f;">Waiting for Studio Signal...</p>
    </div>

    <div id="debug-log">🚀 Booting Diagnostic v13.8.88...</div>
    <div id="ghost-cursor"></div>

    <div class="container" id="studio-root">
        <div class="header">
            <h1 style="font-size: 1em; color: var(--gold); margin:0;">NOWMULTIMEDIA MXS-004 STUDIO</h1>
        </div>
        <div class="main-content">
            <div class="master-column">
                <div class="track-header">MASTER</div>
                <div id="recording-time-display" class="track-time-display">00:00:00</div>
                <div id="sample-grid" class="sample-grid"></div>
            </div>
            <div id="tracks-container" style="display:contents;"></div>
        </div>
    </div>

    <script>
        /* INLINED LOGIC v13.8.88 */
        (function() {
            var ws = null; var lastState = null;
            var debugEl = document.getElementById('debug-log');
            var overlay = document.getElementById('failsafe-reveal');
            var studioRoot = document.getElementById('studio-root');
            var cursorEl = document.getElementById('ghost-cursor');

            function log(m) {
                console.log(m);
                if (debugEl) { debugEl.innerHTML += '<br>' + m; debugEl.scrollTop = debugEl.scrollHeight; }
            }

            function buildGUI() {
                var grid = document.getElementById('sample-grid');
                for (var p = 1; p <= 20; p++) {
                    var btn = document.createElement('button'); btn.className = 'sample-btn';
                    btn.id = 'sample-' + p; btn.textContent = p; grid.appendChild(btn);
                }
                var tc = document.getElementById('tracks-container');
                for (var i = 0; i < 4; i++) {
                    var t = document.createElement('div'); t.className = 'track'; t.id = 'track-' + i;
                    t.innerHTML = '<div class="track-header">TRACK '+(i+1)+'</div><div class="track-time-display">00:00:00</div><div class="waveform-box"><div class="waveform-canvas"></div></div><div style="display:flex; gap:2px;"><button class="rec-btn">REC</button><button class="sample-btn" style="flex:1;">PLAY</button></div>';
                    tc.appendChild(t);
                }
            }

            function renderState(state) {
                if (!state) return;
                if (overlay && overlay.style.display !== 'none') {
                    overlay.style.display = 'none'; studioRoot.style.opacity = '1';
                    log("🎬 SIGNAL ACQUIRED: Displaying Studio GUI.");
                }
                if (state.cursor && cursorEl) {
                    cursorEl.style.display = 'block';
                    cursorEl.style.left = (state.cursor.x * 100) + '%';
                    cursorEl.style.top = (state.cursor.y * 100) + '%';
                }
            }

            function connect(url) {
                log("🔌 Connecting: " + url);
                ws = new WebSocket(url); ws.binaryType = 'arraybuffer';
                ws.onopen = function() { log("✅ Handshake Success!"); };
                ws.onmessage = function(e) {
                    if (!(e.data instanceof ArrayBuffer)) {
                        try { var m = JSON.parse(e.data); if (m.type==='STATE_UPDATE') renderState(m.state); } catch(x){}
                    }
                };
                ws.onclose = function() { setTimeout(function(){ connect(url); }, 2000); };
            }

            window.onload = function() {
                buildGUI();
                try {
                    var ctx = cast.framework.CastReceiverContext.getInstance();
                    ctx.getPlayerManager().setMessageInterceptor(cast.framework.messages.MessageType.LOAD, function(req) {
                        log("📥 LOAD Intercepted");
                        if (req.media && req.media.contentId) {
                            try {
                                var u = new URL(req.media.contentId);
                                connect("ws://" + u.hostname + ":8080");
                            } catch(x) { log("❌ URL Parse Error"); }
                        }
                        return null;
                    });
                    ctx.addCustomMessageListener('urn:x-cast:com.nowmultimedia.webrtc', function(e) {
                        log("📩 Signal Received");
                        var d = e.data; if (typeof d.payload === 'string') try { d = JSON.parse(d.payload); } catch(x){}
                        if (d.type === 'STATE_UPDATE') renderState(d.state);
                    });
                    ctx.start({ disableIdleTimeout: true });
                    log("📡 Diagnostic Suite v13.8.88 Active.");
                } catch(x) { log("❌ Cast SDK Error: " + x.message); }
            };
        })();
    </script>
</body>
</html>
