<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.8.97 [DEBUG ENABLED]</title>
    <!-- Google Cast SDK -->
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <!-- Cast Debug Logger (As per Section 11/12 of Codelab) -->
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
    
    <style>
        :root { --gold: #FAD78E; --green: #008000; --red: #FF0000; --dark-gray: #2c2c2c; }
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin:0; overflow:hidden; }
        .container { 
            width: 1432px; height: 802px; position: absolute; top:50%; left:50%; transform:translate(-50%, -50%); 
            background: var(--dark-gray); border: 1px solid var(--green); border-radius: 12px;
            padding: 10px; box-sizing: border-box; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.5s;
        }
        .main-content { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; flex: 1; }
        .column { border: 1px solid #444; border-radius: 8px; padding: 10px; background: #1a1a1a; display: flex; flex-direction: column; }
        .header-text { color: var(--gold); font-weight: bold; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .time-display { font-size: 2em; color: var(--green); text-align: center; }
        /* Debug Console Overlay is managed by CAF */
    </style>
</head>
<body>
    <div class="container" id="studio-root">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <h1 style="color: var(--gold); margin:0;">MXS-004 STUDIO MASTER</h1>
            <div id="status-tag" style="color: #666; font-size: 0.8em;">WAITING FOR SIGNAL...</div>
        </div>
        <div class="main-content">
            <div class="column"><div class="header-text">MASTER</div><div id="recording-time" class="time-display">00:00:00</div></div>
            <div class="column"><div class="header-text">TRACK 1</div><div class="time-display">00:00:00</div></div>
            <div class="column"><div class="header-text">TRACK 2</div><div class="time-display">00:00:00</div></div>
            <div class="column"><div class="header-text">TRACK 3</div><div class="time-display">00:00:00</div></div>
            <div class="column"><div class="header-text">TRACK 4</div><div class="time-display">00:00:00</div></div>
        </div>
    </div>

    <script>
        (function() {
            const context = cast.framework.CastReceiverContext.getInstance();
            const playerManager = context.getPlayerManager();
            const castDebugLogger = cast.debug.CastDebugLogger.getInstance();
            const studioRoot = document.getElementById('studio-root');
            const statusTag = document.getElementById('status-tag');
            
            // Enable Debug Logger
            castDebugLogger.setEnabled(true);
            castDebugLogger.showDebugLogs(true); // Show overlay
            
            // Set verbosity
            castDebugLogger.loggerLevelByEvents = {
                'cast.framework.events.category.CORE': cast.framework.LoggerLevel.INFO,
                'cast.framework.events.EventType.MEDIA_STATUS': cast.framework.LoggerLevel.DEBUG
            };

            function renderState(state) {
                if (!state) return;
                if (studioRoot.style.opacity !== '1') {
                    studioRoot.style.opacity = '1';
                    statusTag.textContent = "SIGNAL ACQUIRED"; statusTag.style.color = "#0f0";
                    castDebugLogger.info('STUDIO', '🎬 Signal Acquired. Displaying GUI.');
                }
                if (state.transport) document.getElementById('recording-time').textContent = state.transport.position;
            }

            // Custom Message Listener
            context.addCustomMessageListener('urn:x-cast:com.nowmultimedia.webrtc', (e) => {
                castDebugLogger.debug('STUDIO', '📩 Signal Received: ' + JSON.stringify(e.data).substring(0, 100));
                try {
                    let d = e.data;
                    if (typeof d === 'string') d = JSON.parse(d);
                    if (d.payload) d = (typeof d.payload === 'string') ? JSON.parse(d.payload) : d.payload;
                    if (d.type === 'STATE_UPDATE') renderState(d.state);
                } catch(x) {
                    castDebugLogger.error('STUDIO', '❌ Signal Parse Error: ' + x.message);
                }
            });

            // WebSocket Bridge
            function connectWS(url) {
                castDebugLogger.info('STUDIO', '🔌 Connecting to WebSocket: ' + url);
                const ws = new WebSocket(url);
                ws.onopen = () => castDebugLogger.info('STUDIO', '✅ WS Connected.');
                ws.onmessage = (e) => {
                    try {
                        const m = JSON.parse(e.data);
                        if (m.type === 'STATE_UPDATE') renderState(m.state);
                    } catch(x){}
                };
                ws.onerror = () => castDebugLogger.error('STUDIO', '❌ WS Connection Failed.');
            }

            // LOAD Interceptor
            playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, (req) => {
                castDebugLogger.info('STUDIO', '📥 LOAD Intercepted.');
                if (req.media && req.media.contentId) {
                    try {
                        const u = new URL(req.media.contentId);
                        const wsUrl = u.searchParams.get('ws');
                        if (wsUrl) connectWS("ws://" + wsUrl);
                    } catch(x) {}
                }
                return null;
            });

            context.start({ disableIdleTimeout: true });
            castDebugLogger.info('STUDIO', '📡 Receiver v13.8.97 [Debug Mode] Started.');
        })();
    </script>
</body>
</html>
