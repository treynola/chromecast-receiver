<!DOCTYPE html>
<html>

<head>
    <title>MXS-004 Studio Cast v8.0</title>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        cast-media-player {
            width: 100%;
            height: 100%;
            --splash-image: url('');
            --playback-logo-image: url('');
        }

        #log-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 80%;
            max-height: 200px;
            overflow-y: hidden;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
            z-index: 1000;
        }

        #waiting {
            position: absolute;
            color: #b38600;
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>

<body>
    <cast-media-player></cast-media-player>
    <div id="waiting">
        <h1>MXS-004 STUDIO</h1>
        <p>Waiting for Stream...</p>
        <p style="font-size:14px; opacity:0.6;">v8.0 H.264/AAC Engine</p>
    </div>
    <div id="log-overlay"></div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        const waitingEl = document.getElementById('waiting');
        const logEl = document.getElementById('log-overlay');

        function log(msg) {
            console.log(msg);
            logEl.innerHTML = `<div>${new Date().toLocaleTimeString()} ${msg}</div>` + logEl.innerHTML;
        }

        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
            () => {
                log('✅ Player Load Complete');
                waitingEl.style.display = 'none';
            }
        );

        let lastStreamUrl = null;
        let retryCount = 0;

        playerManager.addEventListener(
            cast.framework.events.EventType.ERROR,
            (event) => {
                log('❌ Player Error: ' + JSON.stringify(event));
                // Auto-retry on load failure (common during startup race)
                if (lastStreamUrl && retryCount < 10) {
                    retryCount++;
                    log(`🔄 Retrying stream load (${retryCount}/10) in 2s...`);
                    setTimeout(() => loadStream(lastStreamUrl), 2000);
                }
            }
        );

        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;
        options.customNamespaces = {
            'urn:x-cast:com.nowmultimedia.mxs004': cast.framework.system.MessageType.JSON
        };

        function loadStream(url) {
            lastStreamUrl = url;
            const loadRequestData = new cast.framework.messages.LoadRequestData();
            loadRequestData.media = new cast.framework.messages.MediaInformation();
            loadRequestData.media.contentId = url;
            loadRequestData.media.streamType = cast.framework.messages.StreamType.LIVE;
            loadRequestData.media.contentType = 'application/x-mpegurl'; // HLS constant
            loadRequestData.media.metadata = new cast.framework.messages.GenericMediaMetadata();
            loadRequestData.media.metadata.title = 'MXS-004 Live Session';

            playerManager.load(loadRequestData)
                .then(() => log('▶️ Load Request Sent'))
                .catch(err => {
                    log('⚠️ Load Failed: ' + err);
                    // Retry is handled by ERROR event listener, but catching here prevents unhandled promise errors
                });
        }

        context.addCustomMessageListener('urn:x-cast:com.nowmultimedia.mxs004', (event) => {
            const data = (typeof event.data === 'string') ? JSON.parse(event.data) : event.data;
            log('📩 Msg: ' + JSON.stringify(data));

            if (data.type === 'start_stream' && data.stream_url) {
                log('🎬 Loading Stream: ' + data.stream_url);
                retryCount = 0; // Reset retries on fresh start
                loadStream(data.stream_url);
            }
        });

        context.start(options);
        log('🚀 Receiver v8.0 Ready (CAF)');
    </script>
</body>

</html>
