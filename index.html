<!DOCTYPE html>
<html>

<head>
    <title>MXS-004 PRO MONITOR V9.3</title>
    <meta name="viewport" content="width=1920, initial-scale=1">
    <meta charset="UTF-8">
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #FAD78E;
            --bg-dark: #121212;
            --bg-track: #1e1e1e;
            --text: #f0f0f0;
        }

        body {
            background: #000;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
            border: 10px solid #555;
            /* Neutral before connect */
            transition: border-color 0.5s ease;
        }

        #mirror-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            z-index: 100;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
        }

        #header {
            height: 90px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 2px solid var(--gold);
        }

        #header h1 {
            color: var(--gold);
            font-size: 36px;
        }

        #version-tag {
            background: #00ff00;
            color: #000;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 4px;
            font-size: 20px;
        }

        #tracks-container {
            flex: 1;
            display: flex;
            padding: 30px;
            gap: 20px;
            background: #0a0a0a;
        }

        .track {
            flex: 1;
            background: var(--bg-track);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #333;
        }

        .track-header {
            text-align: center;
            color: var(--gold);
            font-weight: 800;
            font-size: 20px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .meter-container {
            height: 400px;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: #111;
            border-radius: 8px;
        }

        .meter-bar {
            width: 30px;
            background: #222;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .meter-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, #00ff00 0%, #ffff00 70%, #ff0000 100%);
            transition: height 0.05s linear;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            background: #151515;
            border-radius: 8px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            color: #888;
        }

        .control-row span.val {
            color: var(--gold);
        }

        .status-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #333;
        }

        .status-dot.active {
            background: #00ff00;
            box-shadow: 0 0 15px #00ff00;
        }

        .status-dot.armed {
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }

        .status-dot.playing {
            background: #0088ff;
            box-shadow: 0 0 15px #0088ff;
        }

        #footer {
            height: 80px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }

        #transport {
            font-family: monospace;
            font-size: 28px;
            color: var(--gold);
        }

        #cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 50px;
            height: 50px;
            z-index: 10000;
            display: none;
            pointer-events: none;
        }

        #cursor-arrow {
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-bottom: 36px solid #fff;
            filter: drop-shadow(0 0 10px var(--gold));
            transform: rotate(-30deg);
        }

        #cursor-label {
            position: absolute;
            top: 40px;
            left: 15px;
            background: var(--gold);
            color: #000;
            padding: 4px 10px;
            font-weight: bold;
            border-radius: 4px;
            font-size: 14px;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--gold);
            text-align: center;
            padding: 20px;
        }

        #boot-status {
            font-size: 24px;
            color: #888;
            margin-top: 20px;
            font-family: monospace;
        }

        #start-button {
            margin-top: 40px;
            padding: 20px 60px;
            background: #ff0000;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div>MXS-004 V9.3 BOOTING...</div>
        <div id="boot-status">Wating for Signal...</div>
        <button id="start-button">START AUDIO ENGINE</button>
    </div>

    <div id="mirror-ui" style="display:none;">
        <div id="header">
            <h1 id="title-tag">MXS-004 PRO V9.3</h1>
            <div id="version-tag">STABLE MIRROR</div>
        </div>
        <div id="tracks-container"></div>
        <div id="footer">
            <div id="status" style="color:#0f0; font-size:24px;">CONNECTED</div>
            <div id="transport">00:00:00</div>
            <div id="audio-indicator"
                style="width:24px; height:24px; border-radius:50%; background:#222; border: 2px solid #444;"></div>
        </div>
    </div>

    <div id="cursor">
        <div id="cursor-arrow"></div>
        <div id="cursor-label">REMOTE</div>
    </div>

    <script>
        const FORCE_SAMPLE_RATE = 48000;
        let audioCtx, ws, nextPlayTime = 0, tracksInited = false;

        function logStatus(msg, color) {
            const el = document.getElementById('boot-status');
            el.textContent = `> ${msg}`;
            if (color) el.style.color = color;
            console.log(`[BOOT] ${msg}`);
        }

        function initMirrorUI() {
            if (tracksInited) return;
            const container = document.getElementById('tracks-container');
            container.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const t = document.createElement('div'); t.className = 'track';
                t.innerHTML = `
                    <div class="track-header">TRACK ${i + 1}</div>
                    <div class="meter-container">
                        <div class="meter-bar"><div id="m-l-${i}" class="meter-fill" style="height:0%"></div></div>
                        <div class="meter-bar"><div id="m-r-${i}" class="meter-fill" style="height:0%"></div></div>
                    </div>
                    <div class="controls">
                        <div class="control-row"><span>VOL</span><span id="v-${i}" class="val">-inf</span></div>
                        <div class="control-row"><span>ARM</span><div id="a-${i}" class="status-dot"></div></div>
                        <div class="control-row"><span>PL/SO</span><div id="p-${i}" class="status-dot"></div></div>
                    </div>
                `;
                container.appendChild(t);
            }
            tracksInited = true;
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('mirror-ui').style.display = 'flex';
            document.body.style.borderColor = '#00ff00'; // Success Border V9.3
        }

        async function initAudio() {
            if (audioCtx) return;
            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AC({ sampleRate: FORCE_SAMPLE_RATE });
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                logStatus("Audio Context Active", "#0f0");
                document.getElementById('audio-indicator').style.background = '#0f0';
            } catch (e) {
                logStatus("Audio Init Failed: " + e.message, "#f00");
            }
        }

        function handleAudio(buf) {
            if (!audioCtx) {
                document.getElementById('start-button').style.display = 'block';
                return;
            }
            document.getElementById('audio-indicator').style.background = '#0f0';

            const f32 = new Float32Array(buf);
            const samples = f32.length / 2;
            const audioBuf = audioCtx.createBuffer(2, samples, FORCE_SAMPLE_RATE);
            const l = audioBuf.getChannelData(0), r = audioBuf.getChannelData(1);

            for (let i = 0; i < samples; i++) {
                l[i] = f32[i * 2];
                r[i] = f32[i * 2 + 1];
            }

            const now = audioCtx.currentTime;
            if (nextPlayTime < now || (nextPlayTime - now) > 1.2) {
                nextPlayTime = now + 0.4;
            }

            const src = audioCtx.createBufferSource();
            src.buffer = audioBuf;
            src.connect(audioCtx.destination);
            src.start(nextPlayTime);
            nextPlayTime += audioBuf.duration;
        }

        function applyState(state) {
            initMirrorUI();
            if (state.tracks) {
                state.tracks.forEach(t => {
                    const vol = document.getElementById(`v-${t.id}`); if (vol) vol.textContent = t.volume.toFixed(1);
                    const arm = document.getElementById(`a-${t.id}`); if (arm) arm.className = 'status-dot' + (t.armed ? ' armed' : '');
                    const play = document.getElementById(`p-${t.id}`); if (play) play.className = 'status-dot' + (t.isPlaying ? ' playing' : '');
                    if (t.meters) {
                        const ml = document.getElementById(`m-l-${t.id}`); if (ml) ml.style.height = (Math.max(0, Math.min(1, t.meters.l)) * 100) + '%';
                        const mr = document.getElementById(`m-r-${t.id}`); if (mr) mr.style.height = (Math.max(0, Math.min(1, t.meters.r)) * 100) + '%';
                    }
                });
            }
            if (state.transport) document.getElementById('transport').textContent = state.transport.position || "00:00:00";
        }

        function connectWS(url) {
            if (url.startsWith('http')) {
                logStatus("Redirecting to: " + url, "#ff0");
                setTimeout(() => window.location.href = url, 500);
                return;
            }

            logStatus("Connecting: " + url, "#88f");
            document.body.style.borderColor = "#0000ff"; // Connecting Border

            ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                logStatus("WebSocket Connected", "#0f0");
                document.getElementById('status').textContent = 'V9.3 LIVE';
                initAudio();
            };

            ws.onerror = (e) => {
                logStatus("WS Error (Check IP/Port)", "#f00");
            };

            ws.onmessage = (e) => {
                const view = new Uint8Array(e.data), type = view[0], payload = e.data.slice(1);
                if (type === 2) handleAudio(payload);
                else if (type === 3) {
                    try {
                        const json = JSON.parse(new TextDecoder().decode(payload));
                        if (json.type === 'state') applyState(json);
                        else if (json.type === 'cursor') {
                            const c = document.getElementById('cursor');
                            c.style.display = 'block';
                            c.style.transform = `translate(${json.x * 1920}px, ${json.y * 1080}px)`;
                        }
                    } catch (err) { }
                }
            };
            ws.onclose = () => {
                logStatus("Connection Closed. Retrying...", "#f00");
                setTimeout(() => connectWS(url), 2000);
            };
        }

        document.getElementById('start-button').onclick = () => {
            initAudio();
            document.getElementById('start-button').style.display = 'none';
        };

        window.onload = () => {
            logStatus("V9.3 Script Loaded", "#888");

            if (typeof cast !== 'undefined' && cast.framework) {
                logStatus("CAF Framework Detected", "#888");
                const ctx = cast.framework.CastReceiverContext.getInstance();
                ctx.addCustomMessageListener('urn:x-cast:com.nowmultimedia.mxs004', e => {
                    logStatus("Custom Message Received", "#0f0");
                    if (e.data.wsUrl) connectWS(e.data.wsUrl);
                });
                ctx.start({ disableIdleTimeout: true });
                logStatus("Receiver Started - Waiting for Sender...", "#ff0");
            } else {
                logStatus("Direct Mode (No CAF)", "#888");
                const wsUrl = new URLSearchParams(location.search).get('ws');
                if (wsUrl) connectWS(wsUrl);
                else logStatus("Error: No 'ws' parameter", "#f00");
            }
        };
    </script>
</body>

</html>
