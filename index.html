<!DOCTYPE html>
<html>

<head>
    <title>MXS-004 Receiver v15 (Fixed Layout)</title>
    <meta name="viewport" content="width=1920, initial-scale=1">
    <meta charset="UTF-8">
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #FAD78E;
            --green: #008000;
            --red: #FF0000;
        }

        body {
            background: #000;
            color: #f0f0f0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            /* Flex center properly */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app-container {
            width: 1920px;
            height: 1080px;
            position: relative;
            /* Changed from absolute */
            background: #111;
        }

        #video-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* DIAGNOSTIC OVERLAYS */
        #audio-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: #333;
            border-radius: 50%;
            border: 2px solid #555;
            transition: background 0.1s;
        }

        #audio-indicator.active {
            background: #00ff00;
            box-shadow: 0 0 20px #00ff00;
        }

        #audio-indicator.suspended {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        #status-bar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 24px;
            color: var(--gold);
            border: 2px solid var(--gold);
            text-align: center;
            min-width: 600px;
        }

        #debug-log {
            position: absolute;
            top: 100px;
            right: 20px;
            width: 500px;
            height: 800px;
            background: rgba(0, 0, 0, 0.7);
            overflow: hidden;
            font-size: 14px;
            pointer-events: none;
            color: #eee;
        }

        .entry {
            border-bottom: 1px solid #333;
            padding: 2px;
        }

        .entry.err {
            color: #f55;
            font-weight: bold;
        }

        .entry.warn {
            color: #fc0;
        }
    </style>
</head>

<body>
    <div id="app-container">
        <canvas id="video-canvas" width="1920" height="1080"></canvas>
        <div id="audio-indicator"></div>
        <div id="status-bar">Initialize...</div>
        <div id="debug-log"></div>
    </div>

    <script>
        // === CONFIG ===
        const SAMPLE_RATE = 48000;
        const BUFFER_DELAY_MS = 300; // Increased to 300ms for safety

        // === LOGGING ===
        const logEl = document.getElementById('debug-log');
        function log(msg, type = '') {
            const div = document.createElement('div');
            div.className = 'entry ' + type;
            div.textContent = `[${new Date().toISOString().substr(14, 9)}] ${msg}`;
            logEl.prepend(div);
            if (logEl.children.length > 50) logEl.lastChild.remove();
            console.log(msg);
        }

        // === STATE ===
        let audioCtx;
        let ws;
        let isAudioStarted = false;
        let nextPlayTime = 0;
        let chunksProcessed = 0;

        // === UI UPDATES ===
        function updateUI(status) {
            if (status) document.getElementById('status-bar').textContent = status;

            const ind = document.getElementById('audio-indicator');
            if (audioCtx) {
                if (audioCtx.state === 'running') {
                    // Flash green on activity, but keep green base
                    ind.className = 'active';
                } else {
                    ind.className = 'suspended';
                }
            }
        }

        // === AUDIO ENGINE ===
        async function initAudio() {
            if (audioCtx) return;

            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AC({ latencyHint: 'playback', sampleRate: SAMPLE_RATE });

                log(`AudioCtx Init: ${audioCtx.state}`);

                // Silent Unlock
                const buf = audioCtx.createBuffer(1, 1, SAMPLE_RATE);
                const src = audioCtx.createBufferSource();
                src.buffer = buf;
                src.connect(audioCtx.destination);
                src.start(0);

                if (audioCtx.state === 'suspended') {
                    log('Resuming...');
                    await audioCtx.resume();
                }

                log(`AudioCtx Final: ${audioCtx.state}`);
                updateUI(`Audio: ${audioCtx.state.toUpperCase()}`);

                // Play Chime
                playChime();

            } catch (e) {
                log(`InitAudio Error: ${e.message}`, 'err');
            }
        }

        function playChime() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g);
            g.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
            log('Played Chime');
        }

        async function handleAudio(buffer) {
            if (!audioCtx) await initAudio();
            if (audioCtx.state !== 'running') audioCtx.resume();

            chunksProcessed++;

            // Visual Pulse every 10 chunks to confirm data flow
            if (chunksProcessed % 10 === 0) {
                const ind = document.getElementById('audio-indicator');
                ind.style.opacity = ind.style.opacity === '0.5' ? '1' : '0.5';
            }

            try {
                const f32 = new Float32Array(buffer);
                // Stereo De-interleave
                const samples = f32.length / 2;
                const audioBuf = audioCtx.createBuffer(2, samples, SAMPLE_RATE);
                const l = audioBuf.getChannelData(0);
                const r = audioBuf.getChannelData(1);
                for (let i = 0; i < samples; i++) {
                    l[i] = f32[i * 2];
                    r[i] = f32[i * 2 + 1];
                }

                const now = audioCtx.currentTime;
                // Simple sync (Reset if drift > 500ms)
                if (!isAudioStarted || nextPlayTime < now || (nextPlayTime - now) > 0.5) {
                    nextPlayTime = now + (BUFFER_DELAY_MS / 1000);
                    isAudioStarted = true;
                    log(`Sync Reset: Play @ +${BUFFER_DELAY_MS}ms`);
                }

                const src = audioCtx.createBufferSource();
                src.buffer = audioBuf;
                src.connect(audioCtx.destination);
                src.start(nextPlayTime);
                nextPlayTime += audioBuf.duration;

            } catch (e) {
                log(`Decode: ${e.message}`, 'err');
            }
        }

        // === VIDEO ===
        const ctx = document.getElementById('video-canvas').getContext('2d');
        const img = new Image();
        function handleVideo(buf) {
            const url = URL.createObjectURL(new Blob([buf]));
            img.onload = () => {
                ctx.drawImage(img, 0, 0, 1920, 1080);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        // === CAST & WS ===
        window.onload = () => {
            // Center Check
            log('V15 Loaded. Checking Layout...');

            if (typeof cast !== 'undefined' && cast.framework) {
                const context = cast.framework.CastReceiverContext.getInstance();
                const opts = new cast.framework.CastReceiverOptions();
                opts.disableIdleTimeout = true;

                context.addEventListener(cast.framework.system.EventType.READY, async () => {
                    log('CAST READY - UNLOCKING AUDIO');
                    await initAudio();
                });

                context.addCustomMessageListener('urn:x-cast:com.nowmultimedia.mxs004', e => {
                    if (e.data.wsUrl) connectWS(e.data.wsUrl);
                });

                context.start(opts);
            } else {
                // Manual test
                initAudio();
                const wsUrl = new URLSearchParams(location.search).get('ws') || `ws://${location.hostname}:8090`;
                connectWS(wsUrl);
            }
        };

        function connectWS(url) {
            log(`WS: ${url}`);
            if (ws) ws.close();
            ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';
            ws.onopen = () => updateUI('WS Connected');
            ws.onmessage = async (e) => {
                if (!(e.data instanceof ArrayBuffer)) return;
                const view = new Uint8Array(e.data);
                const type = view[0];
                const payload = e.data.slice(1);
                if (type === 1) handleVideo(payload);
                if (type === 2) handleAudio(payload);
            };
        }
    </script>
</body>

</html>
