<!DOCTYPE html>
<html>

<head>
    <title>NOWMULTIMEDIA MXS-004 Receiver v6.0</title>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #video-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #stream-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            background: #111;
        }

        .overlay {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 12px;
            border: 2px solid #b38600;
            text-align: center;
            z-index: 100;
        }

        .status {
            font-size: 24px;
            font-weight: bold;
            color: #b38600;
            margin-bottom: 10px;
        }

        .sub-status {
            font-size: 16px;
            color: #aaa;
        }

        #error-overlay {
            display: none;
            border-color: #f44336;
        }

        #error-overlay .status {
            color: #f44336;
        }

        .version {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div id="video-container">
        <img id="stream-img" alt="Live Stream">

        <div id="status-overlay" class="overlay">
            <div class="status">NOWMULTIMEDIA MXS-004</div>
            <div id="status-text" class="sub-status">INITIALIZING...</div>
        </div>

        <div id="error-overlay" class="overlay">
            <div class="status">STREAM ERROR</div>
            <div id="error-text" class="sub-status">CONNECTION FAILED</div>
            <div style="margin-top: 15px; font-size: 12px;">Ensure app is running and on same network.</div>
        </div>
    </div>

    <div class="version">Receiver v6.0 (PNA Hardened)</div>

    <script type="text/javascript"
        src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script>
        const statusEl = document.getElementById('status-text');
        const statusOverlay = document.getElementById('status-overlay');
        const errorOverlay = document.getElementById('error-overlay');
        const streamImg = document.getElementById('stream-img');

        let isCasting = false;
        let activeStreamUrl = '';

        function updateStatus(text, showOverlay = true) {
            console.log("Status Update:", text);
            statusEl.innerText = text;
            statusOverlay.style.display = showOverlay ? 'block' : 'none';
        }

        function showError(text) {
            console.error("Error:", text);
            document.getElementById('error-text').innerText = text;
            errorOverlay.style.display = 'block';
            statusOverlay.style.display = 'none';
        }

        // Probing Logic
        async function probeForStream() {
            updateStatus("DETECTING STUDIO SERVER...");

            // Hardcoded common developer IPs for faster discovery
            const candidates = [
                'http://localhost:8089',
                'http://127.0.0.1:8089',
                'http://192.168.1.2:8089',
                'http://192.168.1.3:8089',
                'http://192.168.1.4:8089',
                'http://192.168.1.5:8089',
                'http://192.168.1.6:8089',
                'http://192.168.1.7:8089',
                'http://192.168.1.8:8089',
                'http://192.168.1.9:8089',
                'http://192.168.1.10:8089',
                'http://192.168.1.20:8089',
                'http://192.168.1.100:8089',
                'http://10.0.0.1:8089',
                'http://10.0.0.2:8089',
                'http://10.0.0.5:8089',
                'http://10.0.0.10:8089'
            ];

            for (const base of candidates) {
                const url = base + '/screen.jpg?probe=' + Date.now();
                console.log("Probing:", url);

                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 1500);

                    const response = await fetch(url, {
                        mode: 'cors',
                        signal: controller.signal,
                        headers: {
                            'Access-Control-Request-Private-Network': 'true'
                        }
                    });

                    clearTimeout(timeout);

                    if (response.ok) {
                        console.log("✅ STUDIO FOUND AT:", base);
                        startLiveStream(base + '/stream.mjpeg');
                        return;
                    }
                } catch (e) {
                    console.warn("Probe failed for", base, e);
                }
            }

            updateStatus("SEARCHING... (PNA PROBE)", true);
            setTimeout(probeForStream, 5000);
        }

        function startLiveStream(url) {
            console.log("🎬 Starting Live Stream:", url);
            activeStreamUrl = url;
            isCasting = true;

            updateStatus("CONNECTING TO STREAM...", true);

            streamImg.src = url;
            streamImg.style.display = 'block';
            statusOverlay.style.display = 'none';
            errorOverlay.style.display = 'none';

            streamImg.onload = () => {
                console.log("✅ Stream Image Loaded");
            };

            streamImg.onerror = () => {
                console.error("❌ Stream Connection Error");
                showError("STREAM CONNECTION LOST");
                setTimeout(probeForStream, 5000);
            };
        }

        // Cast SDK Initialization
        window.onload = function () {
            try {
                const context = cast.framework.CastReceiverContext.getInstance();
                const playerManager = context.getPlayerManager();

                context.addCustomMessageListener('urn:x-cast:com.nowmultimedia.mxs004', (event) => {
                    console.log("Message received:", event);
                });

                playerManager.setMessageInterceptor(
                    cast.framework.messages.MessageType.LOAD,
                    loadRequestData => {
                        console.log("LOAD Interceptor:", loadRequestData);
                        if (loadRequestData.media && loadRequestData.media.contentId) {
                            const url = loadRequestData.media.contentId;
                            if (url.includes('stream.mjpeg')) {
                                startLiveStream(url);
                            }
                        }
                        return loadRequestData;
                    }
                );

                const options = new cast.framework.CastReceiverOptions();
                options.maxInactivity = 3600; // 1 hour

                context.start(options);
                console.log("✅ Cast Receiver Context Started");
            } catch (e) {
                console.warn("Cast SDK init failed (standalone mode):", e);
            }

            // Start Probing
            probeForStream();
        };
    </script>
</body>

</html>
