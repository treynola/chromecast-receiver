<!DOCTYPE html>
<html>

<head>
    <title>NOWMULTIMEDIA MXS-004 Receiver v5.9</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #stream-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0;
            transition: opacity 1s;
        }

        #video-stream {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        #splash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            display: flex;
            display: none;
            background: #111;
        }

        .overlay {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 12px;
            border: 2px solid #b38600;
            text-align: center;
            z-index: 100;
        }

        .status {
            font-size: 24px;
            font-weight: bold;
            color: #b38600;
            margin-bottom: 10px;
        }

        .sub-status {
            font-size: 16px;
            color: #aaa;
        }

        #error-overlay {
            display: none;
            border-color: #f44336;
        }

        #error-overlay .status {
            color: #f44336;
        }

        .version {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div id="video-container">
        <img id="stream-img" alt="Live Stream">

        <div id="status-overlay" class="overlay">
            <div class="status">NOWMULTIMEDIA MXS-004</div>
            <div id="status-text" class="sub-status">INITIALIZING...</div>
        </div>

        <div id="error-overlay" class="overlay">
            <div class="status">STREAM ERROR</div>
            <div id="error-text" class="sub-status">CONNECTION FAILED</div>
            <div style="margin-top: 15px; font-size: 12px;">Ensure app is running and on same network.</div>
        </div>
    </div>

    <div class="version">Receiver v6.0 (PNA Hardened)</div>

    <script type="text/javascript"
        src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script>

            console.log("✅ PeerConnection ready");
            return peerConnection;
        }

        async function handleOffer(offer) {
            console.log("📥 Received WebRTC offer");

            if (!peerConnection) {
                setupPeerConnection();
            }

            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                console.log("✅ Remote description set");

                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                console.log("✅ Created answer, sending back...");

                // Send answer back to sender
                if (context && context.sendCustomMessage) {
                    context.sendCustomMessage('urn:x-cast:com.nowmultimedia.webrtc', undefined, {
                        type: 'answer',
                        answer: peerConnection.localDescription
                    });
                }

                statusText.textContent = '🔗 CONNECTING...';
            } catch (e) {
                console.error("❌ Error handling offer:", e);
            }
        }

        async function handleIceCandidate(candidate) {
            if (peerConnection && candidate) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                    console.log("🧊 Added ICE candidate");
                } catch (e) {
                    console.error("❌ Error adding ICE candidate:", e);
                }
            }
        }

        // ==========================================
        // CUSTOM MESSAGE LISTENER (WebRTC Signaling)
        // ==========================================
        if (context) {
            context.addCustomMessageListener('urn:x-cast:com.nowmultimedia.webrtc', (event) => {
                console.log("📩 WebRTC message received:", event.data?.type || 'unknown');

                const data = event.data;

                if (data.type === 'offer') {
                    handleOffer(data.offer);
                } else if (data.type === 'ice-candidate') {
                    handleIceCandidate(data.candidate);
                } else if (data.type === 'ping') {
                    console.log("🏓 Ping received, connection test OK");
                    statusText.textContent = '📡 SENDER CONNECTED';
                }
            });
        }

        // ==========================================
        // FALLBACK: Frame Polling for Legacy Mode
        // ==========================================
        let isPolling = false;
        let frameInterval = null;
        let frameNumber = 0;
        const imgEl = document.createElement('img');
        imgEl.style.cssText = 'width:100%;height:100%;object-fit:contain;';

        function startFramePolling(baseUrl) {
            if (isPolling) return;
            isPolling = true;
            console.log("📺 Starting Frame Polling (legacy mode):", baseUrl);

            if (frameInterval) clearInterval(frameInterval);

            // Replace video with img for frame polling
            container.innerHTML = '';
            container.appendChild(imgEl);

            let targetUrl = baseUrl.split('?')[0].replace('/stream.mjpeg', '/screen.jpg');

            statusText.textContent = 'STUDIO CONNECTED (Legacy)';
            splash.classList.add('hidden');
            container.style.opacity = '1';

            frameInterval = setInterval(() => {
                frameNumber++;
                imgEl.src = `${targetUrl}?frame=${frameNumber}&t=${Date.now()}`;
            }, 100);

            setTimeout(() => { statusText.parentElement.classList.add('hidden'); }, 5000);
        }

        // ==========================================
        // LOAD Message Handler (Legacy fallback)
        // ==========================================
        if (playerManager && typeof cast !== 'undefined') {
            playerManager.setMessageInterceptor(
                cast.framework.messages.MessageType.LOAD,
                loadData => {
                    console.log('📼 Intercepted LOAD request');
                    if (loadData.media && loadData.media.contentId) {
                        console.log('📼 LOAD ContentID:', loadData.media.contentId);
                        // Stop any existing polling and start new one
                        if (frameInterval) clearInterval(frameInterval);
                        startFramePolling(loadData.media.contentId);
                        statusText.textContent = '📡 STREAM LOADED';
                        return null;
                    }
                    return loadData;
                }
            );
        }

        // ==========================================
        // AUTO-PROBE: Find stream server since LOAD may not be sent
        // ==========================================
        function probeForStream() {
            console.log("🔍 Starting network probe for stream server...");
            statusText.textContent = '🔍 SEARCHING FOR STUDIO...';

            const ips = [
                '192.168.1.8', '192.168.1.7', '192.168.1.6', '192.168.1.1',
                '192.168.0.1', '192.168.0.100', '192.168.1.100',
                '10.0.0.1', '10.0.0.2', '10.0.1.1'
            ];
            const ports = [8089, 8088, 8090, 52524, 52525, 52526];

            let found = false;
            let pendingProbes = 0;

            // Use Image element for probing - bypasses CORS and detects real errors
            for (const ip of ips) {
                for (const port of ports) {
                    if (found) return;
                    pendingProbes++;

                    const probeImg = new Image();
                    const url = `http://${ip}:${port}/screen.jpg?probe=1&t=${Date.now()}`;

                    probeImg.onload = () => {
                        if (found) return;
                        found = true;
                        console.log("✅ PROBE SUCCESS: " + url);
                        startFramePolling(`http://${ip}:${port}/screen.jpg`);
                    };
                    probeImg.onerror = () => {
                        console.log("❌ PROBE FAILED: " + url);
                        pendingProbes--;
                        if (pendingProbes <= 0 && !found) {
                            console.log("❌ All probes finished, none succeeded.");
                            statusText.textContent = 'STUDIO NOT FOUND (RETRYING...)';
                        }
                    };

                    probeImg.src = url;
                    console.log(`Probing: ${url}`);

                    // Timeout for each probe
                    setTimeout(() => {
                        if (!found) {
                            probeImg.src = ''; // Cancel loading
                            pendingProbes--;
                            if (pendingProbes <= 0 && !found) {
                                statusText.textContent = '❌ STUDIO NOT FOUND';
                            }
                        }
                    }, 3000);
                }
            }
        }

        // ==========================================
        // START RECEIVER
        // ==========================================
        if (context) {
            console.log('🎬 Starting Cast Receiver Context...');
            context.start();
            console.log('✅ Cast Receiver started');
        } else {
            console.log('🎬 Running in standalone mode (no Cast SDK)');
        }

        // Start probing after 2 seconds (give LOAD message a chance first)
        setTimeout(() => {
            if (!frameInterval) {
                console.log('⏰ Auto-starting probe...');
                probeForStream();
            }
        }, 2000);
    </script>
</body>

</html>
