<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.8.96 [DIAGNOSTIC MASTER]</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        :root { --gold: #FAD78E; --green: #008000; --red: #FF0000; --dark-gray: #2c2c2c; }
        body { background: #ff4500 !important; color: #fff; font-family: 'Courier New', monospace; margin:0; overflow:hidden; }
        #debug-log { position: fixed; bottom: 5px; left: 5px; font-size: 9px; color: #0f0; background: rgba(0,0,0,0.8); padding: 5px; z-index: 1000001; max-height: 150px; overflow-y: auto; pointer-events: none; width: 350px; }
        .container { width: 1432px; height: 802px; position: absolute; top:50%; left:50%; transform:translate(-50%, -50%); background: var(--dark-gray); border: 1px solid var(--green); border-radius: 12px; padding: 6px; box-sizing: border-box; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.5s; }
        .main-content { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; flex: 1; }
        .track, .master-column { border: 1px solid var(--green); border-radius: 8px; padding: 6px; background: var(--dark-gray); display: flex; flex-direction: column; }
        .track-header { color: var(--gold); font-weight: bold; font-size: 0.8em; border-bottom: 1px solid #444; }
        .track-time-display { font-size: 1.5em; color: var(--green); text-align: center; }
    </style>
</head>
<body>
    <div id="debug-log">🚀 Diagnostic v13.8.96 Starting...</div>
    <div class="container" id="studio-root">
        <div class="header" style="height:32px; display:flex; justify-content:space-between; align-items:center; background:#111; padding:0 10px; border-radius:8px; margin-bottom:6px;">
            <h1 style="font-size:1.2em; margin:0; color: var(--gold);">NOWMULTIMEDIA MXS-004</h1>
            <div id="connection-status" style="font-size: 0.7em;">ORANGE = WAITING</div>
        </div>
        <div class="main-content" id="main-grid"></div>
    </div>
    <script>
        (function() {
            var audioCtx = null; var ws = null;
            var debugEl = document.getElementById('debug-log');
            var studioRoot = document.getElementById('studio-root');
            function log(m) { console.log(m); if (debugEl) { debugEl.innerHTML += '<br>' + m; debugEl.scrollTop = debugEl.scrollHeight; } }
            
            function buildGUI() {
                var grid = document.getElementById('main-grid'); grid.innerHTML = '';
                var master = document.createElement('div'); master.className = 'master-column';
                master.innerHTML = '<div class="track-header">MASTER</div><div id="recording-time" class="track-time-display">00:00:00</div>';
                grid.appendChild(master);
                for (var i = 0; i < 4; i++) {
                    var t = document.createElement('div'); t.className = 'track';
                    t.innerHTML = '<div class="track-header">TRACK '+(i+1)+'</div><div class="track-time-display">00:00:00</div>';
                    grid.appendChild(t);
                }
            }

            function renderState(state) {
                if (!state) return;
                if (studioRoot.style.opacity !== '1') {
                    studioRoot.style.opacity = '1'; document.body.style.background = '#000';
                    log("🎬 SIGNAL ACQUIRED! Studio Unlocked.");
                }
                if (state.transport) document.getElementById('recording-time').textContent = state.transport.position;
            }

            function connect(url) {
                log("🔌 WS Attempt: " + url);
                ws = new WebSocket(url);
                ws.onopen = function() { log("✅ WS Handshake Success"); };
                ws.onmessage = function(e) {
                    try { var m = JSON.parse(e.data); if (m.type === 'STATE_UPDATE') renderState(m.state); } catch(x){}
                };
            }

            window.onload = function() {
                buildGUI();
                try {
                    var ctx = cast.framework.CastReceiverContext.getInstance();
                    ctx.addCustomMessageListener('urn:x-cast:com.nowmultimedia.webrtc', function(e) {
                        log("📩 Cast Msg: " + JSON.stringify(e.data).substring(0, 50));
                        var d = e.data;
                        if (typeof d === 'string') d = JSON.parse(d);
                        if (d.payload) {
                            if (typeof d.payload === 'string') d = JSON.parse(d.payload);
                            else d = d.payload;
                        }
                        if (d.type === 'STATE_UPDATE') renderState(d.state);
                    });
                    
                    ctx.getPlayerManager().setMessageInterceptor(cast.framework.messages.MessageType.LOAD, function(req) {
                        log("📥 LOAD intercepted");
                        if (req.media && req.media.contentId) {
                            var u = new URL(req.media.contentId);
                            var wsUrl = u.searchParams.get('ws');
                            if (wsUrl) connect("ws://" + wsUrl);
                        }
                        return null;
                    });
                    
                    ctx.start({ disableIdleTimeout: true });
                    log("📡 Diagnostic Suite v13.8.96 Active.");
                } catch(x) { log("❌ SDK Error: " + x.message); }
            };
        })();
    </script>
</body>
</html>
