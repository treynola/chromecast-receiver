<!DOCTYPE html>
<html>

<head>
    <title>MXS-004 Receiver v11 (PCM Audio + Buffer)</title>
    <meta name="viewport" content="width=1920, initial-scale=1">
    <meta charset="UTF-8">
    <!-- Cast Receiver SDK for Chromecast -->
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #FAD78E;
            --green: #008000;
            --red: #FF0000;
        }

        body {
            background: #000;
            color: #f0f0f0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #app-container {
            width: 1920px;
            height: 1080px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center center;
        }

        #video-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #status-bar {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
            color: var(--gold);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .overlay-title {
            font-size: 48px;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .overlay-msg {
            font-size: 24px;
            color: #aaa;
            margin-bottom: 40px;
        }

        .start-btn {
            padding: 20px 40px;
            font-size: 32px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #remote-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            background: var(--gold);
            border-radius: 50%;
            margin-left: -10px;
            margin-top: -10px;
            display: none;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
    </style>
</head>

<body>
    <div id="app-container">
        <canvas id="video-canvas" width="1920" height="1080"></canvas>
    </div>

    <div id="remote-cursor"></div>

    <div id="status-bar">
        FPS: <span id="fps">0</span> |
        Latency: <span id="lat">0</span>ms |
        Audio: <span id="audio-status">OFF</span> |
        Buffer: <span id="buffer-status">0ms</span>
    </div>

    <div id="start-overlay" class="overlay">
        <div class="overlay-title">MXS-004 RECEIVER v11</div>
        <div class="overlay-msg">PCM Audio with Sync Buffer</div>
        <button class="start-btn" onclick="startReceiver()">START MONITORING</button>
    </div>

    <script>
        // === CONFIG ===
        const MSG_VIDEO = 0x01;
        const MSG_AUDIO = 0x02;
        const MSG_META = 0x03;
        const SAMPLE_RATE = 48000;
        const BUFFER_SIZE = 4096;  // samples per channel per chunk
        const BUFFER_DELAY_MS = 200;  // Buffer delay for sync

        // === STATE ===
        let ws = null;
        let canvas, ctx;
        let frameCount = 0;
        let lastFrameTime = performance.now();

        // === AUDIO STATE ===
        let audioCtx = null;
        let audioBufferQueue = [];
        let nextPlayTime = 0;
        let audioChunksReceived = 0;
        let audioChunksPlayed = 0;
        let isAudioStarted = false;

        // === INIT ===
        function initUI() {
            canvas = document.getElementById('video-canvas');
            ctx = canvas.getContext('2d');
            window.addEventListener('resize', scaleApp);
            scaleApp();
        }

        function scaleApp() {
            const container = document.getElementById('app-container');
            const scaleX = window.innerWidth / 1920;
            const scaleY = window.innerHeight / 1080;
            const scale = Math.min(scaleX, scaleY);
            container.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }

        async function initAudio() {
            if (audioCtx) return;

            audioCtx = new (window.AudioContext || window.webkitAudioContext)({
                sampleRate: SAMPLE_RATE,
                latencyHint: 'playback'
            });

            // Resume if suspended (Chromecast autoplay policy)
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            console.log('🔊 AudioContext started:', audioCtx.state, audioCtx.sampleRate + 'Hz');
            document.getElementById('audio-status').textContent = 'READY';
        }

        async function startReceiver(wsUrlOverride) {
            document.getElementById('start-overlay').style.display = 'none';

            await initAudio();

            const params = new URLSearchParams(window.location.search);
            const wsUrl = wsUrlOverride || params.get('ws') || `ws://${window.location.hostname}:8090`;

            connect(wsUrl);
        }

        // === HYBRID BOOTSTRAP ===
        window.addEventListener('load', () => {
            initUI();

            const params = new URLSearchParams(window.location.search);
            if (params.has('ws')) {
                console.log('🚀 Auto-starting (ws param found)');
                startReceiver();
                return;
            }

            if (typeof cast !== 'undefined' && cast.framework) {
                console.log('📺 Chromecast Mode');
                const NAMESPACE = 'urn:x-cast:com.nowmultimedia.mxs004';
                const context = cast.framework.CastReceiverContext.getInstance();

                context.addCustomMessageListener(NAMESPACE, (event) => {
                    console.log('📩 Cast message:', event.data);
                    if (event.data?.type === 'connect' && event.data.wsUrl) {
                        startReceiver(event.data.wsUrl);
                    }
                });

                const options = new cast.framework.CastReceiverOptions();
                options.disableIdleTimeout = true;
                context.start(options);
            }
        });

        // === WEBSOCKET ===
        function connect(url) {
            console.log('🔌 Connecting to:', url);
            ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                document.getElementById('audio-status').textContent = 'CONNECTED';
                console.log('✅ WebSocket connected');
            };

            let msgCounts = { video: 0, audio: 0, meta: 0 };

            ws.onmessage = async (e) => {
                const data = e.data;
                if (!(data instanceof ArrayBuffer)) return;

                const view = new Uint8Array(data);
                const type = view[0];
                const content = data.slice(1);

                switch (type) {
                    case MSG_VIDEO:
                        msgCounts.video++;
                        handleVideo(content);
                        break;
                    case MSG_AUDIO:
                        msgCounts.audio++;
                        handleAudio(content);
                        break;
                    case MSG_META:
                        msgCounts.meta++;
                        handleMeta(content);
                        break;
                }

                if ((msgCounts.video + msgCounts.audio) % 100 === 0) {
                    console.log(`📊 WS: ${msgCounts.video} video, ${msgCounts.audio} audio, ${msgCounts.meta} meta`);
                }
            };

            ws.onclose = () => {
                console.log('🔌 Connection lost, reconnecting...');
                setTimeout(() => connect(url), 2000);
            };
        }

        // === VIDEO HANDLER ===
        function handleVideo(buffer) {
            const blob = new Blob([buffer], { type: 'image/jpeg' });
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, 1920, 1080);
                URL.revokeObjectURL(url);

                frameCount++;
                const now = performance.now();
                if (now - lastFrameTime > 1000) {
                    document.getElementById('fps').textContent = frameCount;
                    frameCount = 0;
                    lastFrameTime = now;
                }
            };
            img.src = url;
        }

        // === AUDIO HANDLER (PCM with Buffer) ===
        function handleAudio(buffer) {
            if (!audioCtx) return;

            audioChunksReceived++;

            // Convert bytes to Float32 samples
            const floatView = new Float32Array(buffer);
            const numSamples = floatView.length / 2;  // Stereo

            // Create audio buffer (stereo)
            const audioBuffer = audioCtx.createBuffer(2, numSamples, SAMPLE_RATE);
            const leftChannel = audioBuffer.getChannelData(0);
            const rightChannel = audioBuffer.getChannelData(1);

            // Deinterleave stereo samples
            for (let i = 0; i < numSamples; i++) {
                leftChannel[i] = floatView[i * 2];
                rightChannel[i] = floatView[i * 2 + 1];
            }

            // Schedule playback with buffer delay
            const currentTime = audioCtx.currentTime;

            if (!isAudioStarted || nextPlayTime < currentTime) {
                // Start fresh with buffer delay
                nextPlayTime = currentTime + (BUFFER_DELAY_MS / 1000);
                isAudioStarted = true;
            }

            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioCtx.destination);
            source.start(nextPlayTime);

            // Advance next play time
            nextPlayTime += audioBuffer.duration;
            audioChunksPlayed++;

            // Update status
            if (audioChunksPlayed % 50 === 0) {
                const bufferMs = Math.max(0, (nextPlayTime - currentTime) * 1000).toFixed(0);
                document.getElementById('buffer-status').textContent = bufferMs + 'ms';
                document.getElementById('audio-status').textContent = `PLAYING (${audioChunksPlayed})`;
            }
        }

        // === META HANDLER ===
        function handleMeta(buffer) {
            const str = new TextDecoder().decode(buffer);
            try {
                const state = JSON.parse(str);

                if (state.timestamp) {
                    document.getElementById('lat').textContent = Date.now() - state.timestamp;
                }

                if (state.cursor) {
                    const cursor = document.getElementById('remote-cursor');
                    cursor.style.display = state.cursor.visible ? 'block' : 'none';
                    cursor.style.left = (state.cursor.x * window.innerWidth) + 'px';
                    cursor.style.top = (state.cursor.y * window.innerHeight) + 'px';
                }
            } catch (e) {
                console.error('Meta parse error:', e);
            }
        }

        console.log('🎬 MXS-004 Receiver v11 loaded');
    </script>
</body>

</html>
