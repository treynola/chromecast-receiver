<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.8.99 [AUTO-SCALE 16:9]</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
    
    <style>
        :root { --gold: #FAD78E; --green: #008000; --red: #FF0000; --dark-gray: #2c2c2c; --scale: 1; }
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin:0; overflow:hidden; width: 100vw; height: 100vh; }
        
        cast-media-player { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; visibility: hidden; }

        #studio-root { 
            width: 1440px; height: 810px; 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(var(--scale));
            transform-origin: center;
            background: var(--dark-gray); border: 1px solid var(--green); border-radius: 12px;
            padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; 
            z-index: 100; opacity: 0; transition: opacity 0.5s;
        }

        .main-content { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; flex: 1; min-height: 0; }
        .column { border: 2px solid #444; border-radius: 10px; padding: 15px; background: #1a1a1a; display: flex; flex-direction: column; box-shadow: inset 0 0 15px #000; }
        .header-text { color: var(--gold); font-weight: bold; font-size: 1.1em; border-bottom: 2px solid #333; padding-bottom: 6px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .time-display { font-size: 2.8em; color: var(--green); text-align: center; font-family: 'Courier Prime', monospace; text-shadow: 0 0 10px var(--green); margin: auto 0; }
        
        /* Debug Console Overlay Adjustment */
        #cast-debug-overlay { z-index: 1000 !important; transform: scale(0.8); transform-origin: top left; }
    </style>
</head>
<body>
    <cast-media-player></cast-media-player>

    <div class="container" id="studio-root">
        <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom:20px; border-bottom: 2px solid var(--gold); padding-bottom: 10px;">
            <div style="display:flex; align-items:center; gap: 20px;">
                <h1 style="color: var(--gold); margin:0; font-size: 1.8em; font-family: 'Mexcellent', sans-serif;">NOWMULTIMEDIA MXS-004</h1>
                <div id="status-tag" style="background: #333; color: #666; padding: 4px 12px; border-radius: 6px; font-size: 0.8em; font-weight: bold; letter-spacing: 1px;">STANDBY</div>
            </div>
            <div style="color: var(--gold); font-size: 1em; font-weight: bold; letter-spacing: 2px;">V13.8.99 :: 1440x810 NATIVE</div>
        </div>
        <div class="main-content">
            <div class="column"><div class="header-text">MASTER</div><div id="recording-time" class="time-display">00:00:00</div></div>
            <div class="column"><div class="header-text">TRACK 1</div><div class="time-display">00:00:00</div></div>
            <div class="column"><div class="header-text">TRACK 2</div><div class="time-display">00:00:00</div></div>
            <div class="column"><div class="header-text">TRACK 3</div><div class="time-display">00:00:00</div></div>
            <div class="column"><div class="header-text">TRACK 4</div><div class="time-display">00:00:00</div></div>
        </div>
    </div>

    <script>
        (function() {
            const context = cast.framework.CastReceiverContext.getInstance();
            const playerManager = context.getPlayerManager();
            const castDebugLogger = cast.debug.CastDebugLogger.getInstance();
            const studioRoot = document.getElementById('studio-root');
            const statusTag = document.getElementById('status-tag');

            // [V13.8.99] Auto-Scaling Logic for Perfect 16:9 Fit
            function updateScale() {
                const targetW = 1440; const targetH = 810;
                const winW = window.innerWidth; const winH = window.innerHeight;
                const scaleW = winW / targetW; const scaleH = winH / targetH;
                const finalScale = Math.min(scaleW, scaleH);
                document.documentElement.style.setProperty('--scale', finalScale);
                castDebugLogger.info('SCALE', `Viewport: ${winW}x${winH} | Scale: ${finalScale.toFixed(3)}`);
            }

            castDebugLogger.setEnabled(true);
            castDebugLogger.showDebugLogs(true);
            
            function renderState(state) {
                if (!state) return;
                studioRoot.style.opacity = '1';
                statusTag.textContent = "STUDIO LIVE"; statusTag.style.color = "#0f0"; statusTag.style.background = "#004400";
                if (state.transport) document.getElementById('recording-time').textContent = state.transport.position;
            }

            context.addCustomMessageListener('urn:x-cast:com.nowmultimedia.webrtc', (e) => {
                try {
                    let d = e.data;
                    if (typeof d === 'string') d = JSON.parse(d);
                    if (d.payload) d = (typeof d.payload === 'string') ? JSON.parse(d.payload) : d.payload;
                    if (d.type === 'STATE_UPDATE') renderState(d.state);
                } catch(x) {}
            });

            playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, (req) => {
                castDebugLogger.info('LOAD', 'Handshake Received');
                return req;
            });

            context.addEventListener(cast.framework.system.EventType.READY, () => {
                updateScale();
                window.addEventListener('resize', updateScale);
                castDebugLogger.info('SYSTEM', 'Ready for 16:9 Broadcast');
            });

            context.start({ disableIdleTimeout: true });
        })();
    </script>
</body>
</html>
