<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.8.102 [AUDIO HARDENED]</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
    <style>
        :root { --red: #FF0000; --gold: #FAD78E; --green: #008000; --off-black: #1a1a1a; --dark-gray: #2c2c2c; --mid-gray: #444; }
        html, body { background: #000 !important; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Courier New', monospace; }
        .container {
            width: 1432px; height: 802px; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(var(--scale, 1)); transform-origin: center;
            background-color: var(--dark-gray); border-radius: 12px; padding: 10px; box-sizing: border-box;
            border: 1px solid var(--green); box-shadow: 0 0 0 2px var(--gold), 0 0 0 4px var(--red);
            display: flex; flex-direction: column;
        }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 4px 10px; background-color: #111; border-radius: 8px; margin-bottom: 8px; border: 1px solid #333; }
        .header h1 { font-size: 1.2em; margin: 0; color: var(--gold); letter-spacing: 2px; }
        .main-content { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; flex: 1; min-height: 0; }
        .column { border: 1px solid var(--green); border-radius: 8px; padding: 10px; background: #1a1a1a; display: flex; flex-direction: column; }
        .time-display { font-size: 2.5em; color: var(--green); text-align: center; margin: auto 0; text-shadow: 0 0 10px var(--green); }
        .track-header { color: var(--gold); font-size: 0.8em; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; }
        
        #audio-debug { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); border: 1px solid #555; padding: 10px; color: #0f0; font-size: 11px; z-index: 2000; border-radius: 4px; }
        .meter-mini { height: 10px; width: 100px; background: #222; border: 1px solid #444; position: relative; margin-top: 5px; }
        .meter-mini-fill { height: 100%; width: 0%; background: #0f0; transition: width 0.05s; }
    </style>
</head>
<body>
    <cast-media-player style="display:none"></cast-media-player>
    
    <div id="audio-debug">
        <div>AUDIO STATUS: <span id="as-val">WAITING...</span></div>
        <div class="meter-mini"><div id="as-meter" class="meter-mini-fill"></div></div>
        <div id="as-msg" style="color:#aaa; font-size:9px; margin-top:5px;">v13.8.102 JITTER-SYNC</div>
    </div>

    <div class="container" id="studio-root">
        <div class="header">
            <h1>NOWMULTIMEDIA MXS-004</h1>
            <div style="color:var(--green); font-weight:bold; font-size:0.8em;">LIVE STUDIO MIRROR</div>
        </div>
        <div class="main-content">
            <div class="column"><div class="track-header">MASTER</div><div id="m-time" class="time-display">00:00:00</div></div>
            <div class="column"><div class="track-header">TRACK 1</div><div class="time-display">00:00:00</div></div>
            <div class="column"><div class="track-header">TRACK 2</div><div class="time-display">00:00:00</div></div>
            <div class="column"><div class="track-header">TRACK 3</div><div class="time-display">00:00:00</div></div>
            <div class="column"><div class="track-header">TRACK 4</div><div class="time-display">00:00:00</div></div>
        </div>
    </div>

    <script>
        (function() {
            const context = cast.framework.CastReceiverContext.getInstance();
            const playerManager = context.getPlayerManager();
            const castDebugLogger = cast.debug.CastDebugLogger.getInstance();
            
            let audioCtx = null;
            let scriptNode = null;
            const BUFFER_SIZE = 192000; // 2 seconds of buffer @ 48kHz Stereo
            const ringBuffer = new Float32Array(BUFFER_SIZE);
            let writePtr = 0;
            let readPtr = 0;
            let lastLevel = 0;

            function updateUI() {
                const winW = window.innerWidth; const winH = window.innerHeight;
                document.documentElement.style.setProperty('--scale', Math.min(winW/1440, winH/810) * 0.96);
                
                document.getElementById('as-meter').style.width = (lastLevel * 100) + '%';
                if (audioCtx) document.getElementById('as-val').textContent = audioCtx.state.toUpperCase();
            }

            function startAudio() {
                if (scriptNode) return;
                log("🔊 ACTIVATING PCM ENGINE...");
                scriptNode = audioCtx.createScriptProcessor(2048, 0, 2);
                scriptNode.onaudioprocess = (e) => {
                    const outL = e.outputBuffer.getChannelData(0);
                    const outR = e.outputBuffer.getChannelData(1);
                    
                    const available = (writePtr - readPtr + BUFFER_SIZE) % BUFFER_SIZE;
                    // Jitter Buffer: Wait for 4096 samples before starting playback
                    if (available < 4096) {
                        outL.fill(0); outR.fill(0);
                        return;
                    }

                    let maxVal = 0;
                    for (let i = 0; i < 2048; i++) {
                        const valL = ringBuffer[readPtr];
                        const valR = ringBuffer[(readPtr + 1) % BUFFER_SIZE];
                        outL[i] = valL;
                        outR[i] = valR;
                        maxVal = Math.max(maxVal, Math.abs(valL), Math.abs(valR));
                        readPtr = (readPtr + 2) % BUFFER_SIZE;
                    }
                    lastLevel = maxVal;
                };
                scriptNode.connect(audioCtx.destination);
            }

            function tryUnlock() {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => {
                        if (audioCtx.state === 'running') startAudio();
                    });
                } else if (audioCtx.state === 'running') {
                    startAudio();
                }
            }

            function log(m) { castDebugLogger.info('STUDIO', m); document.getElementById('as-msg').textContent = m; }

            function connectWS(url) {
                log("🔌 CONNECTING: " + url);
                const ws = new WebSocket(url);
                ws.binaryType = 'arraybuffer';
                ws.onopen = () => log("✅ WS CONNECTED");
                ws.onmessage = (e) => {
                    if (e.data instanceof ArrayBuffer) {
                        const pcm = new Float32Array(e.data);
                        for (let i = 0; i < pcm.length; i++) {
                            ringBuffer[writePtr] = pcm[i];
                            writePtr = (writePtr + 1) % BUFFER_SIZE;
                        }
                        tryUnlock();
                    } else {
                        try {
                            const m = JSON.parse(e.data);
                            if (m.type === 'STATE_UPDATE' && m.state.transport) {
                                document.getElementById('m-time').textContent = m.state.transport.position;
                            }
                        } catch(x){}
                    }
                };
            }

            castDebugLogger.setEnabled(true);
            castDebugLogger.showDebugLogs(true);

            playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, (req) => {
                log("📥 LOAD INTERCEPTED");
                if (req.media && req.media.contentId) {
                    try {
                        const u = new URL(req.media.contentId);
                        const wsUrl = u.searchParams.get('ws');
                        if (wsUrl) connectWS("ws://" + wsUrl);
                    } catch(x){}
                }
                return req;
            });

            context.addEventListener(cast.framework.system.EventType.READY, () => {
                updateUI();
                window.addEventListener('resize', updateUI);
                setInterval(updateUI, 100);
                setInterval(tryUnlock, 1000); // Aggressive unlock
            });

            context.start({ disableIdleTimeout: true });
        })();
    </script>
</body>
</html>
