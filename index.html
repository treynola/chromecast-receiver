<!DOCTYPE html>
<html>

<head>
    <title>NOWMULTIMEDIA MXS-004 Receiver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #stream-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0;
            transition: opacity 1s;
        }

        #stream {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #splash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 1s;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #splash h1 {
            color: #FAD78E;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(250, 215, 142, 0.5);
        }

        #splash h2 {
            color: #008000;
            font-size: 1.5em;
        }

        #status-bar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 128, 0, 0.9);
            color: #FAD78E;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.2em;
            transition: opacity 0.5s;
        }

        #status-bar.hidden {
            opacity: 0;
        }

        #debug-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 0, 0.9);
            color: #000;
            padding: 10px;
            font-size: 14px;
            max-width: 500px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 9999;
            font-family: 'Courier New', monospace;
        }

        #debug-overlay div {
            margin-bottom: 5px;
            border-bottom: 1px solid #000;
        }
    </style>
</head>

<body>
    <div id="stream-container">
        <img id="stream" alt="Studio Stream">
    </div>

    <div id="splash">
        <h1>MXS-004</h1>
        <h2>INITIALIZING STUDIO SYNC...</h2>
    </div>

    <div id="status-bar">
        <span id="status-text">INITIALIZING...</span>
    </div>

    <div id="debug-overlay"></div>

    <script src="//www.gstatic.com/cast/sdk/libs/caf/receiver/v3/cast_receiver_framework.js"></script>
    <script>
        // VISIBLE DEBUG CONSOLE
        const debugDiv = document.getElementById('debug-overlay');
        function logToScreen(msg) {
            const line = document.createElement('div');
            line.textContent = msg;
            debugDiv.appendChild(line);
            if (debugDiv.childElementCount > 10) debugDiv.firstChild.remove();
        }
        const originalLog = console.log;
        const originalError = console.error;
        console.log = (...args) => { originalLog(...args); logToScreen("INFO: " + args.join(' ')); };
        console.error = (...args) => { originalError(...args); logToScreen("ERR: " + args.join(' ')); };

        console.log("Receiver v4.0 AUTO-INIT ACTIVE");

        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        const splash = document.getElementById('splash');
        const container = document.getElementById('stream-container');
        const stream = document.getElementById('stream');
        const statusText = document.getElementById('status-text');
        const statusBar = document.getElementById('status-bar');

        let frameInterval = null;
        let frameNumber = 0;

        function startStreaming(baseUrl) {
            console.log("Starting Frame Polling: " + baseUrl);

            // Stop any existing polling
            if (frameInterval) {
                clearInterval(frameInterval);
            }

            // Extract base URL without query params
            let targetUrl = baseUrl.split('?')[0];
            
            // Force HTTP for local IPs
            if (targetUrl.startsWith('https://192.168.') || 
                targetUrl.startsWith('https://10.') || 
                targetUrl.startsWith('https://172.')) {
                targetUrl = targetUrl.replace('https://', 'http://');
            }

            // Use /screen.jpg endpoint which gives us a fresh frame each time
            const frameUrl = targetUrl.replace('/stream.mjpeg', '/screen.jpg');

            statusText.textContent = 'STUDIO CONNECTED';
            splash.classList.add('hidden');
            container.style.opacity = '1';

            // Poll for new frames at ~30 FPS (33ms) 
            // Start with 100ms to be safe, can optimize later
            frameInterval = setInterval(() => {
                frameNumber++;
                // Add timestamp to prevent caching
                stream.src = `${frameUrl}?frame=${frameNumber}&t=${Date.now()}`;
            }, 100); // 10 FPS (100ms between frames)

            console.log("Frame polling started at 10 FPS");
            setTimeout(() => { statusBar.classList.add('hidden'); }, 3000);

            stream.onerror = (e) => {
                console.error("Frame Load Error");
                clearInterval(frameInterval);
                statusText.textContent = 'STREAM ERROR - RETRYING...';
                statusText.style.color = '#ff4444';
                statusBar.classList.remove('hidden');
                // Retry after 3s
                setTimeout(() => startStreaming(baseUrl), 3000);
            };
        }

        // ==========================================
        // AUTO-INITIALIZATION (v4.0 FIX)
        // ==========================================
        // This solves the rust_cast hang issue where launch_app blocks
        // and never sends the LOAD command

        let autoInitAttempted = false;

        setTimeout(() => {
            if (autoInitAttempted) return;
            autoInitAttempted = true;

            console.log('AUTO-INIT: Detecting sender IP...');

            // Try to get sender IP from Cast context
            const senders = context.getSenders();
            console.log('Detected senders:', senders ? senders.length : 0);

            // Default IP (your Mac's current IP)
            let senderIp = '192.168.1.14';

            // Try common local network IPs
            const ipCandidates = [
                '192.168.1.14',
                '192.168.1.1',
                '192.168.0.14',
                '10.0.0.14'
            ];

            // Build stream URL with timestamp to bypass cache
            const timestamp = Date.now();
            const streamUrl = `http://${ipCandidates[0]}:8089/stream.mjpeg?auto=${timestamp}`;

            console.log('AUTO-INIT: Trying to load stream:', streamUrl);
            statusText.textContent = 'AUTO-CONNECTING...';

            // Attempt to load stream automatically
            startStreaming(streamUrl);

        }, 2500); // Wait 2.5s for Cast context to fully initialize

        // ==========================================
        // BACKUP: LOAD Message Interceptor
        // ==========================================
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            loadData => {
                console.log('Intercepted LOAD request');
                autoInitAttempted = true; // Don't auto-init if we get a LOAD

                if (loadData.media && loadData.media.contentId) {
                    console.log('LOAD ContentID:', loadData.media.contentId);
                    startStreaming(loadData.media.contentId);
                    return null; // Prevent default player
                }

                console.error('LOAD message but no contentId');
                return loadData;
            }
        );

        // ==========================================
        // BACKUP: Custom Messages
        // ==========================================
        context.addCustomMessageListener('urn:x-cast:com.nowmultimedia.stream', (event) => {
            console.log('Custom Message Received:', event.data);
            autoInitAttempted = true; // Don't auto-init if we get custom message

            try {
                const data = JSON.parse(event.data);
                if (data.url) {
                    console.log('Custom URL:', data.url);
                    startStreaming(data.url);
                }
            } catch (e) {
                console.error('Custom message parse error:', e);
            }
        });

        console.log('Starting Cast Receiver Context...');
        context.start();
        console.log('Context started. Waiting for initialization...');
    </script>
</body>

</html>
