<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.8.94 [FORCE SYNC]</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        :root { --gold: #FAD78E; --green: #008000; --red: #FF0000; --dark-gray: #2c2c2c; }
        body { background: #4b0082 !important; color: #fff; font-family: 'Courier New', monospace; margin:0; overflow:hidden; }
        #debug-log { position: fixed; bottom: 5px; left: 5px; font-size: 9px; color: #0f0; background: rgba(0,0,0,0.8); padding: 5px; z-index: 1000001; max-height: 100px; overflow-y: auto; pointer-events: none; width: 300px; }
        .container { width: 1432px; height: 802px; position: absolute; top:50%; left:50%; transform:translate(-50%, -50%); background: var(--dark-gray); border: 1px solid var(--green); border-radius: 12px; padding: 6px; box-sizing: border-box; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.5s; }
        .main-content { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; flex: 1; }
        .track, .master-column { border: 1px solid var(--green); border-radius: 8px; padding: 6px; background: var(--dark-gray); }
        .track-header { color: var(--gold); font-weight: bold; font-size: 0.8em; border-bottom: 1px solid #444; }
        .track-time-display { font-size: 1.5em; color: var(--green); text-align: center; }
        .sample-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .sample-btn { background: #1a1a1a; color: var(--gold); border: 1px solid #444; font-size: 0.7em; height: 32px; border-radius: 4px; }
        .sample-btn.active { background: var(--gold); color: #000; }
    </style>
</head>
<body>
    <div id="debug-log">🚀 Force Sync v13.8.94 (TS: 1715462545)</div>
    <div class="container" id="studio-root">
        <div class="header" style="height:32px; display:flex; justify-content:space-between; align-items:center; background:#111; padding:0 10px; border-radius:8px; margin-bottom:6px;">
            <h1 style="font-size:1.2em; margin:0; color: var(--gold);">NOWMULTIMEDIA MXS-004</h1>
            <div id="connection-status" style="font-size: 0.7em;">PURPLE = LOADED</div>
        </div>
        <div class="main-content">
            <div class="master-column">
                <div class="track-header">MASTER</div>
                <div id="recording-time-display" class="track-time-display">00:00:00</div>
                <div id="sample-grid" class="sample-grid"></div>
                <div id="audio-status" style="margin-top:auto; font-size:9px; color:#f90;">Audio: Initializing...</div>
            </div>
            <div id="tracks-container" style="display:contents;"></div>
        </div>
    </div>
    <script>
        (function() {
            var audioCtx = null; var ws = null; var scriptNode = null;
            var ringBuffer = new Float32Array(48000 * 2); var writePtr = 0; var readPtr = 0;
            var debugEl = document.getElementById('debug-log');
            var studioRoot = document.getElementById('studio-root');
            function log(m) { console.log(m); if (debugEl) { debugEl.innerHTML += '<br>' + m; debugEl.scrollTop = debugEl.scrollHeight; } }
            function buildGUI() {
                var grid = document.getElementById('sample-grid');
                for (var p = 1; p <= 20; p++) {
                    var btn = document.createElement('button'); btn.className = 'sample-btn';
                    btn.id = 'sample-' + p; btn.textContent = p; grid.appendChild(btn);
                }
                var tc = document.getElementById('tracks-container');
                for (var i = 0; i < 4; i++) {
                    var t = document.createElement('div'); t.className = 'track';
                    t.innerHTML = '<div class="track-header">TRACK '+(i+1)+'</div><div class="track-time-display">00:00:00</div><div style="flex:1; background:#000; border:1px solid #444; margin:5px 0;"></div>';
                    tc.appendChild(t);
                }
            }
            function tryUnlockAudio() {
                if (audioCtx && audioCtx.state === 'running') return;
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                audioCtx.resume().then(() => { if (audioCtx.state === 'running' && !scriptNode) startAudio(); });
            }
            function startAudio() {
                scriptNode = audioCtx.createScriptProcessor(4096, 0, 2);
                scriptNode.onaudioprocess = function(e) {
                    var outL = e.outputBuffer.getChannelData(0); var outR = e.outputBuffer.getChannelData(1);
                    var available = (writePtr - readPtr + ringBuffer.length) % ringBuffer.length;
                    if (available < 8192) { outL.fill(0); outR.fill(0); return; }
                    for (var i = 0; i < 4096; i++) {
                        outL[i] = ringBuffer[readPtr]; outR[i] = ringBuffer[(readPtr + 1) % ringBuffer.length];
                        readPtr = (readPtr + 2) % ringBuffer.length;
                    }
                };
                scriptNode.connect(audioCtx.destination);
                document.getElementById('audio-status').textContent = "Audio: LIVE";
                log("🔊 AUDIO ACTIVE.");
            }
            function renderState(state) {
                if (!state) return;
                if (studioRoot.style.opacity !== '1') { studioRoot.style.opacity = '1'; document.body.style.background = '#000'; log("🎬 SIGNAL ACQUIRED."); }
                if (state.master) document.getElementById('recording-time-display').textContent = state.transport ? state.transport.position : '00:00:00';
                tryUnlockAudio();
            }
            function connect(url) {
                log("🔌 Connecting: " + url);
                ws = new WebSocket(url); ws.binaryType = 'arraybuffer';
                ws.onmessage = function(e) {
                    if (e.data instanceof ArrayBuffer) {
                        var pcm = new Float32Array(e.data);
                        for (var i = 0; i < pcm.length; i++) { ringBuffer[writePtr] = pcm[i]; writePtr = (writePtr + 1) % ringBuffer.length; }
                    } else {
                        try { var m = JSON.parse(e.data); if (m.type === 'STATE_UPDATE') renderState(m.state); } catch(x){}
                    }
                };
                ws.onopen = function() { log("✅ Binary Stream Connected"); };
                ws.onclose = function() { setTimeout(() => connect(url), 2000); };
            }
            window.onload = function() {
                buildGUI();
                var ctx = cast.framework.CastReceiverContext.getInstance();
                ctx.getPlayerManager().setMessageInterceptor(cast.framework.messages.MessageType.LOAD, function(req) {
                    if (req.media && req.media.contentId) connect("ws://" + new URL(req.media.contentId).hostname + ":8080");
                    return null;
                });
                ctx.start({ disableIdleTimeout: true });
                log("📡 Signal Suite v13.8.94 Active.");
                var params = new URLSearchParams(window.location.search);
                if (params.has('ws')) connect(params.get('ws'));
                setInterval(tryUnlockAudio, 2000);
            };
        })();
    </script>
</body>
</html>
