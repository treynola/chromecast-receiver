<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MXS-004 Studio Mirror v13.8.119 [NATIVE CAST BRIDGE]</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles_main.css?v=13.8.119">
    <style>
        /* [V13.8.119] Native Bridge Styles */
        html, body { background: #000 !important; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        .app-loading { opacity: 1 !important; visibility: visible !important; }
        .container {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(var(--scale, 1)); transform-origin: center;
            opacity: 1 !important; visibility: visible !important; display: flex !important;
            background-color: #000 !important;
        }
        #cursor-mirror {
            position: absolute; width: 14px; height: 14px; background: rgba(255, 0, 0, 0.9); 
            border-radius: 50%; pointer-events: none; z-index: 10000; border: 2px solid white; 
            display: none; box-shadow: 0 0 8px rgba(0,0,0,0.5);
            transition: transform 0.1s cubic-bezier(0.1, 0, 0.2, 1);
            will-change: transform;
        }
        cast-media-player { display: none; }
        .master-column, .track { height: 100%; box-sizing: border-box; overflow: hidden; }
        .main-content {
            display: grid !important;
            grid-template-columns: repeat(5, 1fr) !important;
            gap: 6px !important;
            width: 100% !important;
            height: calc(100% - 60px) !important;
        }
        .sample-grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 5px !important; margin-top: 5px !important; }
        .sample-btn { aspect-ratio: 1.0 !important; font-family: 'Cousine', monospace !important; font-size: 1.1em !important; font-weight: 720 !important; border-radius: 8px !important; border-width: 3px !important; padding: 1px !important; display: flex !important; align-items: center !important; justify-content: center !important; text-transform: uppercase; }
    </style>
</head>
<body class="app-loading">
    <div id="cursor-mirror"></div>
    <div class="container" id="studio-root">
        <div class="header">
            <div class="header-left"><h1 style="font-size:1.5em; margin:0; font-family: 'Mexcellent', sans-serif; color: var(--gold);">NOWMULTIMEDIA MXS-004</h1></div>
            <div class="header-right"><h2 style="font-size:0.85em; margin:0; padding:0; font-family: 'Mexcellent', sans-serif; color: var(--gold);">Mix N Studio 004 :: MIRROR</h2></div>
        </div>
        <div class="main-content" id="main-grid">
            <!-- Master Column -->
            <div class="master-column" id="master-column">
                <div class="track-header">Master Recording:</div>
                <div id="recording-time-display" class="track-time-display">00:00:00</div>
                <div class="master-item master-volume-aligned" style="display: flex; align-items: center; gap: 4px;">
                    <label class="master-label" style="font-size: 0.72em; margin: 0; color:var(--green);">Vol</label>
                    <input type="range" id="master-volume" class="pa-mic-slider" min="-60" max="6" step="0.1" value="0" style="flex:1;">
                    <span id="master-volume-value" class="pa-mic-value" style="font-size: 0.72em; min-width:45px;">0.0 dB</span>
                </div>
                <div class="master-item master-waveform-item">
                    <div class="waveform-box master-waveform-box">
                        <div class="waveform-labels"><div class="waveform-label-external">L</div><div class="waveform-label-external">R</div></div>
                        <div id="master-waveform-container" class="waveform-canvas-container" style="flex:1;">
                            <canvas id="master-waveform-L" class="waveform-canvas" width="242" height="24"></canvas>
                            <canvas id="master-waveform-R" class="waveform-canvas" width="242" height="24"></canvas>
                        </div>
                    </div>
                </div>
                <div class="sample-center-container" style="margin-top:8px;">
                    <div class="track-header">Sample Station</div>
                    <div class="sample-grid" id="sample-grid"></div>
                </div>
                <div class="meter-container" style="height:6px; margin-top:auto;"><div id="master-meter-bar" class="meter-bar"></div></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var audioCtx = null; var workletNode = null;
            const CUSTOM_NAMESPACE = 'urn:x-cast:com.nowmultimedia.mxs004';
            
            function buildGUI() {
                var g = document.getElementById('sample-grid');
                for (var p = 1; p <= 20; p++) {
                    var b = document.createElement('button'); b.className = 'sample-btn'; b.id = 'sample-' + p; b.textContent = p; g.appendChild(b);
                }
                var grid = document.getElementById('main-grid');
                for (var i = 0; i < 4; i++) {
                    var t = document.createElement('div'); t.className = 'track'; t.id = 'track-' + i;
                    t.innerHTML = `
                        <div class="track-header">TRACK ${i+1}</div>
                        <div class="track-time-display" id="t-time-${i}">00:00:00</div>
                        <div class="status-indicator status-ready" id="t-st-${i}">Ready</div>
                        <div class="waveform-box">
                            <div class="waveform-labels"><div class="waveform-label-external">L</div><div class="waveform-label-external">R</div></div>
                            <div class="waveform-canvas-container">
                                <canvas class="waveform-canvas track-waveform-canvas-L" id="t-wf-l-${i}" width="242" height="26"></canvas>
                                <canvas class="waveform-canvas track-waveform-canvas-R" id="t-wf-r-${i}" width="242" height="26"></canvas>
                                <div class="loop-marker loop-start-marker" id="t-ls-m-${i}"></div>
                                <div class="loop-marker loop-end-marker" id="t-le-m-${i}"></div>
                            </div>
                        </div>
                        <div class="control-group"><span class="file-name-display" id="t-file-${i}" style="height:14px; overflow:hidden;">(Empty)</span></div>
                        <div class="main-controls">
                            ${[{l:'Pitch',p:'pitch'},{l:'Vol',p:'vol'},{l:'Pan',p:'pan'},{l:'Bass',p:'bass'}].map(cfg => `
                                <div class="knob-container">
                                    <div class="knob-label-group"><label>${cfg.l}</label><span class="param-value" id="t-${cfg.p}-val-${i}">0</span></div>
                                    <div class="slider-wrapper"><input type="range" id="t-${cfg.p}-sl-${i}" class="pa-mic-slider" style="height:6px;"></div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="meter-container" style="margin-top:auto; height:6px;"><div id="t-mtr-${i}" class="meter-bar"></div></div>
                    `;
                    grid.appendChild(t);
                }
                updateScale();
            }

            function updateScale() {
                const winW = window.innerWidth; const winH = window.innerHeight;
                document.documentElement.style.setProperty('--scale', Math.min(winW/1440, winH/810) * 0.98);
            }

            async function initAudio() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
                    try {
                        await audioCtx.audioWorklet.addModule('pcm-player-worklet.js?v=13.8.119');
                        workletNode = new AudioWorkletNode(audioCtx, 'pcm-player-processor');
                        workletNode.connect(audioCtx.destination);
                        console.log('✅ Native Bridge Audio Initialized');
                    } catch (e) { console.error('❌ Worklet Error:', e); }
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function renderState(s) {
                if (!s) return;
                initAudio();
                if (s.transport) {
                    document.getElementById('recording-time-display').textContent = s.transport.position;
                    for(var i=0; i<4; i++) { var tt = document.getElementById('t-time-'+i); if(tt) tt.textContent = s.transport.position; }
                }
                if (s.cursor) {
                    var cur = document.getElementById('cursor-mirror');
                    if (cur) { cur.style.display = 'block'; cur.style.transform = 'translate3d('+(s.cursor.x * window.innerWidth)+'px, '+(s.cursor.y * window.innerHeight)+'px, 0)'; }
                }
                if (s.master) {
                    var mVol = document.getElementById('master-volume'); if (mVol) mVol.value = s.master.volume || 0;
                    var mVal = document.getElementById('master-volume-value'); if (mVal) mVal.textContent = (s.master.volume || 0).toFixed(1) + ' dB';
                    var mm = document.getElementById('master-meter-bar'); if (mm) mm.style.width = (s.master.meters?.l * 100 || 0) + '%';
                }
                if (s.sampler) s.sampler.forEach((p,i) => {
                    var b = document.getElementById('sample-'+(i+1));
                    if (b) {
                        b.className = p.active ? 'sample-btn active' : (p.loaded ? 'sample-btn loaded' : 'sample-btn');
                        if (p.loaded && p.name) b.textContent = p.name.substring(0,6);
                    }
                });
                if (s.tracks) s.tracks.forEach((t,i) => {
                    var fn = document.getElementById('t-file-'+i); if (fn) fn.textContent = t.fileName || '(Empty)';
                    var m = document.getElementById('t-mtr-'+i); if (m) m.style.width = (t.meters?.l * 100 || 0) + '%';
                    var st = document.getElementById('t-st-'+i);
                    if (st) {
                        st.textContent = t.isRecording ? 'Recording' : (t.isPlaying ? 'Playing' : 'Ready');
                        st.className = 'status-indicator ' + (t.isRecording ? 'status-recording' : (t.isPlaying ? 'status-playing' : 'status-ready'));
                    }
                });
            }

            window.onload = function() {
                buildGUI();
                const context = cast.framework.CastReceiverContext.getInstance();
                
                // [V13.8.119] Native Cast Bridge Listener
                context.addCustomMessageListener(CUSTOM_NAMESPACE, (event) => {
                    if (event.data instanceof ArrayBuffer) {
                        // Binary PCM Audio Chunk
                        initAudio();
                        if (workletNode) workletNode.port.postMessage(event.data, [event.data]);
                    } else if (typeof event.data === 'object' && event.data.type === 'STATE_UPDATE') {
                        // JSON State Mirroring
                        renderState(event.data.state);
                    }
                });

                context.start({ disableIdleTimeout: true });
                window.addEventListener('resize', updateScale);
            };
        })();
    </script>
</body>
</html>
