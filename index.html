<!DOCTYPE html>
<html>

<head>
    <title>MXS-004 Cast Receiver v6.4</title>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #main-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #stream-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            background: #111;
            image-rendering: -webkit-optimize-contrast;
        }

        #audio-player {
            display: none;
        }

        .overlay {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #b38600;
            text-align: center;
            z-index: 1000;
        }

        .status-title {
            font-size: 28px;
            font-weight: bold;
            color: #b38600;
            margin-bottom: 10px;
        }

        .status-msg {
            font-size: 18px;
            color: #ccc;
        }

        #unmute-overlay {
            position: absolute;
            top: 30px;
            right: 30px;
            background: #b38600;
            color: #000;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            display: none;
            font-weight: 800;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(179, 134, 0, 0.6);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(-5px);
            }
        }

        #error-overlay {
            display: none;
            border-color: #ff4444;
        }

        #error-overlay .status-title {
            color: #ff4444;
        }

        .version-tag {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            opacity: 0.3;
        }

        #log-overlay {
            position: absolute;
            bottom: 40px;
            left: 10px;
            font-size: 10px;
            color: #666;
            width: 300px;
            max-height: 100px;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div id="main-container">
        <img id="stream-img" alt="Studio Feed">
        <audio id="audio-player"></audio>

        <div id="unmute-overlay" onclick="unmuteAudio()">
            CLICK TO ENABLE AUDIO 🔊
        </div>

        <div id="status-overlay" class="overlay">
            <div class="status-title">MXS-004 STUDIO</div>
            <div id="status-msg" class="status-msg">INITIALIZING RECEIVER...</div>
        </div>

        <div id="error-overlay" class="overlay">
            <div class="status-title">STREAM INTERRUPTED</div>
            <div id="error-msg" class="status-msg">Check Studio connection</div>
            <button style="margin-top:20px; padding:10px 20px;" onclick="location.reload()">RECONNECT</button>
        </div>

        <div id="log-overlay"></div>
        <div class="version-tag">Receiver v6.4 (Connect Fix)</div>
    </div>

    <script>
        const streamImg = document.getElementById('stream-img');
        const audioPlayer = document.getElementById('audio-player');
        const statusOverlay = document.getElementById('status-overlay');
        const statusMsg = document.getElementById('status-msg');
        const unmuteOverlay = document.getElementById('unmute-overlay');
        const errorOverlay = document.getElementById('error-overlay');
        const logOverlay = document.getElementById('log-overlay');

        let isCasting = false;
        let activeBaseUrl = '';
        const VERSION = "v6.4";

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logOverlay.prepend(div);
            if (logOverlay.children.length > 5) logOverlay.removeChild(logOverlay.lastChild);
            console.log(msg);
        }

        function updateStatus(msg) {
            statusMsg.innerText = msg;
            addLog(msg);
        }

        function startStream(baseUrl) {
            if (isCasting && activeBaseUrl === baseUrl) return;
            addLog("🚀 Connecting to: " + baseUrl);
            activeBaseUrl = baseUrl;
            isCasting = true;

            statusOverlay.style.display = 'none';
            errorOverlay.style.display = 'none';

            // 1. VIDEO (MJPEG)
            streamImg.src = baseUrl + "/stream.mjpeg?t=" + Date.now();
            streamImg.style.display = 'block';

            // 2. AUDIO (WAV)
            audioPlayer.src = baseUrl + "/audio.wav?t=" + Date.now();
            audioPlayer.play().then(() => {
                addLog("✅ Audio playing");
                unmuteOverlay.style.display = 'none';
            }).catch(err => {
                addLog("⚠️ Audio blocked");
                unmuteOverlay.style.display = 'block';
            });

            streamImg.onerror = () => {
                addLog("❌ Video feed failed");
                isCasting = false;
                errorOverlay.style.display = 'block';
            };
        }

        function unmuteAudio() {
            audioPlayer.play().then(() => {
                unmuteOverlay.style.display = 'none';
            });
        }

        async function probeServers() {
            if (isCasting) return;
            updateStatus("DETECTING STUDIO SERVER...");

            // Priority subnets
            const subnets = ['192.168.1', '192.168.0', '10.0.0'];
            const candidates = [];
            for (const sn of subnets) {
                for (let i = 2; i < 30; i++) candidates.push(`http://${sn}.${i}:8089`);
            }

            for (const url of candidates) {
                if (isCasting) return;
                try {
                    const success = await new Promise(res => {
                        const img = new Image();
                        img.onload = () => res(true);
                        img.onerror = () => res(false);
                        img.src = url + "/screen.jpg?p=" + Date.now();
                        setTimeout(() => { img.src = ""; res(false); }, 1500); // 1.5s timeout
                    });
                    if (success) {
                        addLog("✅ Found Studio!");
                        startStream(url);
                        return;
                    }
                } catch (e) { }
            }
            setTimeout(probeServers, 3000);
        }

        window.onload = () => {
            addLog(`v${VERSION} Ready`);

            try {
                const context = cast.framework.CastReceiverContext.getInstance();
                const playerManager = context.getPlayerManager();

                // Direct URL via custom message from App
                context.addCustomMessageListener('urn:x-cast:com.nowmultimedia.mxs004', (event) => {
                    addLog("📩 Custom Msg: " + JSON.stringify(event.data));
                    if (event.data && event.data.stream_url) startStream(event.data.stream_url);
                });

                // Intercept Media LOAD messages (Standard SDK flow)
                playerManager.setMessageInterceptor(
                    cast.framework.messages.MessageType.LOAD,
                    loadRequestData => {
                        addLog("📥 LOAD message received");
                        if (loadRequestData.media && loadRequestData.media.contentId) {
                            const url = loadRequestData.media.contentId;
                            // Extract base URL if it's a direct stream link
                            if (url.includes(':8089')) {
                                const baseUrl = url.split('/stream.mjpeg')[0];
                                startStream(baseUrl);
                            }
                        }
                        return loadRequestData;
                    }
                );

                context.start();
            } catch (e) {
                addLog("⚠️ SDK Standalone");
            }

            setTimeout(probeServers, 1000);
        };
    </script>
</body>

</html>
